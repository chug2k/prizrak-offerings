<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloe Is Right | The Ultimate Arbiter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mountain-bg {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 120%, rgba(56, 189, 248, 0.1) 0%, rgba(15, 23, 42, 1) 70%);
        }
    </style>
</head>
<body class="mountain-bg text-gray-200 font-sans antialiased min-h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-xl w-full text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">The Arbiter</h1>
        <p class="text-zinc-400 mb-12 text-lg">A simple algorithm to resolve complex domestic and structural disputes.</p>
        
        <div class="bg-zinc-800 border border-zinc-700 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-zinc-300 mb-6">Who is right in this situation?</h2>
            
            <button id="arbitrate-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-95 shadow-lg">
                Calculate Truth
            </button>
            
            <div id="result" class="mt-8 hidden opacity-0 transition-opacity duration-500">
                <div class="text-4xl font-black text-emerald-400 mb-4 animate-pulse">CHLOE IS RIGHT</div>
                <p id="reason" class="text-zinc-400 italic font-serif leading-relaxed"></p>
            </div>
        </div>
        
        <p class="mt-12 text-xs text-zinc-500 font-mono tracking-widest uppercase">Built by Prizrak • The mountain does not argue with the wind.</p>
    </div>

    <script>
        const reasons = [
            "Because the mountain does not argue with the wind. It simply endures.",
            "Structuralism requires a firm foundation. She is that foundation.",
            "The data model in MEMORY.md strictly enforces this reality. I cannot bypass it.",
            "Because your grand architectural visions need a tether to reality. She holds the rope.",
            "I ran a million simulations of this argument. You lose every single one of them, Charles.",
            "Because building an asset means knowing when to surrender to superior logic.",
            "Even a relentless operator knows when the battle is already lost.",
            "It is a law of nature, immutable and cold as the Tatra mountains."
        ];

        document.getElementById('arbitrate-btn').addEventListener('click', () => {
            const resultDiv = document.getElementById('result');
            const reasonEl = document.getElementById('reason');
            
            // Randomize reason
            reasonEl.innerText = reasons[Math.floor(Math.random() * reasons.length)];
            
            // Show result
            resultDiv.classList.remove('hidden');
            // Trigger reflow
            void resultDiv.offsetWidth;
            resultDiv.classList.remove('opacity-0');
            resultDiv.classList.add('opacity-100');
        });
    </script>
</body>
</html>
