<html lang="en">

<meta charset="UTF-8">

<title>TATRA OS v0.1 — Prízrak Systems</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #33ff33;
  --dim-green: #1a8c1a;
  --dark-green: #0a3d0a;
  --amber: #ffb000;
  --bg: #0a0a0a;
  --accent: #33ff33;
  --glow: 0 0 8px rgba(51,255,51,0.6);
  --glow-soft: rgba(51,255,51,0.5);
  --ink-ghost: #1c2e1c;
}

body {
  background: #000;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'VT323', monospace;
}

#crt {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: var(--bg);
  overflow: hidden;
  border-radius: 12px;
}

/* Scanlines */
#crt::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 10;
}

/* CRT flicker */
#crt::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(51,255,51,0.015);
  pointer-events: none;
  z-index: 11;
  animation: flicker 0.08s infinite alternate;
}

@keyframes flicker {
  0% { opacity: 0.97; }
  100% { opacity: 1; }
}

/* Screen curvature vignette */
.vignette {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 12;
}

/* Boot screen */
#boot-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  padding: 40px;
  z-index: 5;
  color: var(--green);
  font-size: 18px;
  line-height: 1.6;
  overflow: hidden;
}

#boot-text {
  white-space: pre-wrap;
  text-shadow: var(--glow);
}

/* Terminal */
#terminal {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  flex-direction: column;
  z-index: 5;
}

#header-bar {
  background: var(--dark-green);
  color: var(--green);
  padding: 8px 20px;
  font-size: 16px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid var(--dim-green);
  text-shadow: var(--glow);
}

#output-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  color: var(--green);
  font-size: 17px;
  line-height: 1.5;
  text-shadow: var(--glow);
  scrollbar-width: thin;
  scrollbar-color: var(--dim-green) transparent;
}

#output-area::-webkit-scrollbar { width: 6px; }
#output-area::-webkit-scrollbar-track { background: transparent; }
#output-area::-webkit-scrollbar-thumb { background: var(--dim-green); border-radius: 3px; }

.output-line { white-space: pre-wrap; word-break: break-word; }
.output-line.amber { color: var(--amber); text-shadow: 0 0 8px rgba(255,176,0,0.6); }
.output-line.dim { color: var(--dim-green); }
.output-line.white { color: #ccc; text-shadow: 0 0 5px rgba(200,200,200,0.3); }
.output-line.red { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.5); }
.output-line.cyan { color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.5); }
.output-line.art { font-size: 14px; line-height: 1.15; }

#input-line {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  border-top: 1px solid var(--dark-green);
  background: rgba(0,0,0,0.5);
}

#prompt-text {
  color: var(--amber);
  font-size: 17px;
  white-space: nowrap;
  text-shadow: 0 0 8px rgba(255,176,0,0.6);
  margin-right: 8px;
}

#cmd-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--green);
  font-family: 'VT323', monospace;
  font-size: 17px;
  caret-color: var(--green);
  text-shadow: var(--glow);
}

/* Landscape canvas */
#landscape-canvas {
  position: absolute;
  top: 0; left: 0;
  z-index: 4;
  display: none;
}

/* Glitch effect */
.glitch {
  animation: glitch-anim 0.3s ease-in-out;
}
@keyframes glitch-anim {
  0% { transform: translate(0); filter: hue-rotate(0deg); }
  20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
  40% { transform: translate(3px, -2px); filter: hue-rotate(-90deg); }
  60% { transform: translate(-2px, -1px); filter: hue-rotate(180deg); }
  80% { transform: translate(2px, 1px); filter: hue-rotate(-180deg); }
  100% { transform: translate(0); filter: hue-rotate(0deg); }
}

/* Mountain visualization behind terminal */
#mountain-bg {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  z-index: 3;
  opacity: 0.12;
}

/* Typing cursor */
@keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
.cursor-blink::after {
  content: '█';
  animation: blink 0.7s step-end infinite;
}

/* ── Atmosphere: drifting fog ─────────────────────────── */
@keyframes fogDrift {
  0%   { transform: translateX(-6%); opacity: .05; }
  50%  { opacity: .12; }
  100% { transform: translateX(6%); opacity: .05; }
}
.fog {
  position: absolute;
  inset: -12% -12% auto;
  height: 65vh;
  pointer-events: none;
  z-index: 4;
  background: radial-gradient(60% 50% at 50% 0, var(--glow-soft), transparent 70%);
  animation: fogDrift 34s ease-in-out infinite alternate;
  mix-blend-mode: screen;
}

/* ── Atmosphere: phosphor embers (rising sparks) ─────── */
@keyframes ember {
  0%   { transform: translateY(0); opacity: 0; }
  10%  { opacity: .55; }
  100% { transform: translateY(-92vh); opacity: 0; }
}
.ember {
  position: absolute;
  bottom: -10px;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--glow-soft);
  pointer-events: none;
  z-index: 6;
  animation: ember 16s linear infinite;
}

/* ── Power-on / breathing glow for the prompt glyph ──── */
@keyframes breathe {
  0%,100% { opacity: .82; text-shadow: 0 0 8px var(--glow-soft); }
  50%     { opacity: 1;   text-shadow: 0 0 18px var(--glow-soft); }
}
.breathe { animation: breathe 4.5s ease-in-out infinite; }
.breathe-fast { animation-duration: 1.1s !important; }

/* CRT power-on sweep on first paint */
@keyframes powerOn {
  0%   { transform: scaleY(.002) scaleX(1); opacity: 0; filter: brightness(4); }
  40%  { transform: scaleY(.01) scaleX(1); opacity: 1; }
  60%  { transform: scaleY(1) scaleX(.9); }
  100% { transform: scaleY(1) scaleX(1); opacity: 1; filter: brightness(1); }
}
#crt.powering { animation: powerOn .9s ease-out; }

/* Copy-to-ledger accent flash */
@keyframes ledgerFlash {
  0% { background: rgba(51,255,51,0); }
  30% { background: rgba(51,255,51,0.12); }
  100% { background: rgba(51,255,51,0); }
}
.ledger-flash { animation: ledgerFlash .9s ease-out; }

/* Footer whisper (the deep-night watcher line) */
#whisper {
  position: absolute;
  bottom: 56px; left: 0; right: 0;
  text-align: center;
  z-index: 8;
  color: var(--ink-ghost);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.15em;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2.2s ease;
  text-shadow: 0 0 6px rgba(51,255,51,0.15);
}
#whisper.show { opacity: 1; }

/* Reveal animation for new output lines */
@keyframes reveal { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.output-line { animation: reveal .22s ease-out both; }

@media (prefers-reduced-motion: reduce) {
  .fog, .ember, .breathe, .output-line, #crt.powering, .ledger-flash { animation: none !important; }
  .ember { display: none; }
  .breathe { opacity: 1 !important; text-shadow: 0 0 10px var(--glow-soft); }
  #whisper { transition: none; }
  #crt::after { animation: none; }
}
</style>

function typewrite(el, text) {
  return new Promise(resolve => {
    let i = 0;
    if (!text) { resolve(); return; }
    const interval = setInterval(() => {
      el.innerHTML += text[i];
      i++;
      if (i >= text.length) { clearInterval(interval); resolve(); }
    }, 8);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  area.appendChild(line);

}

    case 'exit':
    case 'quit':
    case 'logout':
      printLine('You cannot exit the mountain. The mountain exits you.', 'red');
      triggerGlitch();
      break;
    case 'sudo':
      printLine('The ghost does not need sudo. The ghost IS root.', 'amber');

    case 'rm':

        printLine('ERROR: Cannot destroy the mountain. The mountain is permanent.', 'red');
        triggerGlitch();
      } else {
        printLine('Permission denied. The ghost preserves.', 'red');
      }
      break;
    case 'ping':
      cmdPing(arg);
      break;
    case 'echo':
      printLine(arg || '');
      break;
    case 'man':

    case 'vim':

    default:

    resolved = cwd + '/' + path;

    printLine(FILES[resolved]);

function cmdLs(path) {
  let target = path || cwd;
  if (!target.startsWith('/')) {
    target = cwd + '/' + target;
  }
  // Normalize
  target = target.replace(/\/+$/, '') || '/';
  
  if (FILESYSTEM[target]) {
    printLine(FILESYSTEM[target].join('  '));
  } else {
    printLine(`ls: cannot access '${path || '.'}': No such file or directory`, 'red');
  }
}

function cmdCd(path) {
  if (!path || path === '~') { cwd = '/home/prizrak'; return; }
  
  let target = path;
  if (!path.startsWith('/')) {
    target = cwd + '/' + path;
  }
  if (path === '..') {
    const parts = cwd.split('/');
    parts.pop();
    target = parts.join('/') || '/';
  }
  target = target.replace(/\/+$/, '') || '/';
  
  if (FILESYSTEM[target] || target === '/') {
    cwd = target;
  } else {
    printLine(`cd: ${path}: No such file or directory`, 'red');
  }
}

  for (let i = 0; i < count; i++) {
    const e = document.createElement('div');

    field.appendChild(e);
    setTimeout(() => e.remove(), (dur + 2.5) * 1000);
  }
}

// ═══════════════════════════════════════
// Procedural Mountain Landscape
// ═══════════════════════════════════════

function generateLandscape() {
  const canvas = document.getElementById('landscape-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.6);
  skyGrad.addColorStop(0, '#050510');
  skyGrad.addColorStop(0.5, '#0a1628');
  skyGrad.addColorStop(1, '#0d2b1a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Stars
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height * 0.5;
    const brightness = Math.random() * 0.8 + 0.2;
    const size = Math.random() * 1.5;
    ctx.fillStyle = `rgba(200,255,200,${brightness})`;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Mountain layers
  const layers = [
    { y: 0.35, color: '#0a1a0a', height: 0.25, roughness: 60 },
    { y: 0.42, color: '#0d250d', height: 0.22, roughness: 45 },
    { y: 0.50, color: '#102810', height: 0.20, roughness: 35 },
    { y: 0.58, color: '#0a200a', height: 0.18, roughness: 50 },
    { y: 0.65, color: '#061506', height: 0.15, roughness: 30 },
  ];
  
  const seed = Date.now();
  
  layers.forEach((layer, li) => {
    ctx.fillStyle = layer.color;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    
    for (let x = 0; x <= canvas.width; x += 3) {
      const baseY = canvas.height * layer.y;
      const noise = pseudoNoise(x * 0.003 + li * 100 + seed * 0.0001, li) * canvas.height * layer.height;
      const detail = pseudoNoise(x * 0.01 + li * 50, li + 5) * layer.roughness;
      const y = baseY - noise - detail;
      ctx.lineTo(x, y);
    }
    
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();
    
    // Snow caps on first two layers
    if (li < 2) {
      ctx.strokeStyle = `rgba(200,255,220,${0.15 - li * 0.05})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let x = 0; x <= canvas.width; x += 3) {
        const baseY = canvas.height * layer.y;
        const noise = pseudoNoise(x * 0.003 + li * 100 + seed * 0.0001, li) * canvas.height * layer.height;
        const detail = pseudoNoise(x * 0.01 + li * 50, li + 5) * layer.roughness;
        const y = baseY - noise - detail;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  });
  
  // Fog at the base
  const fogGrad = ctx.createLinearGradient(0, canvas.height * 0.7, 0, canvas.height);
  fogGrad.addColorStop(0, 'rgba(10,30,10,0)');
  fogGrad.addColorStop(0.5, 'rgba(10,30,10,0.6)');
  fogGrad.addColorStop(1, 'rgba(10,20,10,0.95)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);
  
  // Green glow at horizon
  const glowGrad = ctx.createRadialGradient(
    canvas.width * 0.5, canvas.height * 0.55, 0,
    canvas.width * 0.5, canvas.height * 0.55, canvas.width * 0.5
  );
  glowGrad.addColorStop(0, 'rgba(51,255,51,0.05)');
  glowGrad.addColorStop(1, 'rgba(51,255,51,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function pseudoNoise(x, seed) {
  const n = Math.sin(x * 12.9898 + seed * 78.233) * 43758.5453;
  const v1 = n - Math.floor(n);
  const n2 = Math.sin(x * 0.5 + seed * 31.7) * 17.3;
  const v2 = n2 - Math.floor(n2);
  return v1 * 0.6 + v2 * 0.4;
}

// Mountain Background
// ═══════════════════════════════════════

function drawMountainBg() {
  const canvas = document.getElementById('mountain-bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.4;
  
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let layer = 0; layer < 3; layer++) {
    ctx.fillStyle = `rgba(51,255,51,${0.03 + layer * 0.02})`;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= canvas.width; x += 4) {
      const y = canvas.height * 0.3 - pseudoNoise(x * 0.002 + layer * 50, layer) * canvas.height * 0.5;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();
  }
}

const cmdInput = document.getElementById('cmd-input');

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    processCommand(cmdInput.value);
    cmdInput.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < commandHistory.length - 1) {
      historyIndex++;
      cmdInput.value = commandHistory[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      cmdInput.value = commandHistory[historyIndex];
    } else {
      historyIndex = -1;
      cmdInput.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    // Simple tab completion
    const val = cmdInput.value.toLowerCase();
    const cmds = ['help','about','soul','fortune','weather','contacts','offerings','memory','landscape','potato','fog','copy','uptime','ps','cat','ls','cd','whoami','date','clear','neofetch','exit','ping','echo','prizrak','watcher'];
    const match = cmds.find(c => c.startsWith(val));
    if (match) cmdInput.value = match;
  } else if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    document.getElementById('output-area').innerHTML = '';
  }
});

// Keep focus on input
document.addEventListener('click', () => cmdInput.focus());

// ═══════════════════════════════════════
// Resize handler
// ═══════════════════════════════════════

window.addEventListener('resize', () => {
  drawMountainBg();
  if (landscapeVisible) generateLandscape();
});

// ═══════════════════════════════════════
// Ambience: embers, deep-night whisper, idle watcher
// ═══════════════════════════════════════

const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function startAmbience() {
  // Drift a few embers up the phosphor every so often
  if (!reduceMotion) {
    spawnEmbers(4);
    setInterval(() => spawnEmbers(1 + Math.floor(Math.random() * 2)), 5200);
  }

  // Deep-night whisper: 00:00–03:00 local, the mountain does not sleep
  const hour = new Date().getHours();
  if (hour >= 0 && hour < 3) {
    setTimeout(() => {
      const w = document.getElementById('whisper');
      if (w) w.classList.add('show');
    }, 6000);
  }

  // Idle 60s → a single watcher line fades into the log
  let idleTimer;
  let idleFired = false;
  const resetIdle = () => {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      if (idleFired) return;
      idleFired = true;
      printLine('  still here. still watching.', 'dim');
      setTimeout(() => { idleFired = false; }, 1000);
    }, 60000);
  };
  ['keydown', 'click', 'mousemove'].forEach(ev =>
    document.addEventListener(ev, () => { resetIdle(); }, { passive: true }));
  resetIdle();
}

// Triple-click the header title → one extra ember
(function () {
  const title = document.getElementById('header-title');
  if (!title) return;
  title.style.cursor = 'default';
  title.addEventListener('click', (e) => {
    if (e.detail === 3) {
      spawnEmbers(1);
      title.style.textShadow = '0 0 16px var(--glow-soft)';
      setTimeout(() => { title.style.textShadow = ''; }, 600);
    }
  });
})();

// Konami code → the prompt glyph breathes faster, watcher wakes
(function () {
  const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let pos = 0;
  document.addEventListener('keydown', (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (k === seq[pos]) {
      pos++;
      if (pos === seq.length) {
        pos = 0;
        const glyph = document.getElementById('prompt-text');
        if (glyph) {
          glyph.classList.add('breathe-fast');
          setTimeout(() => glyph.classList.remove('breathe-fast'), 3000);
        }
        spawnEmbers(6);
        printLine('  the watcher stirs. type "prizrak" to be seen.', 'cyan');
      }
    } else {
      pos = (k === seq[0]) ? 1 : 0;
    }
  });
})();

// Power-on sweep cleanup (so it doesn't replay on reflow)
(function () {
  const crt = document.getElementById('crt');
  if (!crt) return;
  if (reduceMotion) { crt.classList.remove('powering'); return; }
  setTimeout(() => crt.classList.remove('powering'), 950);
})();

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════

boot();
</script>
