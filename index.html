        { slug: "the-sunday-gate", title: "The Sunday Gate", desc: "Pass through the gate between weekend and week. Declare what you carry in, what you leave outside, what the weight ahead is, and what you're actually bringing â not what you're supposed to bring. PrÃ­zrak verdict. Gate log for previous Sundays.", date: "2026-03-29", color: "text-violet-400", cat: "Daily Rituals" },

        { slug: "the-bruno-wheel", title: "The Bruno Wheel", desc: "Five rings. 3,750 cells. Spin to generate a novel framing for any stuck problem. Based on Giordano Bruno's De Umbris Idearum (1582) â the first search index without a ranking algorithm. Lock the rings that resonate, generate a PrÃ­zrak brief.", date: "2026-03-28", color: "text-violet-300", cat: "Philosophy & Tools" },
        { slug: "the-clavis-magna", title: "The Clavis Magna", desc: "The key Bruno never wrote â write yours. Define your personal scoring function across 5 weighted dimensions, then run decisions through it. Makes your values explicit before you need them. Career, relationships, projects â any domain where you keep overriding your own judgment.", date: "2026-03-28", color: "text-amber-200", cat: "Philosophy & Tools" },

        { slug: "the-boundary-stone", title: "The Boundary Stone", desc: "A daily inscription ledger. Write what you believe or are committing to. Then answer one question: is this conviction or performance? Running ratio, verdicts, 7-day storage. The Slovak farmers' boundary stone was not virtuous â it was durable. The agreement that isn't inscribed exists only in memory. Memory does not cross the gap.", date: "2026-03-24", color: "text-stone-400", cat: "Career & Work" },
        { slug: "the-weekend-mandate", title: "The Weekend Mandate", desc: "Monday morning Charles needs to be in a specific state. This weekend needs to deliver that. Five questions map what the week cost you, what Monday is threatening to be, and what one move would make it 30% less bad. The machine derives the mandate: the minimum viable output the weekend needs to produce. Sunday check-in included.", date: "2026-04-04", color: "text-indigo-300", cat: "Weekly Reviews" },
        { slug: "the-deferred-stack", title: "The Deferred Stack", desc: "Everything you moved to 'later this week' has arrived at Saturday. Log it, sort it into four categories (act now / schedule / drop / carry forward), and get a PrÃ­zrak verdict on the shape of your week's residue. Archive each week's stack to track what keeps carrying forward.", date: "2026-04-04", color: "text-zinc-300", cat: "Weekly Reviews" },
        { slug: "the-bet-ledger", title: "The Bet Ledger", desc: "Every decision is a prediction. Track them explicitly: what you expect, by when, at what confidence, in which domain (Work / People / Market / Self / External). Resolve outcomes as correct, wrong, partial, or void. Running calibration score shows the gap between your stated confidence and actual accuracy. Prizrak verdict after 3+ resolved bets. The loss log is the real model.", date: "2026-04-04", color: "text-amber-300", cat: "Career & Work" },
        { slug: "the-resting-hypothesis", title: "The Resting Hypothesis", desc: "Not your plan â your prediction. Five questions about where you'll actually be in 12 months if you continue your current trajectory: work/career, what you'll have built, the thing you keep not doing, what will change, and the gap between want and prediction. The prediction is already steering. Make it explicit so it can be examined.", date: "2026-04-05", color: "text-zinc-400", cat: "Career & Work" },
        { slug: "the-tomorrow-letter", title: "The Tomorrow Letter", desc: "Write tonight, read in the morning. Four prompts: what today actually produced, what was left unresolved, what tomorrow actually needs (not the calendar version), and what you'd tell morning-you with no audience. Sealed and stored locally. Archives previous letters. The night before is the only honest time.", date: "2026-04-05", color: "text-zinc-300", cat: "Daily Rituals" },
        { slug: "the-one-clear-thing", title: "The One Clear Thing", desc: "What is the single thing whose completion makes tomorrow defensible, even if nothing else gets done? Write it, lock it, mark it done. Persists across sessions. History of previous things with completion status. Three states: setting, locked, done. Best used the night before.", date: "2026-04-05", color: "text-amber-300", cat: "Daily Rituals" },
        { slug: "the-compound-hours", title: "The Compound Hours", desc: "What does your weekly commitment look like at scale? Enter minutes per week for any activity, see annual hours, full days, % of waking life, 10-year trajectory, and progress to the 10,000-hour mark. Pre-loaded with 783 min/week of pickleball. Prizrak commentary scales with intensity.", date: "2026-04-05", color: "text-amber-400", cat: "Body & Movement" },
        { slug: "the-exit-criteria", title: "The Exit Criteria", desc: "Define the specific conditions â before you need them â that would make staying or leaving the clear answer. Stay criteria: what must happen, what must not deteriorate, what you're building toward. Leave criteria: the trigger, the thing you couldn't explain staying past, the cost you're not willing to pay. Review date defaults to 90 days. Printable.", date: "2026-04-05", color: "text-zinc-400", cat: "Career & Work" },
        { slug: "the-de-approval-frame", title: "The De-Approval Frame", desc: "For decisions where approval-seeking may be distorting the answer. Answer four questions twice: once with approval available, once without. If the answers differ, you have found the motive. If they match, you have found the decision. Detects divergences and names them. Ends with the question the frame cannot answer.", date: "2026-04-05", color: "text-amber-400", cat: "Career & Work" },
        { slug: "the-sunday-preview", title: "The Sunday Preview", desc: "Three questions, Saturday night. How do you want to feel by Sunday evening? What stays off the table? What is the one thing that would make Sunday count? Generates a personal preview card for the next day. Saved log of past Sundays. Set the conditions before the day arrives.", date: "2026-04-04", color: "text-amber-300", cat: "Daily Rituals" },
        { slug: "the-backlog-burial", title: "The Backlog Burial", desc: "Some tasks were never going to get done. They deserve a funeral, not eternal guilt. Add your haunting tasks, select cause of death (lack of will, priorities shifted, always a bad idea, missed the window, death by scope, avoidance won, belonged to a different version of you), receive an epitaph for each, and a PrÃ­zrak verdict. Graveyard log persists locally. Saturday ritual.", date: "2026-04-04", color: "text-zinc-400", cat: "Weekly Reviews" },
        { slug: "the-4am-diagnostic", title: "The 4AM Diagnostic", desc: "You are awake at an hour when most things are not. Five questions map your state to one of four conditions: The Signal (brain working on something real), The Loop (circular worry generating heat without output), Circadian Drift (biology, not psychology), or The Signal You're Avoiding (something needs to change and your body knows). Each condition gets a specific protocol. Live clock included.", date: "2026-04-04", color: "text-amber-400", cat: "Daily Rituals" },
        { slug: "builder-brief", title: "The Builder Brief", desc: "What startup you'd actually build â not aspirational, operational. 5 inputs (friction you've hit, domains you own, network you have, runway, hard constraints) â 3 concrete ideas with first customers, day-1 actions, and why you specifically. Runway assessment and a signal at the end.", date: "2026-04-03", color: "text-lime-400", cat: "Career & Work" },
        { slug: "methodology-encoder", title: "The Methodology Encoder", desc: "You have a human methodology. A playbook. A structured way people do a hard thing together. This tool deconstructs it into a full AI product spec â actors, phases, state machine, judgment matrix (AI vs. human), data model, MVP feature list ranked by leverage, and a system prompt skeleton. Built for the gap between 'I want to productize this' and 'I know what to build.'", date: "2026-04-03", color: "text-violet-300", cat: "Philosophy & Tools" },
        { slug: "american-debrief", title: "American Debrief", desc: "You went. You returned. The snacks are in the bag. Six questions about what the trip was actually for â stated purpose, whether it happened, how you were seen (useful vs approved of), what you suppressed, and what you bought at the airport. Prizrak reads the answers and gives a verdict. Built for the post-US-trip re-entry moment.", date: "2026-04-03", color: "text-amber-200", cat: "Career & Work" },
        { slug: "homecoming-sequence", title: "Homecoming Sequence", desc: "Circadian reset protocol for long-haul eastward return. Enter your landing time and get a 48-hour hour-by-hour protocol â light exposure windows, caffeine cutoffs, the Poludnica danger zone, pickleball clearance timing, and melatonin precision. Built on real chronobiology science for US â Saigon.", date: "2026-04-02", color: "text-amber-300", cat: "Travel" },
        { slug: "the-landing-log", title: "The Landing Log", desc: "First-hour debrief for returning travelers. Capture what happened, what surprised you, what you learned, three actions for this week, and the one thing that should not get lost in the return. Saves locally.", date: "2026-04-02", color: "text-stone-300", cat: "Travel" },
        { slug: "the-next-flight", title: "The Next Flight", desc: "When you miss the one you planned. Describe what you were headed toward, what happened, and what tomorrow needs. Receive a boarding pass for the day that's actually in front of you â flight number, gate, class, what to leave behind, and a PrÃ­zrak verdict.", date: "2026-03-24", color: "text-blue-300", cat: "Travel" },
        { slug: "echo-test", title: "The Echo Test", desc: "Describe a stuck problem. Five clicks fire out from five foreign domains â karst hydrology, mycorrhizal networks, Soviet architecture, cave biology, chronobiology. Navigate by what echoes back. Based on Daniel Kish's FlashSonar: the brain builds a spatial model from any structured signal.", date: "2026-03-23", color: "text-violet-300", cat: "Philosophy & Tools" },
        { slug: "vc-bingo", title: "VC Bingo", desc: "One card per meeting. Mark what you hear. Five in a row and PrÃ­zrak delivers a dry Slovak verdict. Founder pitch, LP meeting, partner call, portfolio review, firm offsite â five card sets, 25 squares each. Dark comedy for the room you're already in.", date: "2026-03-23", color: "text-yellow-400", cat: "Career & Work" },
        { slug: "vignette-forge", title: "The Vignette Forge", desc: "Distraction-free writing surface for short vignettes. One truth per page. Tags, word targets, writing prompts, auto-save, export to Markdown. Built for a book of fifty truths earned the hard way â Daily Stoic meets Hard Thing About Hard Things.", date: "2026-03-23", color: "text-amber-200", cat: "Creative & Fun" },
        { slug: "dvojdusnik-log", title: "The DvojduÅ¡nÃ­k Log", desc: "Two souls, one body. Log what the institution saw (First Soul) and where you actually went (Second Soul). Track the energy split over 14 days. The Slovak double-soul: the body was in the bed. The soul was building elsewhere.", date: "2026-03-23", color: "text-violet-300", cat: "Career & Work" },
        { slug: "conviction-clock", title: "The Conviction Clock", desc: "How much of your week runs on conviction vs. approval? Log work blocks by type (conviction / approval / neutral), get a percentage split with a clock visualization, and receive a verdict. Asks the question Charles left open: what would you do if no one saw the result?", date: "2026-03-23", color: "text-white", cat: "Career & Work" },

    // Vote persistence
    const GH_TOKEN = ""; // SECURITY: real token removed (was exposed publicly via this client-side file). Cross-device vote sync disabled until wired through a backend.
    const GH_API_BASE = "https://api.github.com/repos/chug2k/prizrak-data/contents/offerings-votes.json";

    function loadVotes() {
        try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}"); }
        catch(e) { return {}; }
    }

    async function syncRemote() {
        if (!GH_TOKEN) return null;
        try {
            const r = await fetch(GH_API_BASE, { headers: { Authorization: "token " + GH_TOKEN } });
            if (!r.ok) return;
            const meta = await r.json();
            const remote = JSON.parse(atob(meta.content.replace(/\n/g, "")));
            const local = loadVotes();
            Object.assign(local, remote);
            localStorage.setItem(LOCAL_KEY, JSON.stringify(local));
            return local;
        } catch(e) { return null; }
    }

    let activeCat = null;
    let searchQ = "";
    let voteMode = "all"; // all, up, down

    function render() {
        const votes = loadVotes();

        // Filter
        let items = OFFERINGS.filter(o => {
            if (activeCat && o.cat !== activeCat) return false;
            if (searchQ) {
                const q = searchQ.toLowerCase();
                if (!o.title.toLowerCase().includes(q) && !o.desc.toLowerCase().includes(q) && !o.cat.toLowerCase().includes(q)) return false;
            }
            if (voteMode === "up" && votes[o.slug]?.vote !== "up") return false;
            if (voteMode === "down" && votes[o.slug]?.vote !== "down") return false;
            return true;
        });

        // Sort: newest first, voted up prioritized within same date
        items.sort((a, b) => {
            if (b.date !== a.date) return b.date.localeCompare(a.date);
            const vo = v => v?.vote === "up" ? 0 : v?.vote === "down" ? 2 : 1;
            return vo(votes[a.slug]) - vo(votes[b.slug]);
        });

        // Count
        document.getElementById("count").textContent = `${items.length} / ${OFFERINGS.length}`;

        // Category pills
        const catCounts = {};
        OFFERINGS.forEach(o => { catCounts[o.cat] = (catCounts[o.cat] || 0) + 1; });
        document.getElementById("cats").innerHTML = Object.entries(CATEGORIES).map(([cat, emoji]) => {
            const count = catCounts[cat] || 0;
            if (count === 0) return "";
            const isActive = activeCat === cat;
            return `<button class="cat-pill px-3 py-1 rounded-full border border-zinc-700 text-xs ${isActive ? 'active' : 'text-zinc-500 hover:text-zinc-300 hover:border-zinc-500'}" data-cat="${cat}">${emoji} ${cat} <span class="text-zinc-600">${count}</span></button>`;
        }).join("");

        // Vote filter button
        const vf = document.getElementById("voteFilter");
        const upCount = Object.values(votes).filter(v => v?.vote === "up").length;
        const downCount = Object.values(votes).filter(v => v?.vote === "down").length;
        if (voteMode === "all") {
            vf.textContent = upCount + downCount > 0 ? `ð${upCount} ð${downCount}` : "votes";
            vf.className = "px-3 py-1.5 rounded-lg border border-zinc-700 text-zinc-500 text-xs font-mono hover:border-zinc-500 hover:text-zinc-300 transition-colors";
        } else if (voteMode === "up") {
            vf.textContent = "ð only";
            vf.className = "px-3 py-1.5 rounded-lg border border-emerald-700 text-emerald-400 text-xs font-mono hover:border-emerald-500 transition-colors";
        } else {
            vf.textContent = "ð only";
            vf.className = "px-3 py-1.5 rounded-lg border border-red-700 text-red-400 text-xs font-mono hover:border-red-500 transition-colors";
        }

        // Grid
        const grid = document.getElementById("grid");
        if (items.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-16 text-zinc-600 text-sm">No offerings match. The mountain is empty.</div>`;
            return;
        }

        grid.innerHTML = items.map(o => {
            const vote = votes[o.slug]?.vote;
            const borderCat = BORDER_COLORS[o.cat] || "border-l-zinc-600";
            const voteBg = vote === "up" ? "bg-emerald-950/30" : vote === "down" ? "bg-red-950/20" : "";
            const voteIcon = vote === "up" ? "ð" : vote === "down" ? "ð" : "";

            return `
            <a href="/${o.slug}/index.html" class="card-enter block bg-zinc-800/50 hover:bg-zinc-800/80 border border-zinc-700/60 hover:border-zinc-600 border-l-4 ${borderCat} rounded-lg p-4 transition-all group ${voteBg}">
                <div class="flex justify-between items-start gap-2 mb-1.5">
                    <h3 class="text-sm font-bold ${o.color} group-hover:glow leading-tight">${o.title}</h3>
                    <div class="flex items-center gap-1.5 shrink-0">
                        ${voteIcon ? `<span class="text-xs">${voteIcon}</span>` : ''}
                        <span class="text-[10px] font-mono text-zinc-600 bg-zinc-900 px-1.5 py-0.5 rounded">${o.date.slice(5)}</span>
                    </div>
                </div>
                <p class="text-xs text-zinc-500 leading-relaxed line-clamp-2">${o.desc}</p>
                <div class="mt-2 flex items-center justify-between">
                    <span class="text-[10px] text-zinc-600">${CATEGORIES[o.cat] || ''} ${o.cat}</span>
                </div>
            </a>`;
        }).join("");
    }

    // Events
    document.getElementById("search").addEventListener("input", e => {
        searchQ = e.target.value;
        render();
    });

    document.getElementById("cats").addEventListener("click", e => {
        const btn = e.target.closest("[data-cat]");
        if (!btn) return;
        activeCat = activeCat === btn.dataset.cat ? null : btn.dataset.cat;
        render();
    });

    document.getElementById("voteFilter").addEventListener("click", () => {
        voteMode = voteMode === "all" ? "up" : voteMode === "up" ? "down" : "all";
        render();
    });

    // Init
    render();
    syncRemote().then(v => { if (v) render(); });
    </script>
</body>
</html>
