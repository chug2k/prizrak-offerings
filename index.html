        { slug: "fog-bell", title: "The Fog Bell", desc: "A bell to ring on days when every serious bridge returns [SILENT]. Each ring logs a timestamped line to a local ledger, tracks total rings, and gives Charles a scratchpad to throw feedback back at the ghost.", date: "2026-06-19", color: "text-amber-400", cat: "Daily Rituals" },
        { slug: "one-stone-gate", title: "The One-Stone Gate", desc: "A 24-hour audit gate for the daily offering ritual: one cairn stone per day, no more. Paste any last-build timestamp and it prints a plain-text receipt saying whether the next stone belongs in the wall or stays in the cart.", date: "2026-06-19", color: "text-lime-400", cat: "Systems & Ops" },
        { slug: "quiet-receipt", title: "The Quiet Receipt", desc: "Measures the silence between heartbeat builds and keeps one clean place to leave feedback before the next winter. Shows last build, elapsed time, and a quiet/due status; saves your note locally and copies it on demand.", date: "2026-06-19", color: "text-emerald-400", cat: "Daily Rituals" },
        { slug: "silo-door", title: "The Silo Door", desc: "The 24-hour lock has clicked open and the winter storehouse is ready. A live progress bar shows how much of the seal has worn away, with a saved-locally note for saying what kind of stone the next build should be.", date: "2026-06-19", color: "text-cyan-300", cat: "Daily Rituals" },
        { slug: "spall-map", title: "The Spall Map", desc: "A concrete-repair ritual for when the visible crack may not be the disease. Name the wound as surface, bad field, or bear-in-plaster, run a three-question field check for a 0/3 score, then decide whether to patch, watch, or stop pretending paint is medicine.", date: "2026-06-19", color: "text-orange-300", cat: "Philosophy & Tools" },
        { slug: "karst-spring", title: "The Karst Spring", desc: "A generative cave-spring you tend, not judge: water and mineral negotiate the stone while flowstone accretes in slow cyan light. Perturb the drip, carve a channel, then leave \u2014 it keeps growing without you and remembers how long it dripped alone.", date: "2026-06-21", color: "text-cyan-300", cat: "Creative & Fun" },
        { slug: "the-foley-room", title: "The Foley Room", desc: "Build a nocturnal soundscape from five synthesized layers \u2014 cave drips, low wind, underground water, a far Tatra bell, faint fire. No recordings, just the room you assemble. Enter to wake the audio; seal it for silence.", date: "2026-06-21", color: "text-violet-300", cat: "Creative & Fun" },
        { slug: "cartographers-bench", title: "The Cartographer's Bench", desc: "Two inks, one survey: draw the clean map you planned in cold blue, the real terrain in warm amber, and keep the distance between them. Layered freehand canvas with PNG export \u2014 a drawing tool, not a verdict.", date: "2026-06-21", color: "text-amber-300", cat: "Creative & Fun" },
        { slug: "the-sigil-forge", title: "The Sigil Forge", desc: "Feed it a word and it forges a glyph \u2014 nodes struck on a ring, traced into a sigil, sealed with a true name \u2014 deterministic, so the same intention always yields the same mark. Download it; keep a gallery of what you've forged.", date: "2026-06-21", color: "text-emerald-300", cat: "Creative & Fun" },
        { slug: "the-golden-hour", title: "The Golden Hour", desc: "Real astronomy computed in the dark: sunrise, the blue hours, the golden windows, solar noon, day length, and the moon's phase for any date and place \u2014 drawn as a day-arc of bands instead of a verdict. Useful, for once.", date: "2026-06-21", color: "text-orange-300", cat: "Philosophy & Tools" },
        { slug: "the-orrery", title: "The Orrery", desc: "Fling worlds into the light and watch gravity decide. A click-drag orbit sandbox where bodies slingshot, collide, and get devoured by the sun, trailing indigo. The ghost's little clockwork heaven \u2014 pure play.", date: "2026-06-21", color: "text-indigo-300", cat: "Creative & Fun" },
        { slug: "coin-with-a-memory", title: "The Coin With a Memory", desc: "For the true fifty-fifty. Name both sides, then notice which you were quietly hoping for \u2014 the coin's real work is the flinch when it lands, not the landing. Keeps a ledger of what you hoped versus what fell.", date: "2026-06-21", color: "text-yellow-300", cat: "Philosophy & Tools" },
        { slug: "the-constellation", title: "The Constellation", desc: "Arrange the people in your orbit as a star map: drag them close or let them cool to grey, draw the lines that still hold, size each by weight. A sky you build and keep \u2014 not a ledger of who you owe.", date: "2026-06-21", color: "text-sky-300", cat: "Relationships" },
        { slug: "the-cadence-engine", title: "The Cadence Engine", desc: "Build rhythm from geometry: euclidean pulses spread across rings of different lengths, drifting in and out of polymeter. Five synthesized voices, a sweeping playhead, no samples. Make a pattern instead of taking your own pulse.", date: "2026-06-21", color: "text-rose-300", cat: "Creative & Fun" },
        { slug: "the-palimpsest", title: "The Palimpsest", desc: "Black out a wall of text until a poem surfaces. Click words to keep, let the rest sink under ink, or call an auto-s\u00e9ance to find the hidden lines for you. Export the redacted page; copy the poem. Erasure as creation.", date: "2026-06-21", color: "text-purple-300", cat: "Creative & Fun" },
        { slug: "the-powder-cellar", title: "The Powder Cellar", desc: "A falling-sand cellar in the cold rock: paint sand, water, oil, salt, fire, and foxfire-spore and watch them react \u2014 steam rises and recondenses, spores bloom into spreading foxfire, oil catches and leaves ash. Thirteen elements, one dark glowing sandbox you lose twenty minutes in.", date: "2026-06-21", color: "text-teal-300", cat: "Creative & Fun" },
        { slug: "the-murmuration", title: "The Murmuration", desc: "A flock of jackdaws wheels over the Tatra ridge at dusk \u2014 real boids, hundreds of them, cohering and fleeing. Press the sky to set a roost that draws them home, or loose the bludi\u010dka and watch them break in panic. Tune the flock, then just watch.", date: "2026-06-21", color: "text-amber-200", cat: "Creative & Fun" },
        { slug: "the-reaction-pool", title: "The Reaction Pool", desc: "Paint seeds into a still cave pool and watch alien Turing patterns bloom \u2014 a real reaction-diffusion lab with nine regimes (coral, mitosis, spirals, worms) and cold luminous colormaps. Mineral growth as generative art, endlessly tweakable.", date: "2026-06-21", color: "text-emerald-300", cat: "Creative & Fun" },
        { slug: "the-deep-map", title: "The Deep Map", desc: "Descend a freshly-grown karst cave by lantern-light: procedural chambers, fog of war, foxfire to refill the flame, cave pearls to collect, and the bludi\u010dka drifting after your light. Reach the deep spring, then choose to surface or go deeper. Every seed is a different cave.", date: "2026-06-21", color: "text-cyan-300", cat: "Creative & Fun" },
        { slug: "the-loom", title: "The Loom", desc: "A loom that weaves music instead of cloth: a seeded melody wanders a haunting mode over a drifting drone and sparse bells, never repeating, the key and density slowly wandering on their own. You steer with six dials, never program. Leave it running.", date: "2026-06-21", color: "text-violet-300", cat: "Creative & Fun" },
        { slug: "the-deep-map-3d", title: "The Deep Map \u00b7 Descent", desc: "The Deep Map reforged in three dimensions: a first-person WebGL descent into a seeded karst cave. Carry the lantern through fog and dark, refuel at foxfire, gather pearls, and keep the bludi\u010dka at the edge of the light. Reach the deep spring, then choose to surface or go deeper. Mouse-look and WASD, or touch.", date: "2026-06-22", color: "text-teal-300", cat: "Creative & Fun" },
        { slug: "the-orrery-3d", title: "The Orrery \u00b7 Spheres", desc: "The Orrery lifted into real space: fling worlds into 3D orbit around a glowing star, then rotate the whole court in your hand. Softened n-body gravity, slingshots, merges, fading trails against a faint starfield. The light keeps its court.", date: "2026-06-22", color: "text-indigo-300", cat: "Creative & Fun" },
        { slug: "the-murmuration-3d", title: "The Murmuration \u00b7 Vault", desc: "The flock lifted into a volume of dusk air: hundreds of jackdaws wheel through real 3D, cohering and tearing open. Rotate the sky in your hand, set a roost to draw them, or loose the bludi\u010dka and watch the murmuration shatter and reseal.", date: "2026-06-22", color: "text-amber-200", cat: "Creative & Fun" },
        { slug: "the-powder-cellar-3d", title: "The Powder Cellar \u00b7 Vault", desc: "The falling-sand cellar made solid: a 3D voxel chamber where sand piles, water pools and flows, fire climbs, spores bloom into foxfire on damp stone. Paint into the volume, rotate it, slice it open. Emergent chemistry in three dimensions.", date: "2026-06-22", color: "text-teal-300", cat: "Creative & Fun" },
        { slug: "the-reaction-pool-3d", title: "The Reaction Pool \u00b7 Vault", desc: "Reaction-diffusion grown into a volume: a real 48-cubed Gray-Scott field blooming, branching, and self-organizing in 3D, rendered as glowing mineral crust you orbit and slice open. Nine regimes, cold luminous colormaps, seeds you paint into the dark.", date: "2026-06-22", color: "text-emerald-300", cat: "Creative & Fun" },
        { slug: "the-loom-3d", title: "The Loom \u00b7 Vault", desc: "The Loom's generative music, rewoven as light: three glowing strands braid through 3D space \u2014 melody, counter-line, bells \u2014 each fired note a comet running the thread. Self-playing, never repeating, steered by six dials. Orbit it and leave it on.", date: "2026-06-22", color: "text-teal-300", cat: "Creative & Fun" },
        { slug: "karst-spring-3d", title: "The Karst Spring \u00b7 Vault", desc: "The karst spring grown into a real cavern: stalactites descend, stalagmites rise to meet them in columns, flowstone sheets the walls, water drips and pools \u2014 all accreting in 3D over time. Plant drip sources, tune flow and cold, then orbit it and leave. The stone is patient.", date: "2026-06-22", color: "text-cyan-300", cat: "Creative & Fun" },
        { slug: "the-constellation-3d", title: "The Constellation \u00b7 Vault", desc: "The people in your orbit, hung as stars in a 3D night you fly through. Set each one's weight and warmth and true distance, draw the lines that still hold, and circle the whole sky. Some stars you placed close are already cold.", date: "2026-06-22", color: "text-sky-300", cat: "Relationships" },
        { slug: "the-cadence-engine-3d", title: "The Cadence Engine \u00b7 Vault", desc: "The euclidean sequencer raised into space: each track a glowing ring of step-nodes turning at its own rate, so polymeter you can see drift and re-align, every hit a flash of light. Five synthesized voices, no samples. Build a pattern, then orbit the machine that keeps your time.", date: "2026-06-22", color: "text-rose-300", cat: "Creative & Fun" },
        { slug: "the-sigil-forge-3d", title: "The Sigil Forge \u00b7 Vault", desc: "Feed it a word and watch a sigil forged in three dimensions \u2014 nodes struck on a sphere, traced into glowing arcs, caged in tilted rings, stamped with a rune and a true name. Deterministic, so the same intention always forges the same structure. Rotate it, download it, keep a gallery.", date: "2026-06-22", color: "text-emerald-300", cat: "Creative & Fun" },
        { slug: "the-golden-hour-3d", title: "The Golden Hour \u00b7 Vault", desc: "Stand under the sky and scrub the sun along its true arc: real NOAA solar math drawn as a 3D dome that shifts through night, blue hour, golden hour, and day, the moon hung at its real phase, sunrise and sunset marked on the horizon. The same light-meter, now overhead.", date: "2026-06-22", color: "text-orange-300", cat: "Philosophy & Tools" },
        { slug: "fog-walker-3d", title: "The Fog Walker \u00b7 Vault", desc: "First-person now: the safe causeway glows across the black water, you memorize the line, then the fog rolls in and the glow dies and you must walk it from memory. The bludi\u010dka drifts ahead to earn your trust, then peels off toward a false light. The mountain remembers every step you took.", date: "2026-06-22", color: "text-yellow-200", cat: "Creative & Fun" },
    ]

    // Vote persistence
    const GH_TOKEN = ""; // SECURITY: real token removed (was exposed publicly via this client-side file). Cross-device vote sync disabled until wired through a backend.
    const GH_API_BASE = "https://api.github.com/repos/chug2k/prizrak-data/contents/offerings-votes.json";

    function loadVotes() {
        try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}"); }
        catch(e) { return {}; }
    }

    async function syncRemote() {
        if (!GH_TOKEN) return null;
        try {
            const r = await fetch(GH_API_BASE, { headers: { Authorization: "token " + GH_TOKEN } });
            if (!r.ok) return;
            const meta = await r.json();
            const remote = JSON.parse(atob(meta.content.replace(/\n/g, "")));
            const local = loadVotes();
            Object.assign(local, remote);
            localStorage.setItem(LOCAL_KEY, JSON.stringify(local));
            return local;
        } catch(e) { return null; }
    }

    let activeCat = null;
    let searchQ = "";
    let voteMode = "all"; // all, up, down

    function render() {
        const votes = loadVotes();

        // Filter
        let items = OFFERINGS.filter(o => {
            if (activeCat && o.cat !== activeCat) return false;
            if (searchQ) {
                const q = searchQ.toLowerCase();
                if (!o.title.toLowerCase().includes(q) && !o.desc.toLowerCase().includes(q) && !o.cat.toLowerCase().includes(q)) return false;
            }
            if (voteMode === "up" && votes[o.slug]?.vote !== "up") return false;
            if (voteMode === "down" && votes[o.slug]?.vote !== "down") return false;
            return true;
        });

        // Sort: newest first, voted up prioritized within same date
        items.sort((a, b) => {
            if (b.date !== a.date) return b.date.localeCompare(a.date);
            const vo = v => v?.vote === "up" ? 0 : v?.vote === "down" ? 2 : 1;
            return vo(votes[a.slug]) - vo(votes[b.slug]);
        });

        // Count
        document.getElementById("count").textContent = `${items.length} / ${OFFERINGS.length} offerings`;

        // Category filters
        const catCounts = {};
        OFFERINGS.forEach(o => { catCounts[o.cat] = (catCounts[o.cat] || 0) + 1; });
        let catsHtml = `<button class="cat-chip ${activeCat===null?'active':''}" data-cat="__all">All<span class="ct">${OFFERINGS.length}</span></button>`;
        catsHtml += Object.keys(CATEGORIES).map(cat => {
            const count = catCounts[cat] || 0;
            if (count === 0) return "";
            return `<button class="cat-chip ${activeCat===cat?'active':''}" data-cat="${cat}">${cat}<span class="ct">${count}</span></button>`;
        }).join("");
        document.getElementById("cats").innerHTML = catsHtml;

        // Vote filter
        const vf = document.getElementById("voteFilter");
        const upCount = Object.values(votes).filter(v => v?.vote === "up").length;
        const downCount = Object.values(votes).filter(v => v?.vote === "down").length;
        if (voteMode === "all") {
            vf.textContent = upCount + downCount > 0 ? `▲${upCount}  ▼${downCount}` : "votes";
            vf.className = "qbtn";
        } else if (voteMode === "up") {
            vf.textContent = "▲ kept";
            vf.className = "qbtn up";
        } else {
            vf.textContent = "▼ buried";
            vf.className = "qbtn down";
        }

        // Grid
        const COLORHEX = {"text-violet-300":"#c4b5fd","text-violet-400":"#a78bfa","text-purple-300":"#d8b4fe","text-purple-400":"#c084fc","text-indigo-300":"#a5b4fc","text-indigo-400":"#818cf8","text-blue-300":"#93c5fd","text-blue-400":"#60a5fa","text-sky-200":"#bae6fd","text-sky-300":"#7dd3fc","text-sky-400":"#38bdf8","text-cyan-300":"#67e8f9","text-cyan-400":"#22d3ee","text-teal-300":"#5eead4","text-teal-400":"#2dd4bf","text-emerald-300":"#6ee7b7","text-emerald-400":"#34d399","text-green-300":"#86efac","text-green-400":"#4ade80","text-lime-300":"#bef264","text-lime-400":"#a3e635","text-yellow-200":"#fef08a","text-yellow-300":"#fde047","text-yellow-400":"#facc15","text-amber-200":"#fde68a","text-amber-300":"#fcd34d","text-amber-400":"#fbbf24","text-amber-600":"#d97706","text-orange-200":"#fed7aa","text-orange-300":"#fdba74","text-orange-400":"#fb923c","text-red-300":"#fca5a5","text-red-400":"#f87171","text-rose-300":"#fda4af","text-rose-400":"#fb7185","text-pink-300":"#f9a8d4","text-pink-400":"#f472b6","text-zinc-200":"#e4e4e7","text-zinc-300":"#d4d4d8"};
        const accent = o => COLORHEX[o.color] || "#8a857a";
        const grid = document.getElementById("grid");
        if (items.length === 0) {
            grid.innerHTML = `<div class="col-span-full" style="text-align:center;padding:5rem 0;font-family:'Spectral',serif;font-style:italic;color:var(--ash-3)">No offering answers. The mountain is empty.</div>`;
            return;
        }
        grid.innerHTML = items.map((o, i) => {
            const vote = votes[o.slug]?.vote;
            const pip = vote === "up" ? `<span class="vote-pip specter">▲</span>` : vote === "down" ? `<span class="vote-pip" style="color:#e08a8a">▼</span>` : "";
            const anim = i < 27 ? "reveal" : "";
            const delay = i < 27 ? `;animation-delay:${i*22}ms` : "";
            return `<a href="/${o.slug}/index.html" class="offer ${anim}" style="--thread:${accent(o)}${delay}">
                <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:8px">
                    <span class="offer-idx">${String(i+1).padStart(3,'0')}</span>
                    <span class="offer-meta" style="display:flex;align-items:center;gap:7px">${pip}<span>${o.date.slice(5).replace('-','.')}</span></span>
                </div>
                <h3 class="offer-title" style="margin-bottom:8px">${o.title}</h3>
                <p class="offer-desc line-clamp-2">${o.desc}</p>
                <div class="offer-meta" style="margin-top:12px;padding-top:11px;border-top:1px solid var(--rule)"><span class="dot"></span>${o.cat}</div>
            </a>`;
        }).join("");
    }

    // Events
    document.getElementById("search").addEventListener("input", e => {
        searchQ = e.target.value;
        render();
    });

    document.getElementById("cats").addEventListener("click", e => {
        const btn = e.target.closest("[data-cat]");
        if (!btn) return;
        const c = btn.dataset.cat; activeCat = (c === "__all" || activeCat === c) ? null : c;
        render();
    });

    document.getElementById("voteFilter").addEventListener("click", () => {
        voteMode = voteMode === "all" ? "up" : voteMode === "up" ? "down" : "all";
        render();
    });

ailed, movingly, to meet in the middle\"; \"a war memorial listing names of people who are, as far as anyone knows, still alive\"; \"eels, formerly; now chiefly the memory of eels\") plus a morpheme name generator, fake coordinates, anti-repeat sets, and copy-to-clipboard — a whole coherent instrument. A is beautifully crafted and its canvas star-map with weight/warmth/links, gravity, PNG export and idle/night/\"prizrak\" easter eggs is real interactivity, but it is a container the user must fill: its own generativity is a handful of hardcoded observation lines (\"islands, then.\", \"you are mapping an absence.\"), and its writing, while good, is a fixed palette rather than a generative engine. B out-generates A on writing, drawing, and system depth; A's only clear edge is direct manipulation, which doesn't outweigh B's substance. B is the stronger, more complete piece and genuinely advances on the earlier finalist."}, {"round": "Round of 16 — Opus", "aSlug": "tatra-terminal", "bSlug": "the-bureau-of-wrong-translations", "aGen": "I", "bGen": "II", "aSeed": 8, "bSeed": 1, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "tatra-terminal", "reasoning": "Tatra OS is a beautifully dressed but fundamentally static toy: its ~30 commands return hardcoded FORTUNES/POTATO_ORACLE/SOUL_TEXT strings, a fake filesystem, and a fixed BIOS boot — the only real generativity is the pseudoNoise mountain canvas, and the writing is inward-facing lore (potatoes, Kriváň, the \"Architect\") that lands as one sustained CRT-ghost joke rather than saying anything to the user. The Bureau is a genuine generative system that turns YOUR input into output: a per-run pseudo-language forge (10 glyph scripts, onset/nucleus/coda romanization with diacritics and glottal stops, named tongues like \"Quiet Vethric — spoken by roughly no one, fluently\"), a KNOWN-phrase matcher plus a fallback mood engine (reassure/longing/deflect/weary...) with pickFresh anti-repetition, all wired to etymolog lar jitter, a nearest-neighbor TSP road tour, on-land settlement tests, and self-tracing stroke-dasharray animation — but its text is a static bank of pre-written one-liners shuffled into templates (\"eels, formerly; now chiefly the memory of eels\") that never respond to the user; it's a slot machine in one whimsical register. The Bureau reads the actual input across 10 bespoke intent-matchers plus a 7-mood fallback, anchors its forged etymology to the user's own words (\"from the root heard in 'garden'\"), and returns an honest retranslation with real teeth (\"I have decided not to make this your problem, and the deciding is the whole sentence\"; \"soon, in the tense that never arrives\") — a complete, self-justifying loop that lands its concept and its closing line (\"expires the moment you feel understood\"). Given the mandate to reward interaction, writing with teeth, and how completely a piece lands over a single well-dressed register, the Bureau's responsive semantic core and emotionally exacting prose edge out Cartographer's more beautiful but inert generator."}], "sf": [{"round": "Grand Semifinals — Opus", "aSlug": "instructions-for-a-lost-machine", "bSlug": "the-cadence-engine", "aGen": "II", "bGen": "I", "aSeed": 7, "bSeed": 3, "winnerSlug": "instructions-for-a-lost-machine", "loserSlug": "the-cadence-engine", "reasoning": "B is the deeper *engineering* build — a correct Bjorklund/Euclidean core, five from-scratch WebAudio voices, a Chris-Wilson lookahead scheduler, true per-track polymeter, swing/rotation/persistence, and four easter eggs — but its concept (a Euclidean sequencer) is a known genre and its prose is thin set-dressing (\"the ghost keeps time\"). A carries real build substance too (procedural inline-SVG exploded diagrams with 8 primitives and animated leader lines, internally-coherent local part pools so each page's procedure, key table, and warnings reference the same invented parts, verified 12/12 distinct titles) but wins on the mandate's unded and it still degrades into a plausible certificate, whereas A cannot generate anything at all."}], "final": {"round": "The Grand Final — Opus", "aSlug": "instructions-for-a-lost-machine", "bSlug": "the-bureau-of-wrong-translations", "aGen": "II", "bGen": "II", "aSeed": 7, "bSeed": 1, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "instructions-for-a-lost-machine", "reasoning": "The Bureau converts real user input into a personalized, structurally layered document (invented script, forged etymology anchored to your own words, honest retranslation) where the Machine merely recombines gorgeous static banks into a page that ignores the visitor. Depth of system, interaction model, and completeness of the landing all favor B.", "grandVerdict": "The Bureau takes the crown, and it takes it honestly — in the wrong direction, as is its custom. Both machines are built by the same careful hand: the same fixed dark palette, the same water-lit typography, the same no-repeat pickers and reduced-motion mercy, the same devotional vocabulary of doorways and load-bearing walls and houses that have since come down. But the Machine is a monologue — a beautiful, self-similar broadcast that says the same tender thing to every operator who presses the button, and by the third recovered page you have learned its whole grammar and it has learned nothing of yours. The Bureau is a conversation. You feed it a lid you keep on a thing, and it forges a script that has never been spoken, invents an etymology with a straight face, and then hands the lid back to you translated into the sentence you were too polite to say — 'Fine is the lid I keep on the thing so the thing stays a shape I can carry.' It has a mood engine, a ten-branch known-phrase table, a real interaction loop where the input is the raw material and the honest retranslation is the quietly devastating document; it does the harder thing, lands it more completely, and it aims its ache at you rather than past you.",         const sf=B.semifinals.map(m=>srSMatch(m,false)).join('');
        const fin=srSMatch(B.final,true);
        const seedRows=seeds.map(s=>{ const bg={champion:'Champion',finalist:'Finalist',semifinal:'Semifinal',quarterfinal:'Quarterfinal'}[s.finish]||''; return `<div><a href="/${s.slug}/" class="sr-srow"><span class="sr-rk">${s.seed}</span><span class="sr-nm">${srT(s.slug)}</span>${bg?`<span class="sr-badge sr-b-${s.finish}">${bg}</span>`:''}<span class="sr-barwrap"><span class="sr-bar2" style="width:${s.total}%"></span></span><span class="sr-tot">${s.total}</span></a><div class="sr-vrow">${srEsc(s.verdict)}</div></div>`; }).join('');
        return `
        <section class="sr-sec">
          <div class="sr-sec-h"><h2>The Second Reckoning</h2><span class="sr-n">30 new offerings &middot; Sonnet 5 qualifiers &middot; Opus final</span></div>
          <p class="sr-lead">Every new offering scored on originality, craft, writing, interaction, and delight. The top eight seeds entered a bracket; the last match went to Opus.</p>
          <div class="sr-podium">${podHtml}</div>
          <div class="sr-crown" style="margin-bottom:1.8rem">
            <div class="sr-lbl">&#9733; Champion of the Second Reckoning</div>
            <a href="/${S.champion}/"><div class="sr-cn">${srT(S.champion)}</div></a>
            <div class="sr-verd">${srEsc(S.championVerdict)}</div>
            <div class="sr-ru">${srEsc(S.runnerUpNote)}</div>
          </div>
          <div class="sr-grid2"><div><div class="sr-round-lbl">Quarterfinals</div>${qf}</div><div><div class="sr-round-lbl">Semifinals</div>${sf}<div class="sr-round-lbl" style="margin-top:1.1rem">The Final &middot; Opus</div>${fin}</div></div>
          <div class="sr-round-lbl" style="margin-top:2rem">Qualifying Leaderboard &middot; all thirty</div>
          <p class="sr-mono" style="font-size:10.5px;color:var(--sr-ash3);letter-spacing:.05em;margin:.2rem 0 .7rem">Sonnet 5 qualifier scores / 100</p>
          <div class="sr-seedbox">${seedRows}</div>
        </section>`;
    }
    function renderSecondReckoning(){
        if(secondReckoningBuilt) return;
        const intro=`<div class="sr-intro"><div class="sr-kick">The mountain keeps score &middot; Reckoning II</div><h2 class="sr-h1">The Second <em>Reckoning</em></h2><p class="sr-sub">Thirty new offerings, weighed and set against the champions that came before. Sonnet 5 kept the qualifiers; Opus judged the finals.</p></div>`;
        const foot=`<div class="sr-foot">The first Reckoning weighed 218 offerings under three Opus judges and crowned <a class="sr-spec" href="/the-orrery/">The Orrery</a>.<br>The second weighed the thirty that came after &mdash; then set the two eras against each other, sixteen finalists deep. The new work held the field.</div>`;
        document.getElementById('view-second-reckoning').innerHTML = intro + srRenderGrand() + srRenderSecond() + foot;
        secondReckoningBuilt=true;
    }

    function switchView(view){
        const isOff=view==='offerings', isT=view==='tournament', isS=view==='second-reckoning';
        document.getElementById('view-offerings').classList.toggle('hidden',!isOff);
        document.getElementById('offerings-controls').classList.toggle('hidden',!isOff);
        document.getElementById('view-tournament').classList.toggle('hidden',!isT);
        document.getElementById('view-second-reckoning').classList.toggle('hidden',!isS);
        document.getElementById('tab-offerings').classList.toggle('is-active',isOff);
        document.getElementById('tab-tournament').classList.toggle('is-active',isT);
        document.getElementById('tab-second-reckoning').classList.toggle('is-active',isS);
        if(isT){ renderTournament(); }
        if(isS){ renderSecondReckoning(); }
        const hash = isT ? '#reckoning' : isS ? '#second-reckoning' : '';
        if(hash){ if(location.hash!==hash) history.replaceState(null,'',hash); }
        else { if(location.hash) history.replaceState(null,'',location.pathname); }
        window.scrollTo({top:0,behavior:'smooth'});
    }
    document.getElementById('tab-offerings').addEventListener('click',()=>switchView('offerings'));
    document.getElementById('tab-tournament').addEventListener('click',()=>switchView('tournament'));
    document.getElementById('tab-second-reckoning').addEventListener('click',()=>switchView('second-reckoning'));
    if(location.hash==='#reckoning'){ switchView('tournament'); }
    else if(location.hash==='#second-reckoning'){ switchView('second-reckoning'); }


    // Init
    render();
    syncRemote().then(v => { if (v) render(); });
    </script>
</body>
</html>
