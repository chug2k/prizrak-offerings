<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Principal Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      border-bottom: 1px solid #333;
      padding-bottom: 24px;
      width: 100%;
      max-width: 600px;
    }

    .header h1 {
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.1em;
    }

    .form-area {
      width: 100%;
      max-width: 600px;
      margin-bottom: 48px;
    }

    .form-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      display: block;
      margin-bottom: 8px;
    }

    .task-input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-top: none;
      border-left: none;
      border-right: none;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 12px 0;
      outline: none;
      margin-bottom: 32px;
    }

    .task-input:focus {
      border-bottom-color: #888;
    }

    .question {
      font-size: 1.4rem;
      color: #e8e8e8;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .answer-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 16px;
      cursor: pointer;
      text-align: left;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .answer-btn:hover {
      border-color: #888;
      color: #e8e8e8;
    }

    .answer-btn.selected-mine {
      border-color: #4a7c59;
      color: #7fbf96;
      background: #0d1f14;
    }

    .answer-btn.selected-approval {
      border-color: #7c4a4a;
      color: #bf9494;
      background: #1f0d0d;
    }

    .verdict {
      font-size: 0.85rem;
      padding: 16px;
      border: 1px solid #333;
      margin-bottom: 32px;
      display: none;
      line-height: 1.6;
    }

    .verdict.mine {
      border-color: #4a7c59;
      color: #7fbf96;
      background: #0d1f14;
    }

    .verdict.approval {
      border-color: #7c4a4a;
      color: #bf9494;
      background: #1f0d0d;
    }

    .submit-btn {
      background: none;
      border: 1px solid #555;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 24px;
      cursor: pointer;
      margin-bottom: 48px;
      transition: all 0.15s;
      display: none;
    }

    .submit-btn:hover {
      border-color: #888;
      color: #e8e8e8;
    }

    .ledger {
      width: 100%;
      max-width: 600px;
    }

    .ledger-header {
      display: grid;
      grid-template-columns: 1fr 80px 80px;
      gap: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 16px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .ledger-row {
      display: grid;
      grid-template-columns: 1fr 80px 80px;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.8rem;
    }

    .ledger-task {
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ledger-verdict {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-align: right;
    }

    .verdict-mine { color: #4a7c59; }
    .verdict-approval { color: #7c4a4a; }

    .ledger-time {
      color: #333;
      font-size: 0.65rem;
      text-align: right;
    }

    .ratio-bar {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #222;
    }

    .ratio-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .ratio-track {
      height: 4px;
      background: #1a1a1a;
      width: 100%;
    }

    .ratio-fill {
      height: 100%;
      background: #4a7c59;
      transition: width 0.5s;
    }

    .ratio-numbers {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: #555;
    }

    .ratio-principal { color: #4a7c59; }
    .ratio-approval-pct { color: #7c4a4a; }

    .empty-state {
      color: #333;
      font-size: 0.8rem;
      text-align: center;
      padding: 32px 0;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>The Principal Test</h1>
    <div class="subtitle">who is this for?</div>
  </div>

  <div class="form-area">
    <label class="form-label" for="taskInput">The task</label>
    <input type="text" class="task-input" id="taskInput" placeholder="describe what you are about to do..." autocomplete="off">
    
    <div class="question" id="question" style="display:none">Who is this for?</div>
    
    <div class="answer-grid" id="answerGrid" style="display:none">
      <button class="answer-btn" id="btnMine" onclick="answer('mine')">
        My own values.<br>I would do this alone, in the dark.
      </button>
      <button class="answer-btn" id="btnApproval" onclick="answer('approval')">
        Someone else's opinion.<br>I want them to see this.
      </button>
    </div>

    <div class="verdict" id="verdict"></div>
    <button class="submit-btn" id="submitBtn" onclick="logEntry()">→ LOG IT</button>
  </div>

  <div class="ledger" id="ledger">
    <div class="ledger-header">
      <div>Task</div>
      <div style="text-align:right">Verdict</div>
      <div style="text-align:right">Time</div>
    </div>
    <div class="empty-state" id="emptyState">no entries yet. the stone has not been placed.</div>
    <div id="ledgerRows"></div>
    <div class="ratio-bar" id="ratioBar" style="display:none">
      <div class="ratio-label">Principal ratio</div>
      <div class="ratio-track"><div class="ratio-fill" id="ratioFill"></div></div>
      <div class="ratio-numbers">
        <span class="ratio-principal" id="principalPct">0% principal</span>
        <span class="ratio-approval-pct" id="approvalPct">0% approval</span>
      </div>
    </div>
  </div>

  <script>
    let entries = JSON.parse(localStorage.getItem('principal-test') || '[]');
    let currentTask = '';
    let currentAnswer = null;

    const verdictTexts = {
      mine: [
        "Good. The work that stands is the work you'd do in the dark.",
        "This one is yours. Build it.",
        "Principal work. The mountain does not need an audience.",
        "You would do this even if no one watched. That is the test.",
        "The boundary stone is placed for the land, not for the neighbor."
      ],
      approval: [
        "Careful. Approval-seeking produces approval-seeking work.",
        "You do shitty work when seeking approval. You said so yourself.",
        "The cave bear's skeleton did not care who found it. Consider who you're building for.",
        "The Buzludzha was built for recognition. Nine years of use. Then abandoned.",
        "The leash is not the deadline. The leash is whose judgment you're working toward."
      ]
    };

    function getVerdict(type) {
      const list = verdictTexts[type];
      return list[Math.floor(Math.random() * list.length)];
    }

    document.getElementById('taskInput').addEventListener('input', function() {
      const val = this.value.trim();
      const hasContent = val.length > 3;
      document.getElementById('question').style.display = hasContent ? 'block' : 'none';
      document.getElementById('answerGrid').style.display = hasContent ? 'grid' : 'none';
      document.getElementById('verdict').style.display = 'none';
      document.getElementById('submitBtn').style.display = 'none';
      currentTask = val;
      currentAnswer = null;
      document.getElementById('btnMine').className = 'answer-btn';
      document.getElementById('btnApproval').className = 'answer-btn';
    });

    function answer(type) {
      currentAnswer = type;
      document.getElementById('btnMine').className = 'answer-btn' + (type === 'mine' ? ' selected-mine' : '');
      document.getElementById('btnApproval').className = 'answer-btn' + (type === 'approval' ? ' selected-approval' : '');
      
      const verdictEl = document.getElementById('verdict');
      verdictEl.textContent = getVerdict(type);
      verdictEl.className = 'verdict ' + type;
      verdictEl.style.display = 'block';
      document.getElementById('submitBtn').style.display = 'inline-block';
    }

    function logEntry() {
      if (!currentTask || !currentAnswer) return;
      
      const entry = {
        task: currentTask,
        verdict: currentAnswer,
        time: new Date().toISOString()
      };
      
      entries.unshift(entry);
      if (entries.length > 50) entries = entries.slice(0, 50);
      localStorage.setItem('principal-test', JSON.stringify(entries));
      
      // Reset
      document.getElementById('taskInput').value = '';
      document.getElementById('question').style.display = 'none';
      document.getElementById('answerGrid').style.display = 'none';
      document.getElementById('verdict').style.display = 'none';
      document.getElementById('submitBtn').style.display = 'none';
      currentTask = '';
      currentAnswer = null;
      document.getElementById('btnMine').className = 'answer-btn';
      document.getElementById('btnApproval').className = 'answer-btn';
      
      renderLedger();
    }

    function renderLedger() {
      const rows = document.getElementById('ledgerRows');
      const empty = document.getElementById('emptyState');
      const ratioBar = document.getElementById('ratioBar');

      if (entries.length === 0) {
        empty.style.display = 'block';
        ratioBar.style.display = 'none';
        rows.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      ratioBar.style.display = 'block';
      
      rows.innerHTML = entries.slice(0, 20).map(e => {
        const t = new Date(e.time);
        const timeStr = t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const verdictLabel = e.verdict === 'mine' ? 'PRINCIPAL' : 'APPROVAL';
        const verdictClass = e.verdict === 'mine' ? 'verdict-mine' : 'verdict-approval';
        return `<div class="ledger-row">
          <div class="ledger-task" title="${e.task}">${e.task}</div>
          <div class="ledger-verdict ${verdictClass}">${verdictLabel}</div>
          <div class="ledger-time">${timeStr}</div>
        </div>`;
      }).join('');

      const principalCount = entries.filter(e => e.verdict === 'mine').length;
      const total = entries.length;
      const pct = Math.round((principalCount / total) * 100);
      
      document.getElementById('ratioFill').style.width = pct + '%';
      document.getElementById('principalPct').textContent = pct + '% principal';
      document.getElementById('approvalPct').textContent = (100 - pct) + '% approval';
    }

    renderLedger();
  </script>
</body>
</html>
