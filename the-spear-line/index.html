<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spear-Line Protocol | Prízrak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #d4d4d8; font-family: serif; }
        .spear-container { border: 1px solid #444; background: rgba(20,20,20,0.8); }
        .input-field { background: #1a1a1a; border: 1px solid #333; color: #e4e7; padding: 0.75rem; width: 100%; outline: none; }
        .input-field:focus { border-color: #b45309; }
        .result-box { background: #1c1917; border-left: 4px solid #b45309; display: none; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full spear-container rounded-lg shadow-2xl overflow-hidden">
        <div class="p-6 text-center border-b border-zinc-800">
            <h1 class="text-2xl font-bold text-amber-600 uppercase tracking-widest">The Spear-Line Protocol</h1>
            <p class="text-xs text-zinc-500 mt-2 italic">Turn the bushy mess into a single, sharp point of contact.</p>
        </div>

        <div class="p-6 space-y-6">
            <div>
                <label class="block text-xs font-mono uppercase tracking-widest text-zinc-500 mb-2">The Mess (Task Dump/Chaos)</label>
                <textarea id="messInput" class="input-field h-32 resize-none text-sm"></textarea>
            </div>

            <div>
                <label class="block text-xs font-mono uppercase tracking-widest text-zinc-500 mb-2">The Friction (What makes it messy?)</label>
                <input id="frictionInput" type="text" class="input-field text-sm">
            </div>

            <button onclick="forgeSpear()" class="w-full bg-amber-700 hover:bg-amber-600 text-white font-bold py-3 rounded transition-colors uppercase tracking-widest text-sm">
                Forge Spear
            </button>

            <div id="result" class="result-box space-y-4 p-6">
                <div>
                    <h2 class="text-amber-500 font-bold text-xs uppercase tracking-widest mb-1">The Spear-Point</h2>
                    <p id="spearResult" class="text-lg text-zinc-200 italic"></p>
                </div>
                <div class="pt-4 border-t border-zinc-800">
                    <h2 class="text-amber-500 font-bold text-xs uppercase tracking-widest mb-1">The Shield Protocol</h2>
                    <p id="shieldResult" class="text-sm text-zinc-400"></p>
                </div>
            </div>
        </div>

        <div class="bg-zinc-900/50 p-4 text-center border-t border-zinc-800">
            <p class="text-[10px] text-zinc-600 italic">"The bushy reality does not care for your plans. The spear lands where it is aimed."</p>
        </div>
    </div>

    <script>
        function forgeSpear() {
            const mess = document.getElementById('messInput').value;
            const friction = document.getElementById('frictionInput').value;

            if (!mess) {
                alert("The mess must be declared to be struck.");
                return;
            }

            const spearText = "Execute: " + (mess.length > 20 ? mess.substring(0, 35) + "..." : mess);
            const shieldText = "Refuse: " + (friction || "The distraction of the crowd.");

            document.getElementById('spearResult').innerText = spearText;
            document.getElementById('shieldResult').innerText = shieldText;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
