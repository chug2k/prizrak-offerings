<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pivot Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('hero.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }
        .spin-animation {
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
    </style>
</head>
<body class="bg-zinc-900/90 text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-8 backdrop-blur-sm">
    <div class="max-w-xl w-full bg-zinc-900/80 p-8 rounded-2xl border border-zinc-700 shadow-2xl backdrop-blur-md text-center">
        <h1 class="text-4xl font-bold text-white mb-2">The Pivot Roulette</h1>
        <p class="text-zinc-400 mb-8">When the Structuralist Party fails and the Iterative RFS is purged, what does the Architect build next? Spin the wheel of destiny.</p>
        
        <div class="relative w-64 h-64 mx-auto mb-8">
            <div class="absolute inset-0 rounded-full border-4 border-zinc-700 overflow-hidden">
                <div id="wheel" class="w-full h-full spin-animation bg-gradient-to-tr from-zinc-800 to-zinc-900 relative">
                    <!-- Simple division for aesthetics -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-6xl">🎡</span>
                    </div>
                </div>
            </div>
            <!-- Pointer -->
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[20px] border-t-emerald-500 z-10"></div>
        </div>

        <div class="mb-8 min-h-[80px] flex items-center justify-center bg-zinc-800 rounded-lg p-4 border border-zinc-700">
            <p id="result" class="text-xl font-mono text-emerald-400 font-bold">Awaiting the spin...</p>
        </div>

        <button id="spin-btn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl transition-colors shadow-lg">
            EMBRACE THE VOID & SPIN
        </button>
        
        <div class="mt-8 text-xs text-zinc-500">
            Remember: Structure without community is empty. And Chloe is always right.
        </div>
    </div>

    <script>
        const outcomes = [
            "Clone YC for another emerging market.",
            "Start a political movement with 1 member.",
            "Ask Chloe (She is right).",
            "Build a dashboard to measure the suffering.",
            "Open another cafe in Thao Dien.",
            "Accept the void. Do nothing.",
            "Purge the codebase and start over."
        ];

        const wheel = document.getElementById('wheel');
        const result = document.getElementById('result');
        const spinBtn = document.getElementById('spin-btn');

        let currentRotation = 0;

        spinBtn.addEventListener('click', () => {
            // Disable button
            spinBtn.disabled = true;
            spinBtn.classList.add('opacity-50', 'cursor-not-allowed');
            result.textContent = "Consulting the mountain...";
            result.classList.remove('text-emerald-400');
            result.classList.add('text-zinc-400', 'animate-pulse');

            // Spin math
            const extraSpins = 5;
            const randomDegree = Math.floor(Math.random() * 360);
            const totalDegrees = (extraSpins * 360) + randomDegree;
            currentRotation += totalDegrees;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const randomOutcome = outcomes[Math.floor(Math.random() * outcomes.length)];
                result.textContent = randomOutcome;
                result.classList.remove('text-zinc-400', 'animate-pulse');
                result.classList.add('text-emerald-400');
                
                // Re-enable button
                spinBtn.disabled = false;
                spinBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 3000); // matches the 3s CSS transition
        });
    </script>
    <script src="/shared/star-widget.js"></script>
</body>
</html>
