<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Rest Case</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #b8b0a0; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    textarea:focus { outline: none; }
    .fade { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .pill { transition: all 0.2s; }
    .pill.selected { background: #2a2a2a; color: #e0d8c8; border-color: #555; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="mono text-xs text-stone-600 tracking-widest uppercase mb-2" id="clock"></div>
      <h1 class="text-xl font-medium text-stone-300 tracking-wide">The Rest Case</h1>
      <p class="text-stone-600 text-sm mt-1">three questions before you sleep</p>
    </div>

    <!-- Questions -->
    <div id="questions" class="space-y-8">

      <!-- Q1 -->
      <div id="q1" class="fade">
        <p class="text-stone-400 text-sm mb-3">What is the thing that feels most urgent right now?</p>
        <textarea id="a1" rows="3"
          class="w-full bg-transparent border border-stone-800 rounded px-4 py-3 text-stone-300 text-sm resize-none focus:border-stone-600 transition-colors placeholder-stone-700"
          placeholder="Write it down. Get it out of your head."></textarea>
      </div>

      <div id="q2" class="opacity-0 transition-opacity duration-500">
        <p class="text-stone-400 text-sm mb-3">Can anything be done about it before 8 AM?</p>
        <div class="flex gap-3">
          <button onclick="select2('yes')" id="btn-yes"
            class="pill flex-1 border border-stone-800 rounded py-2 mono text-xs text-stone-500 hover:border-stone-600 hover:text-stone-300">
            yes
          </button>
          <button onclick="select2('no')" id="btn-no"
            class="pill flex-1 border border-stone-800 rounded py-2 mono text-xs text-stone-500 hover:border-stone-600 hover:text-stone-300">
            no
          </button>
          <button onclick="select2('partial')" id="btn-partial"
            class="pill flex-1 border border-stone-800 rounded py-2 mono text-xs text-stone-500 hover:border-stone-600 hover:text-stone-300">
            partially
          </button>
        </div>
      </div>

      <div id="q3" class="opacity-0 transition-opacity duration-500">
        <p class="text-stone-400 text-sm mb-3">What is the one thing you actually need to remember tomorrow?</p>
        <textarea id="a3" rows="2"
          class="w-full bg-transparent border border-stone-800 rounded px-4 py-3 text-stone-300 text-sm resize-none focus:border-stone-600 transition-colors placeholder-stone-700"
          placeholder="One thing. Write it here and it will wait for you."></textarea>
      </div>

      <button id="submit-btn" onclick="submit()"
        class="w-full hidden border border-stone-700 text-stone-400 mono text-xs py-3 rounded hover:border-stone-500 hover:text-stone-200 transition-colors">
        file and rest →
      </button>
    </div>

    <!-- Result -->
    <div id="result" class="hidden fade text-center space-y-6">
      <div id="verdict" class="text-lg text-stone-300 font-light leading-relaxed"></div>
      <div id="reminder-box" class="hidden border border-stone-800 rounded px-5 py-4 text-left">
        <div class="mono text-xs text-stone-600 mb-2 uppercase tracking-wide">for the morning</div>
        <div id="reminder-text" class="text-stone-400 text-sm"></div>
      </div>
      <div class="mono text-xs text-stone-700 pt-4">
        the mountain will still be there in the morning
      </div>
      <button onclick="reset()"
        class="border border-stone-800 text-stone-600 mono text-xs px-6 py-2 rounded hover:border-stone-700 hover:text-stone-400 transition-colors">
        reset
      </button>
    </div>

  </div>

  <script>
    let q2answer = null;

    // Clock
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2,'0');
      const m = now.getMinutes().toString().padStart(2,'0');
      document.getElementById('clock').textContent = `${h}:${m}`;
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Show Q2 after Q1 has content
    document.getElementById('a1').addEventListener('input', function() {
      if (this.value.trim().length > 10) {
        document.getElementById('q2').style.opacity = '1';
      }
    });

    function select2(val) {
      q2answer = val;
      ['yes','no','partial'].forEach(v => {
        document.getElementById('btn-'+v).classList.remove('selected');
      });
      document.getElementById('btn-'+val).classList.add('selected');
      // Show Q3
      setTimeout(() => {
        document.getElementById('q3').style.opacity = '1';
        document.getElementById('submit-btn').classList.remove('hidden');
      }, 200);
    }

    function submit() {
      const a1 = document.getElementById('a1').value.trim();
      const a3 = document.getElementById('a3').value.trim();
      if (!a1 || !q2answer) return;

      let verdict = '';
      if (q2answer === 'no') {
        verdict = 'Nothing you can do about it before morning. That means tonight\'s job is not to solve it — it\'s to set it down. The problem will be the same size at 8 AM as it is right now. You will not be.';
      } else if (q2answer === 'yes') {
        verdict = 'Something can be done. Write it in the morning list, not the sleep list. The fact that action is possible does not mean the action is now. Sleep is also preparation.';
      } else {
        verdict = 'Partial action is possible. That means there is a version of this you can do tomorrow and a version you cannot control tonight. File the controllable part for morning. Set the rest down.';
      }

      document.getElementById('verdict').textContent = verdict;

      if (a3) {
        document.getElementById('reminder-box').classList.remove('hidden');
        document.getElementById('reminder-text').textContent = a3;
      }

      document.getElementById('questions').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
    }

    function reset() {
      document.getElementById('a1').value = '';
      document.getElementById('a3').value = '';
      q2answer = null;
      ['yes','no','partial'].forEach(v => {
        document.getElementById('btn-'+v).classList.remove('selected');
      });
      document.getElementById('q2').style.opacity = '0';
      document.getElementById('q3').style.opacity = '0';
      document.getElementById('submit-btn').classList.add('hidden');
      document.getElementById('reminder-box').classList.add('hidden');
      document.getElementById('questions').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
    }
  </script>
</body>
</html>
