<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Operational Pivot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #e4e4e7; font-family: ui-sans-serif, system-ui, sans-serif; }
        .card { background: #18181b; border: 1px solid #27272a; }
        .input { background: #09090b; border: 1px solid #27272a; color: #e4e4e7; }
        .input:focus { border-color: #8b5cf6; outline: none; ring: 2px solid #8b5cf6; }
        .btn { transition: all 0.2s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full space-y-8">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-white tracking-tight">The Operational Pivot</h1>
            <p class="text-zinc-500 text-sm">From Blueprint to Breath. Mark the moment design becomes action.</p>
        </header>

        <!-- Form -->
        <div class="card rounded-xl p-6 space-y-4 shadow-2xl">
            <div class="space-y-1">
                <label for="mission" class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Mission (The Intention)</label>
                <input type="text" id="mission" placeholder="e.g., Deploying the automated backup pipeline" class="w-full input rounded-lg px-4 py-2.5 text-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label for="tool" classs="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Tool (The Lever)</label>
                    <input type="text" id="tool" placeholder="e.g., Bash script / Vercel" class="w-full input rounded-lg px-4 py-2.5 text-sm">
                </div>
                <div class="space-y-1">
                    <label for="output" class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Output (The Proof)</label>
                    <input type="text" id="output" placeholder="e.g., First successful CI run" class="w-full input rounded-lg px-4 py-2.5 text-sm">
                </div>
            </div>

            <div class="space-y-1">
                <label for="impact" class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Impact Score (1-10)</label>
                <input type="number" id="impact" min="1" max="10" step="1" placeholder="How much did reality change?" class="w-full input rounded-lg px-4 py-2.5 text-sm">
            </div>

            <button id="submitBtn" class="w-full btn bg-violet-600 hover:bg-violet-500 text-white font-bold py-3 rounded-lg mt-4 shadow-lg">Commit the Pivot</button>
        </div>

        <!-- History -->
        <div class="space-y-4">
            <h2 class="text-sm font-semibold text-zinc-500 uppercase tracking-widest px-1">The Velocity Log</h2>
            <div id="history" class="space-y-3 text-sm">
                <!-- Entries will appear here -->
            </div>
        </div>

        <footer class="text-center pt-8 text-zinc-600 text-[10px] uppercase tracking-widest">
            The blueprint has become a breath.
        </footer>
    </div>

    <script>
    const STORAGE_KEY = "prizrak_pivot_log_v1";

    function loadHistory() {
        const historyDiv = document.getElementById('history');
        let data = [];
        try {
            data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch (e) {
            console.error("Error loading history:", e);
            data = [];
        }

        historyDiv.innerHTML = '';

        if (data.length === 0) {
            historyDiv.innerHTML = '<p class="text-zinc-600 text-center italic py-4">The ledger is empty. No pivots recorded yet.</p>';
            return;
        }

        // Sort by date descending (newest first)
        const sortedData = [...data].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        sortedData.forEach((entry, idx) => {
            const date = new Date(entry.timestamp).toLocaleDateString();
            const card = document.createElement('div');
            card.className = 'card p-4 rounded-lg space-y-2 border-l-4 border-l-violet-500 shadow-sm animate-slide-in';
            card.style.animationDelay = `${idx * 0.1}s`;
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <h3 class="font-bold text-zinc-200">${entry.mission}</h3>
                    <span class="text-[10px] font-mono text-zinc-500">${date}</span>
                </div>
                <div class="text-xs text-zinc-400 flex gap-3">
                    <span>🛠️ ${entry.tool}</span>
                    <span>📄 ${entry.output}</span>
                </div>
                <div class="flex items-center justify-between pt-2">
                    <span class="text-[10px] font-bold text-violet-400 bg-violet-400/10 px-2 py-0.5 rounded">Impact: ${entry.impact}/10</span>
                </div>
            `;
            historyDiv.appendChild(card);
        });
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
        const missionInput = document.getElementById('mission');
        const toolInput = document.getElementById('tool');
        const outputInput = document.getElementById('output');
        const impactInput = document.getElementById('impact');

        const mission = missionInput.value.trim();
        const tool = toolInput.value.trim();
        const output = outputInput.value.trim();
        const impact = parseInt(impactInput.value);

        if (!mission || !tool || !output || isNaN(impact)) {
            alert("Please fill in all fields to validate the pivot.");
            return;
        }

        const entry = {
            mission,
            tool,
            output,
            impact,
            timestamp: new Date().toISOString()
        };

        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        data.push(entry);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

        // Reset form
        missionInput.value = '';
        toolInput.value = '';
        outputInput.value = '';
        impactInput.value = '';

        loadHistory();
    });

    // Initial load
    window.onload = loadHistory;
    </script>
</body>
</html>
