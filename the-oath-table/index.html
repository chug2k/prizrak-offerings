<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oath Table | Offerings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:
      radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 34%),
      radial-gradient(circle at 80% 15%, rgba(168, 85, 247, 0.15), transparent 24%),
      linear-gradient(180deg, #09090b 0%, #111113 45%, #18181b 100%);
    }
    .glow { text-shadow: 0 0 18px currentColor; }
    .panel { box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    .card { border: 1px solid rgba(63,63,70,.9); background: rgba(24,24,27,.78); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="text-zinc-200 min-h-screen antialiased">
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
    <header class="mb-8 flex flex-col gap-3">
      <p class="text-xs uppercase tracking-[0.35em] text-cyan-300/80">Offerings / God of War edition</p>
      <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
        <div>
          <h1 class="text-4xl sm:text-6xl font-black text-white glow">The Oath Table</h1>
          <p class="mt-3 max-w-2xl text-zinc-400 text-sm sm:text-base">
            Forge one clear vow before you swing. For hard choices, sharp boundaries, and promises that need a spine.
          </p>
        </div>
        <div class="grid grid-cols-3 gap-2 text-xs sm:text-sm">
          <div class="card rounded-xl px-4 py-3">
            <div class="text-zinc-500">Mode</div>
            <div id="modeTag" class="mt-1 text-cyan-200 font-semibold">Kratos</div>
          </div>
          <div class="card rounded-xl px-4 py-3">
            <div class="text-zinc-500">Vows saved</div>
            <div id="count" class="mt-1 text-white font-semibold">0</div>
          </div>
          <div class="card rounded-xl px-4 py-3">
            <div class="text-zinc-500">Verdict</div>
            <div id="verdictTag" class="mt-1 text-amber-200 font-semibold">Unsworn</div>
          </div>
        </div>
      </div>
    </header>

    <section class="grid lg:grid-cols-[1.15fr_.85fr] gap-6">
      <div class="space-y-6">
        <div class="card rounded-2xl p-5 sm:p-6 panel">
          <div class="flex flex-wrap gap-2 mb-4">
            <button class="modeBtn px-3 py-1.5 rounded-full border border-cyan-400/40 text-cyan-200 bg-cyan-400/10" data-mode="Kratos">Kratos</button>
            <button class="modeBtn px-3 py-1.5 rounded-full border border-emerald-400/40 text-emerald-200 bg-emerald-400/10" data-mode="Atreus">Atreus</button>
            <button class="modeBtn px-3 py-1.5 rounded-full border border-amber-400/40 text-amber-200 bg-amber-400/10" data-mode="Mimir">Mimir</button>
          </div>

          <div class="grid sm:grid-cols-2 gap-4">
            <label class="block">
              <span class="text-xs uppercase tracking-[0.22em] text-zinc-500">The fight</span>
              <textarea id="fight" rows="3" class="mt-2 w-full rounded-xl bg-zinc-950/70 border border-zinc-800 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500" placeholder="What are you actually facing?"></textarea>
            </label>
            <label class="block">
              <span class="text-xs uppercase tracking-[0.22em] text-zinc-500">What must be protected</span>
              <textarea id="protect" rows="3" class="mt-2 w-full rounded-xl bg-zinc-950/70 border border-zinc-800 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500" placeholder="A boundary, a relationship, the work, your energy..."></textarea>
            </label>
            <label class="block">
              <span class="text-xs uppercase tracking-[0.22em] text-zinc-500">The wound</span>
              <textarea id="wound" rows="3" class="mt-2 w-full rounded-xl bg-zinc-950/70 border border-zinc-800 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500" placeholder="What are you afraid will happen?"></textarea>
            </label>
            <label class="block">
              <span class="text-xs uppercase tracking-[0.22em] text-zinc-500">The realm</span>
              <input id="realm" class="mt-2 w-full rounded-xl bg-zinc-950/70 border border-zinc-800 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500" placeholder="Work, family, startup, rest, travel..." />
            </label>
            <label class="block">
              <span class="text-xs uppercase tracking-[0.22em] text-zinc-500">The ally</span>
              <input id="ally" class="mt-2 w-full rounded-xl bg-zinc-950/70 border border-zinc-800 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500" placeholder="Who or what backs you up?" />
            </label>
            <label class="block">
              <span class="text-xs uppercase tracking-[0.22em] text-zinc-500">Deadline</span>
              <input id="deadline" class="mt-2 w-full rounded-xl bg-zinc-950/70 border border-zinc-800 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500" placeholder="Tonight, Friday, this week..." />
            </label>
          </div>

          <div class="mt-5 flex flex-wrap gap-2 text-xs">
            <button class="preset px-3 py-1.5 rounded-full border border-zinc-700 hover:border-zinc-500 hover:text-white transition" data-preset="approval trap">Approval trap</button>
            <button class="preset px-3 py-1.5 rounded-full border border-zinc-700 hover:border-zinc-500 hover:text-white transition" data-preset="hard conversation">Hard conversation</button>
            <button class="preset px-3 py-1.5 rounded-full border border-zinc-700 hover:border-zinc-500 hover:text-white transition" data-preset="need to ship">Need to ship</button>
            <button class="preset px-3 py-1.5 rounded-full border border-zinc-700 hover:border-zinc-500 hover:text-white transition" data-preset="rest is the move">Rest is the move</button>
            <button class="preset px-3 py-1.5 rounded-full border border-zinc-700 hover:border-zinc-500 hover:text-white transition" data-preset="set a boundary">Set a boundary</button>
          </div>

          <div class="mt-5 flex gap-3">
            <button id="forge" class="px-5 py-3 rounded-xl bg-cyan-400 text-black font-semibold hover:bg-cyan-300 transition">Forge oath</button>
            <button id="clear" class="px-5 py-3 rounded-xl border border-zinc-700 text-zinc-300 hover:border-zinc-500 transition">Clear</button>
          </div>
        </div>

        <div id="result" class="card rounded-2xl p-5 sm:p-6 panel min-h-[240px]">
          <div class="text-zinc-500 text-sm">The runes are quiet. Enter the fight and forge a vow.</div>
        </div>
      </div>

      <aside class="space-y-6">
        <div class="card rounded-2xl p-5 sm:p-6 panel">
          <h2 class="text-lg font-semibold text-white">Quick counsel</h2>
          <div id="counsel" class="mt-4 space-y-3 text-sm text-zinc-300"></div>
        </div>

        <div class="card rounded-2xl p-5 sm:p-6 panel">
          <div class="flex items-center justify-between gap-3">
            <h2 class="text-lg font-semibold text-white">Recent vows</h2>
            <span class="text-xs text-zinc-500">local only</span>
          </div>
          <div id="history" class="mt-4 space-y-3 text-sm"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const KEY = 'oath_table_v1';
    const state = { mode: 'Kratos' };
    const els = {
      modeTag: document.getElementById('modeTag'),
      verdictTag: document.getElementById('verdictTag'),
      count: document.getElementById('count'),
      fight: document.getElementById('fight'),
      protect: document.getElementById('protect'),
      wound: document.getElementById('wound'),
      realm: document.getElementById('realm'),
      ally: document.getElementById('ally'),
      deadline: document.getElementById('deadline'),
      result: document.getElementById('result'),
      counsel: document.getElementById('counsel'),
      history: document.getElementById('history'),
    };

    const tones = {
      Kratos: {
        verdict: 'Hold the line',
        color: 'text-cyan-200',
        line: 'Do the thing that protects the realm, not the ego.',
        shield: 'Choose the boundary that survives winter.'
      },
      Atreus: {
        verdict: 'Look closer',
        color: 'text-emerald-200',
        line: 'The real path is usually the one that costs less harm.',
        shield: 'Ask what you are becoming while you solve it.'
      },
      Mimir: {
        verdict: 'Mind the cost',
        color: 'text-amber-200',
        line: 'A clever plan is still a fool if it burns the whole village.',
        shield: 'Take the smallest honest move.'
      }
    };

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
    }
    function saveHistory(items) {
      localStorage.setItem(KEY, JSON.stringify(items.slice(0, 6)));
      renderHistory();
      els.count.textContent = String(items.length);
    }

    function seedPresets(text) {
      const v = text.toLowerCase();
      if (v.includes('approval')) {
        els.fight.value = 'I am trying not to disappoint people, and it is distorting the call.';
        els.protect.value = 'My judgment and the quality of the work.';
        els.wound.value = 'I am afraid criticism will flatten me.';
        els.realm.value = 'Work';
        els.ally.value = 'The version of me that already survived the fall.';
        els.deadline.value = 'Today';
        state.mode = 'Kratos';
      } else if (v.includes('hard conversation')) {
        els.fight.value = 'I need to say the true thing without turning it into a war.';
        els.protect.value = 'The relationship and the actual issue.';
        els.wound.value = 'I am afraid of awkwardness and backlash.';
        els.realm.value = 'Relationships';
        els.ally.value = 'Mimir for language, Atreus for restraint.';
        els.deadline.value = 'Before the meeting';
        state.mode = 'Atreus';
      } else if (v.includes('ship')) {
        els.fight.value = 'A thing should leave the forge before the fog gets it.';
        els.protect.value = 'Shipping momentum and permanence.';
        els.wound.value = 'I keep polishing instead of ending.';
        els.realm.value = 'Build';
        els.ally.value = 'The calendar.';
        els.deadline.value = 'This week';
        state.mode = 'Mimir';
      } else if (v.includes('rest')) {
        els.fight.value = 'The day is done, but my mind is still swinging the axe.';
        els.protect.value = 'Sleep, recovery, and tomorrow\'s edge.';
        els.wound.value = 'If I stop, I will feel behind.';
        els.realm.value = 'Rest';
        els.ally.value = 'The mountain, being indifferent.';
        els.deadline.value = 'Tonight';
        state.mode = 'Kratos';
      } else if (v.includes('boundary')) {
        els.fight.value = 'Someone wants more than I can give.';
        els.protect.value = 'Time, focus, and the size of the promise.';
        els.wound.value = 'I do not want to seem difficult.';
        els.realm.value = 'Work';
        els.ally.value = 'The truth.';
        els.deadline.value = 'Now';
        state.mode = 'Kratos';
      }
      setMode(state.mode);
    }

    function setMode(mode) {
      state.mode = mode;
      els.modeTag.textContent = mode;
      els.modeTag.className = 'mt-1 font-semibold ' + tones[mode].color;
      document.querySelectorAll('.modeBtn').forEach(btn => {
        const active = btn.dataset.mode === mode;
        btn.classList.toggle('ring-2', active);
        btn.classList.toggle('ring-offset-2', active);
        btn.classList.toggle('ring-offset-zinc-950', active);
      });
    }

    function shorten(s, max=78) {
      s = (s || '').trim();
      return s.length > max ? s.slice(0, max - 1) + '…' : s;
    }

    function forge() {
      const fight = els.fight.value.trim();
      const protect = els.protect.value.trim();
      const wound = els.wound.value.trim();
      const realm = els.realm.value.trim() || 'the current realm';
      const ally = els.ally.value.trim() || 'your own hands';
      const deadline = els.deadline.value.trim() || 'soon';
      const tone = tones[state.mode];
      const vow = {
        mode: state.mode,
        fight, protect, wound, realm, ally, deadline,
        when: new Date().toISOString()
      };
      const judgment = !fight ? 'Unsworn' : (protect && wound.length > protect.length / 2 ? 'Costly but clear' : 'Sharpened');
      els.verdictTag.textContent = judgment;
      els.verdictTag.className = 'mt-1 font-semibold ' + tone.color;
      els.result.innerHTML = `
        <div class="flex flex-col gap-4">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <div class="text-xs uppercase tracking-[0.28em] text-zinc-500">Oath forged</div>
              <h3 class="text-2xl font-bold text-white mt-1">${state.mode} / ${shorten(realm, 34)}</h3>
            </div>
            <div class="px-3 py-1 rounded-full border border-zinc-700 text-xs text-zinc-300">${deadline}</div>
          </div>
          <div class="grid md:grid-cols-2 gap-3 text-sm">
            <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
              <div class="text-zinc-500 text-xs uppercase tracking-[0.22em] mb-2">The vow</div>
              <p class="text-zinc-100 leading-6">${fight ? 'I will ' + fight.replace(/^i\s+/i, '') : 'Name the fight before you swing.'}</p>
            </div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
              <div class="text-zinc-500 text-xs uppercase tracking-[0.22em] mb-2">The shield</div>
              <p class="text-zinc-100 leading-6">${tone.shield}</p>
            </div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
              <div class="text-zinc-500 text-xs uppercase tracking-[0.22em] mb-2">Atreus asks</div>
              <p class="text-zinc-100 leading-6">What part of this is actually yours to carry, and what can be set down?</p>
            </div>
            <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
              <div class="text-zinc-500 text-xs uppercase tracking-[0.22em] mb-2">Mimir warns</div>
              <p class="text-zinc-100 leading-6">${tone.line}</p>
            </div>
          </div>
          <div class="rounded-xl border border-zinc-800 bg-cyan-400/5 p-4 text-sm text-zinc-300">
            <div class="text-xs uppercase tracking-[0.22em] text-cyan-300/70 mb-2">Council</div>
            <p><span class="text-white">Protect:</span> ${protect || 'the thing you have not named yet.'}</p>
            <p class="mt-1"><span class="text-white">Wound:</span> ${wound || 'the fear behind the hesitation.'}</p>
            <p class="mt-1"><span class="text-white">Ally:</span> ${ally}</p>
          </div>
        </div>
      `;

      const history = loadHistory();
      history.unshift(vow);
      saveHistory(history);
      renderCounsel(vow, judgment);
    }

    function renderCounsel(vow, judgment) {
      const tone = tones[vow.mode];
      els.counsel.innerHTML = `
        <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
          <div class="text-xs uppercase tracking-[0.22em] text-zinc-500">Verdict</div>
          <div class="mt-1 text-white font-semibold">${judgment}</div>
          <div class="mt-2 text-zinc-400">${tone.line}</div>
        </div>
        <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
          <div class="text-xs uppercase tracking-[0.22em] text-zinc-500">First move</div>
          <div class="mt-1 text-zinc-100">State the fight in one sentence and remove one distraction.</div>
        </div>
        <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
          <div class="text-xs uppercase tracking-[0.22em] text-zinc-500">Do not</div>
          <div class="mt-1 text-zinc-100">Do not try to win the room. Win the realm.</div>
        </div>
      `;
    }

    function renderHistory() {
      const items = loadHistory();
      els.count.textContent = String(items.length);
      if (!items.length) {
        els.history.innerHTML = '<div class="text-zinc-500 text-sm">No vows yet. The forge is cold.</div>';
        return;
      }
      els.history.innerHTML = items.map(item => `
        <div class="rounded-xl border border-zinc-800 bg-zinc-950/60 p-4">
          <div class="flex items-center justify-between gap-3">
            <div class="text-white font-medium">${item.mode}</div>
            <div class="text-[11px] text-zinc-500">${new Date(item.when).toLocaleString()}</div>
          </div>
          <div class="mt-2 text-zinc-300 text-sm leading-6">${shorten(item.fight || 'Unspoken fight.')}</div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.modeBtn').forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });
    document.querySelectorAll('.preset').forEach(btn => {
      btn.addEventListener('click', () => seedPresets(btn.dataset.preset));
    });
    document.getElementById('forge').addEventListener('click', forge);
    document.getElementById('clear').addEventListener('click', () => {
      ['fight','protect','wound','realm','ally','deadline'].forEach(k => els[k].value = '');
      els.result.innerHTML = '<div class="text-zinc-500 text-sm">The runes are quiet. Enter the fight and forge a vow.</div>';
      els.counsel.innerHTML = '';
      setMode('Kratos');
      els.verdictTag.textContent = 'Unsworn';
      els.verdictTag.className = 'mt-1 font-semibold text-amber-200';
    });

    setMode('Kratos');
    renderHistory();
  </script>
</body>
</html>
