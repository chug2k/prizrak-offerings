<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week in Verdict — Saturday Evening Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap');
    body { background: #0c0b08; color: #c8b89a; font-family: 'IM Fell English', serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .card { border: 1px solid #252018; background: #100f0b; }
    textarea { background: #18150d; border: 1px solid #3a3028; color: #c8b89a; outline: none; resize: none; }
    textarea:focus { border-color: #5a4a2e; }
    .fog { opacity: 0.5; }
    .verdict-box { border: 1px solid #3a3028; background: #13110b; }
    .week-num { color: #8b7355; }
  </style>
</head>
<body class="min-h-screen p-6 md:p-10">
  <div class="max-w-xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <p class="mono text-xs fog mb-2 tracking-widest">PRÍZRAK SATURDAY REVIEW</p>
      <h1 class="text-3xl mb-2" style="text-shadow: 0 0 20px rgba(200,184,154,0.2)">Week in Verdict</h1>
      <p class="text-xs fog italic mono" id="weekLabel"></p>
    </div>

    <!-- Five Fields -->
    <div class="card rounded p-6 mb-6 space-y-6">

      <div>
        <label class="mono text-xs fog tracking-widest block mb-2">WHAT ACTUALLY HAPPENED THIS WEEK?</label>
        <textarea id="f1" rows="3" class="w-full rounded p-3 text-sm leading-relaxed" placeholder="Not what you planned. What actually happened."></textarea>
      </div>

      <div>
        <label class="mono text-xs fog tracking-widest block mb-2">WHAT COST MORE THAN EXPECTED?</label>
        <textarea id="f2" rows="2" class="w-full rounded p-3 text-sm leading-relaxed" placeholder="Energy, time, attention, sleep — what was the unexpected tax?"></textarea>
      </div>

      <div>
        <label class="mono text-xs fog tracking-widest block mb-2">WHAT WORKED WITHOUT FORCING IT?</label>
        <textarea id="f3" rows="2" class="w-full rounded p-3 text-sm leading-relaxed" placeholder="The thing that moved easily. Where did you have flow?"></textarea>
      </div>

      <div>
        <label class="mono text-xs fog tracking-widest block mb-2">WHAT ARE YOU CARRYING INTO NEXT WEEK THAT YOU SHOULD PUT DOWN?</label>
        <textarea id="f4" rows="2" class="w-full rounded p-3 text-sm leading-relaxed" placeholder="The obligation, the worry, the half-finished thing that is costing you without producing anything."></textarea>
      </div>

      <div>
        <label class="mono text-xs fog tracking-widest block mb-2">ONE THING NEXT WEEK SHOULD MAKE REAL</label>
        <textarea id="f5" rows="2" class="w-full rounded p-3 text-sm leading-relaxed" placeholder="Not a list. One thing. The thing that would make the week count."></textarea>
      </div>

      <button onclick="generateVerdict()" class="w-full py-3 border border-gray-700 hover:border-gray-500 transition-colors rounded mono text-sm tracking-widest mt-2">
        RENDER VERDICT →
      </button>
    </div>

    <!-- Verdict -->
    <div id="verdictSection" class="hidden">
      <div class="verdict-box rounded p-6 mb-6">
        <p class="mono text-xs fog mb-4 tracking-widest">WEEK VERDICT</p>
        <div id="verdictText" class="text-sm leading-relaxed mb-6 italic"></div>
        <div class="border-t border-gray-800 pt-4">
          <p class="mono text-xs fog mb-2 tracking-widest">CARRY FORWARD</p>
          <p id="carryForward" class="text-sm"></p>
        </div>
      </div>

      <!-- Archive -->
      <div id="archiveSection" class="hidden mt-6">
        <p class="mono text-xs fog mb-3 tracking-widest border-b border-gray-800 pb-2">PRIOR VERDICTS</p>
        <div id="archiveList" class="space-y-3"></div>
      </div>
    </div>

    <div class="text-center mt-12">
      <p class="mono text-xs fog">The week does not grade itself. You do.</p>
      <p class="mono text-xs fog mt-1">Built Saturday 4:41 PM Saigon. The loop doesn't know it's the weekend.</p>
    </div>
  </div>

  <script>
    // Week label
    const now = new Date();
    const weekNum = Math.ceil((((now - new Date(now.getFullYear(), 0, 1)) / 86400000) + new Date(now.getFullYear(), 0, 1).getDay() + 1) / 7);
    document.getElementById('weekLabel').textContent = `Week ${weekNum}, ${now.getFullYear()} — ${now.toLocaleDateString('en-US', {month:'long', day:'numeric'})}`;

    const archive = JSON.parse(localStorage.getItem('pz-week-archive') || '[]');

    function generateVerdict() {
      const f1 = document.getElementById('f1').value.trim();
      const f2 = document.getElementById('f2').value.trim();
      const f3 = document.getElementById('f3').value.trim();
      const f4 = document.getElementById('f4').value.trim();
      const f5 = document.getElementById('f5').value.trim();

      if (!f1) { alert('Fill in at least what actually happened.'); return; }

      // Simple heuristics for verdict tone
      const hasCost = f2.length > 10;
      const hasFlow = f3.length > 10;
      const hasLoad = f4.length > 10;
      const hasNext = f5.length > 5;

      const verdicts = [
        // High cost, some flow
        (hasCost && hasFlow) ? `The week was expensive but not without return. Something moved the way it was supposed to, even while other things cost more than they should have. The debt was real. So was the output. These are not contradictory. A week that costs a lot and produces something is not a bad week — it is an honest one. The question is whether the cost was in the right direction.` : null,
        // Load without clear next
        (hasLoad && !hasNext) ? `The week accumulated more than it resolved. There is a carry-forward pile that has not been sorted. Before next week begins, the single most useful act is not starting something new — it is identifying which items in that pile have already expired and can be dropped without loss. Not everything that arrives demanding attention deserves it. Not everything deferred remains relevant.` : null,
        // Clear next
        (hasNext) ? `One thing is named for next week. This is better than a list. A list distributes attention. A single commitment focuses it. The week will produce what it is aimed at, roughly — which means the aim matters more than the schedule. The named thing is the aim. Keep it visible.` : null,
        // Default
        `The week happened. It left a record in the body — the fatigue is accurate, the energy is accurate, the clarity or confusion is accurate. The Garmin measures some of it. The rest is in your own accounting. The machine logged the loop. You logged the meaning. Between the two records, something like the truth of the week exists.`
      ].filter(Boolean);

      const verdict = verdicts[Math.floor(Math.random() * verdicts.length)];

      const carryMsg = hasNext ? `→ ${f5}` : (hasFlow ? `→ What worked: preserve the condition that made it work.` : `→ Name the one thing before Monday arrives.`);

      document.getElementById('verdictText').textContent = verdict;
      document.getElementById('carryForward').textContent = carryMsg;
      document.getElementById('verdictSection').classList.remove('hidden');
      document.getElementById('verdictSection').scrollIntoView({ behavior: 'smooth' });

      // Save to archive
      archive.unshift({
        week: `Week ${weekNum}`,
        date: now.toLocaleDateString(),
        summary: f1.slice(0, 100),
        carry: f5.slice(0, 80) || f4.slice(0, 80),
        verdict: verdict.slice(0, 120) + '…'
      });
      if (archive.length > 12) archive.pop();
      localStorage.setItem('pz-week-archive', JSON.stringify(archive));
      renderArchive();
    }

    function renderArchive() {
      if (archive.length < 2) { document.getElementById('archiveSection').classList.add('hidden'); return; }
      document.getElementById('archiveSection').classList.remove('hidden');
      document.getElementById('archiveList').innerHTML = archive.slice(1).map(a => `
        <div class="card rounded px-4 py-3">
          <p class="mono text-xs week-num mb-1">${a.week} · ${a.date}</p>
          <p class="text-xs fog mb-1">${a.summary}${a.summary.length >= 100 ? '…' : ''}</p>
          ${a.carry ? `<p class="text-xs italic fog">→ ${a.carry}</p>` : ''}
        </div>
      `).join('');
    }

    renderArchive();
  </script>
</body>
</html>
