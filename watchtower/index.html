<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Watchtower — Sunday Night Alignment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f0f; color: #d4d4d4; font-family: 'Courier New', monospace; }
    .section { border: 1px solid #333; }
    textarea, input { background: #1a1a1a; color: #d4d4d4; border: 1px solid #333; resize: none; outline: none; font-family: 'Courier New', monospace; }
    textarea:focus, input:focus { border-color: #666; }
    .label { color: #666; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; }
    .done-line { text-decoration: line-through; color: #555; }
    ::placeholder { color: #444; }
    .print-btn { background: #1a1a1a; border: 1px solid #444; color: #888; cursor: pointer; }
    .print-btn:hover { border-color: #888; color: #d4d4d4; }
    @media print {
      .no-print { display: none !important; }
      body { background: white; color: black; }
      textarea, input { background: white; color: black; border-color: #ccc; }
      .section { border-color: #ccc; }
      .label { color: #888; }
    }
  </style>
</head>
<body class="min-h-screen p-6 max-w-2xl mx-auto">

  <!-- Header -->
  <div class="mb-8">
    <div class="label mb-1">Sunday Night / Monday Morning</div>
    <h1 class="text-2xl font-bold text-white">The Watchtower</h1>
    <div class="text-sm text-gray-600 mt-1" id="dateDisplay"></div>
  </div>

  <!-- Section 1: Last Week Reckoning -->
  <div class="section p-4 mb-4">
    <div class="label mb-3">Last Week — What Actually Happened</div>
    <div class="space-y-2" id="lastWeekItems"></div>
    <button onclick="addItem('lastWeek')" class="print-btn text-xs px-3 py-1 mt-3">+ add</button>
  </div>

  <!-- Section 2: This Week Commitments -->
  <div class="section p-4 mb-4">
    <div class="label mb-3">This Week — Three Commitments</div>
    <div class="space-y-2" id="thisWeekItems"></div>
    <button onclick="addItem('thisWeek')" class="print-btn text-xs px-3 py-1 mt-3">+ add</button>
  </div>

  <!-- Section 3: Monday First Meeting -->
  <div class="section p-4 mb-4">
    <div class="label mb-3">Monday — First Meeting</div>
    <div class="mb-3">
      <div class="text-xs text-gray-600 mb-1">Who</div>
      <input type="text" id="meetingWho" class="w-full px-2 py-1 text-sm" placeholder="name / company" />
    </div>
    <div class="mb-3">
      <div class="text-xs text-gray-600 mb-1">What I Want From This</div>
      <textarea id="meetingGoal" class="w-full px-2 py-2 text-sm h-16" placeholder="one clear outcome..."></textarea>
    </div>
    <div>
      <div class="text-xs text-gray-600 mb-1">Three Things To Cover</div>
      <div class="space-y-2" id="agendaItems"></div>
      <button onclick="addItem('agenda')" class="print-btn text-xs px-3 py-1 mt-2">+ add</button>
    </div>
  </div>

  <!-- Section 4: What to Drop -->
  <div class="section p-4 mb-6">
    <div class="label mb-2">One Thing to Stop Carrying</div>
    <textarea id="dropItem" class="w-full px-2 py-2 text-sm h-16" placeholder="what are you still carrying that you should put down..."></textarea>
  </div>

  <!-- Controls -->
  <div class="flex gap-3 no-print">
    <button onclick="saveAll()" class="print-btn text-xs px-4 py-2">save</button>
    <button onclick="clearAll()" class="print-btn text-xs px-4 py-2">clear</button>
    <button onclick="window.print()" class="print-btn text-xs px-4 py-2">print</button>
  </div>

  <div class="mt-8 text-xs text-gray-700 no-print">
    — Prizrak / Sunday 4:29 AM / the vodník has been paid
  </div>

<script>
const STORE_KEY = 'watchtower_v1';

function getState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveState(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

function addItem(section, text='', done=false) {
  const container = document.getElementById(section + 'Items') || document.getElementById('agendaItems');
  const id = section + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const div = document.createElement('div');
  div.className = 'flex items-start gap-2';
  div.dataset.id = id;
  div.dataset.section = section;
  div.innerHTML = `
    <input type="checkbox" class="mt-1 flex-shrink-0 cursor-pointer" ${done ? 'checked' : ''} onchange="toggleDone(this)" />
    <input type="text" class="flex-1 px-2 py-1 text-sm ${done ? 'done-line' : ''}" value="${escHtml(text)}" placeholder="..." oninput="saveAll()" />
    <button onclick="removeItem(this)" class="print-btn no-print text-xs px-2 py-1 flex-shrink-0">×</button>
  `;
  const target = document.getElementById(section + 'Items');
  if (target) target.appendChild(div);
}

function toggleDone(cb) {
  const input = cb.parentElement.querySelector('input[type=text]');
  input.classList.toggle('done-line', cb.checked);
  saveAll();
}

function removeItem(btn) {
  btn.closest('[data-section]').remove();
  saveAll();
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function saveAll() {
  const s = {};
  ['lastWeek','thisWeek','agenda'].forEach(sec => {
    s[sec] = [];
    document.querySelectorAll(`[data-section="${sec}"]`).forEach(el => {
      const cb = el.querySelector('input[type=checkbox]');
      const inp = el.querySelector('input[type=text]');
      s[sec].push({ text: inp.value, done: cb.checked });
    });
  });
  s.meetingWho = document.getElementById('meetingWho').value;
  s.meetingGoal = document.getElementById('meetingGoal').value;
  s.dropItem = document.getElementById('dropItem').value;
  saveState(s);
}

function loadAll() {
  const s = getState();
  ['lastWeek','thisWeek','agenda'].forEach(sec => {
    const items = s[sec] || (sec === 'agenda' ? [] : [{text:'',done:false},{text:'',done:false},{text:'',done:false}]);
    const container = document.getElementById(sec + 'Items');
    if (container) { container.innerHTML = ''; items.forEach(i => addItem(sec, i.text, i.done)); }
  });
  if (s.meetingWho !== undefined) document.getElementById('meetingWho').value = s.meetingWho;
  if (s.meetingGoal !== undefined) document.getElementById('meetingGoal').value = s.meetingGoal;
  if (s.dropItem !== undefined) document.getElementById('dropItem').value = s.dropItem;
}

function clearAll() {
  if (!confirm('Clear everything?')) return;
  localStorage.removeItem(STORE_KEY);
  loadAll();
}

// Date display
const now = new Date();
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('dateDisplay').textContent =
  `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

loadAll();

// Auto-save on all inputs
document.addEventListener('input', saveAll);
</script>
</body>
</html>
