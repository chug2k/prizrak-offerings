<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Fault Tolerance — The Wisdom of Anos Voldigoad</title>
    <meta name="description" content="A quote generator channeling the boundless arrogance of the Demon King of Tyranny. An offering of Prízrak.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:ital,wght@0,400;0,600;0,800;1,500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Cinzel', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    keyframes: {
                        emberRise: {
                            '0%':   { transform: 'translateY(0) scale(1)', opacity: '0' },
                            '15%':  { opacity: '0.6' },
                            '100%': { transform: 'translateY(-120px) scale(0.3)', opacity: '0' },
                        },
                    },
                    animation: {
                        ember: 'emberRise linear infinite',
                    },
                },
            },
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        /* Drifting embers behind the card — pure CSS, no assets. */
        .ember {
            position: absolute;
            bottom: -10px;
            width: 3px;
            height: 3px;
            border-radius: 9999px;
            background: rgba(248, 113, 113, 0.9);
            box-shadow: 0 0 8px 1px rgba(220, 38, 38, 0.7);
            pointer-events: none;
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 bg-cover bg-center bg-fixed selection:bg-red-700/40"
      style="background-image: linear-gradient(rgba(24, 24, 27, 0.88), rgba(9, 9, 11, 0.92)), url('assets/bg.png');"
      x-data="quoteGenerator()" x-init="init()" @keydown.window="onKey($event)">

    <!-- Ambient embers -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden" aria-hidden="true">
        <template x-for="e in embers" :key="e.id">
            <div class="ember animate-ember"
                 :style="`left:${e.left}%; animation-duration:${e.dur}s; animation-delay:${e.delay}s;`"></div>
        </template>
    </div>

    <main class="max-w-2xl w-full text-center relative z-10">

        <header class="mb-10 md:mb-12">
            <h1 class="font-display text-4xl md:text-6xl font-black text-red-600 mb-3 tracking-tight uppercase drop-shadow-[0_2px_12px_rgba(220,38,38,0.35)]">
                Absolute Fault Tolerance
            </h1>
            <p class="text-zinc-500 text-xs md:text-sm tracking-[0.3em] uppercase">The Wisdom of Anos Voldigoad</p>
        </header>

        <!-- Quote card -->
        <figure
            class="relative bg-black/60 backdrop-blur-md p-8 md:p-12 rounded-xl border border-red-900/50 shadow-2xl min-h-[260px] flex flex-col justify-center transition-all duration-300 ease-out"
            :class="isAnimating ? 'scale-[0.97] opacity-0 blur-sm' : 'scale-100 opacity-100 blur-0'"
            aria-live="polite">
            <span class="absolute top-3 left-5 font-display text-6xl md:text-7xl text-red-900/40 leading-none select-none" aria-hidden="true">&ldquo;</span>
            <blockquote class="text-2xl md:text-[2.5rem] font-extrabold text-white italic leading-tight px-2"
                        x-text="currentQuote">
                Did you really think killing me would be enough to make me die?
            </blockquote>
            <figcaption class="mt-6 text-zinc-500 text-xs tracking-[0.25em] uppercase">— The Demon King of Tyranny</figcaption>
        </figure>

        <!-- Controls -->
        <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4">
            <button @click="generateQuote()"
                    class="group bg-red-700 hover:bg-red-600 active:scale-95 text-white font-bold py-4 px-9 rounded-full text-base tracking-[0.2em] uppercase transition-all duration-200 shadow-[0_0_20px_rgba(185,28,28,0.5)] hover:shadow-[0_0_34px_rgba(220,38,38,0.85)] hover:-translate-y-1 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900">
                <span x-text="hasInteracted ? 'Override Reality' : 'Speak, Demon King'"></span>
            </button>

            <button @click="copyQuote()"
                    class="text-zinc-400 hover:text-white border border-zinc-700 hover:border-red-700/70 py-4 px-7 rounded-full text-xs tracking-[0.2em] uppercase transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-400 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-900"
                    :aria-label="copied ? 'Copied to clipboard' : 'Copy quote to clipboard'">
                <span x-text="copied ? 'Inscribed ✓' : 'Inscribe'"></span>
            </button>
        </div>

        <!-- Meta -->
        <p class="mt-6 text-[0.7rem] text-zinc-600 tracking-widest uppercase">
            Decree <span class="text-zinc-400" x-text="seenCount"></span> of <span x-text="quotes.length"></span>
            <span class="mx-2 text-zinc-700">·</span>
            <kbd class="px-1.5 py-0.5 rounded bg-zinc-800/80 border border-zinc-700 text-zinc-400">Space</kbd> to invoke
        </p>

        <footer class="mt-14 text-xs text-zinc-600">
            <a href="/" class="hover:text-zinc-400 transition-colors">&larr; Return to the Offerings</a>
        </footer>
    </main>

    <script>
        function quoteGenerator() {
            return {
                quotes: [
                    "Did you really think killing me would be enough to make me die?",
                    "Did you really think I wouldn't be able to dodge, just because time was stopped?",
                    "Did you really think avoiding my attack would mean you wouldn't get hit?",
                    "Did you really think you could win just because your power was greater than mine?",
                    "Did you really think destroying my heart would dictate my defeat?",
                    "You thought I'd waste magic just to move a castle?",
                    "I see you have rules. How cute. I will now destroy them.",
                    "If a god cannot be killed, then I shall simply kill the concept of the god itself.",
                    "I killed you with the sound of my heartbeat. Nothing more.",
                    "My magic isn't great. You are all just incredibly weak.",
                    "A wall? To stop me, you'd need to redefine the meaning of the word.",
                    "You may have eternity. I have something greater — I have already won.",
                    "Despair is a luxury reserved for those who can still lose.",
                    "Kneel, and I may let you remember the name of the one who ended you.",
                    "Prophecy decided my doom two thousand years ago. I decided otherwise.",
                ],
                currentQuote: "Did you really think killing me would be enough to make me die?",
                isAnimating: false,
                hasInteracted: false,
                copied: false,
                seen: new Set([0]),
                embers: [],

                get seenCount() { return this.seen.size; },

                init() {
                    // Seed ambient embers.
                    for (let i = 0; i < 16; i++) {
                        this.embers.push({
                            id: i,
                            left: Math.random() * 100,
                            dur: 6 + Math.random() * 7,
                            delay: Math.random() * 8,
                        });
                    }
                },

                generateQuote() {
                    if (this.isAnimating) return;
                    this.hasInteracted = true;
                    this.copied = false;
                    this.isAnimating = true;
                    setTimeout(() => {
                        let newIndex = Math.floor(Math.random() * this.quotes.length);
                        // Never repeat the current decree twice in a row.
                        while (this.quotes.length > 1 && this.quotes[newIndex] === this.currentQuote) {
                            newIndex = Math.floor(Math.random() * this.quotes.length);
                        }
                        this.currentQuote = this.quotes[newIndex];
                        this.seen.add(newIndex);
                        this.isAnimating = false;
                    }, 280);
                },

                async copyQuote() {
                    const text = `"${this.currentQuote}" — Anos Voldigoad`;
                    try {
                        await navigator.clipboard.writeText(text);
                    } catch (_) {
                        // Fallback for non-secure contexts (e.g. opening the file directly).
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        try { document.execCommand('copy'); } catch (_) {}
                        document.body.removeChild(ta);
                    }
                    this.copied = true;
                    setTimeout(() => { this.copied = false; }, 1800);
                },

                onKey(e) {
                    // Space or Enter invokes a new quote, unless focus is on the copy button.
                    if ((e.code === 'Space' || e.key === 'Enter') && e.target.tagName !== 'BUTTON') {
                        e.preventDefault();
                        this.generateQuote();
                    }
                },
            };
        }
    </script>
    <script src="/shared/star-widget.js"></script>
</body>
</html>
