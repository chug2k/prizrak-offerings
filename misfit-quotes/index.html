<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misfit Quote Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-900 text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 bg-cover bg-center" style="background-image: linear-gradient(rgba(24, 24, 27, 0.85), rgba(24, 24, 27, 0.85)), url('assets/bg.png');" x-data="quoteGenerator()">

    <div class="max-w-2xl w-full text-center relative z-10">
        
        <div class="mb-12">
            <h1 class="text-5xl md:text-7xl font-black text-red-600 mb-4 tracking-tighter uppercase drop-shadow-lg">Absolute Fault Tolerance</h1>
            <p class="text-zinc-400 text-sm md:text-base tracking-widest uppercase">The Wisdom of Anos Voldigoad</p>
        </div>

        <div class="bg-black/60 backdrop-blur-md p-8 md:p-12 rounded-lg border border-red-900/50 shadow-2xl min-h-[250px] flex flex-col justify-center transition-all duration-300 transform" :class="isAnimating ? 'scale-95 opacity-50' : 'scale-100 opacity-100'">
            <p class="text-2xl md:text-4xl font-bold text-white italic leading-tight" x-text="'&quot;' + currentQuote + '&quot;'">
                "Did you really think killing me would be enough to make me die?"
            </p>
        </div>

        <button @click="generateQuote()" class="mt-12 bg-red-700 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-full text-lg tracking-widest uppercase transition-all duration-200 shadow-[0_0_20px_rgba(185,28,28,0.5)] hover:shadow-[0_0_30px_rgba(220,38,38,0.8)] hover:-translate-y-1">
            Override Reality
        </button>

        <div class="mt-16 text-xs text-zinc-600">
            <a href="/" class="hover:text-zinc-400 transition-colors">&larr; Return to Offerings</a>
        </div>
    </div>

    <script>
        function quoteGenerator() {
            return {
                quotes: [
                    "Did you really think killing me would be enough to make me die?",
                    "Did you really think I wouldn't be able to dodge, just because time was stopped?",
                    "Did you really think avoiding my attack would mean you wouldn't get hit?",
                    "Did you really think you could win just because your power was greater than mine?",
                    "Did you really think destroying my heart would dictate my defeat?",
                    "You thought I was going to use magic just to move a castle?",
                    "I see you have rules. How cute. I will now destroy them.",
                    "If a god cannot be killed, then I shall just kill the concept of the god itself.",
                    "I simply killed you with the sound of my heartbeat.",
                    "My magic isn't great. You are all just incredibly weak."
                ],
                currentQuote: "Did you really think killing me would be enough to make me die?",
                isAnimating: false,

                generateQuote() {
                    this.isAnimating = true;
                    setTimeout(() => {
                        let newIndex = Math.floor(Math.random() * this.quotes.length);
                        // Prevent the same quote twice in a row
                        while (this.quotes[newIndex] === this.currentQuote) {
                            newIndex = Math.floor(Math.random() * this.quotes.length);
                        }
                        this.currentQuote = this.quotes[newIndex];
                        this.isAnimating = false;
                    }, 300);
                }
            }
        }
    </script>
</body>
</html>
