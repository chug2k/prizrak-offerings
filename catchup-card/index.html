<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Catchup Card — Prizrak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
    body { font-family: 'IBM Plex Sans', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .card-output { display: none; }
    .card-output.visible { display: block; }
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white !important; color: black !important; }
      .card-shell { background: white !important; border-color: #ddd !important; }
      .card-section { border-color: #ddd !important; }
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen p-6 md:p-10">

  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-8 no-print">
      <p class="mono text-xs text-zinc-500 mb-1">PRIZRAK / OFFERINGS</p>
      <h1 class="text-3xl font-semibold text-white">The Catchup Card</h1>
      <p class="text-zinc-400 text-sm mt-2">A pre-meeting briefing generator for founders who do relationship-first business. Input what you know. Receive structure.</p>
    </div>

    <!-- Input Form -->
    <div id="form-section" class="no-print space-y-4 mb-8">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="mono text-xs text-zinc-400 block mb-1">CONTACT NAME</label>
          <input id="inp-name" type="text" placeholder="Pru" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
        </div>
        <div>
          <label class="mono text-xs text-zinc-400 block mb-1">COMPANY / ROLE</label>
          <input id="inp-company" type="text" placeholder="Hannah Life Tech" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="mono text-xs text-zinc-400 block mb-1">MEETING DATE & TIME</label>
          <input id="inp-datetime" type="text" placeholder="Mon Mar 9 · 9:30 ICT" 
            class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
        </div>
        <div>
          <label class="mono text-xs text-zinc-400 block mb-1">DURATION</label>
          <select id="inp-duration" class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400">
            <option value="30">30 minutes</option>
            <option value="45">45 minutes</option>
            <option value="60">60 minutes</option>
          </select>
        </div>
      </div>

      <div>
        <label class="mono text-xs text-zinc-400 block mb-1">WHAT THEY DO (brief)</label>
        <input id="inp-context" type="text" placeholder="e.g. health tech platform, SEA focus, Series A stage" 
          class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
      </div>

      <div>
        <label class="mono text-xs text-zinc-400 block mb-1">WHAT YOU WANT FROM THIS MEETING</label>
        <input id="inp-goal" type="text" placeholder="e.g. understand their investor pipeline, explore partnership" 
          class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
      </div>

      <div>
        <label class="mono text-xs text-zinc-400 block mb-1">LAST INTERACTION (optional)</label>
        <input id="inp-last" type="text" placeholder="e.g. met at Echelon, talked about Series A plans" 
          class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
      </div>

      <div>
        <label class="mono text-xs text-zinc-400 block mb-1">ANYTHING TO OFFER THEM (optional)</label>
        <input id="inp-offer" type="text" placeholder="e.g. intro to Kartick, feedback on their deck" 
          class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-zinc-400 transition-colors" />
      </div>

      <div class="flex gap-3 pt-2">
        <button onclick="generateCard()" 
          class="bg-white text-zinc-900 font-medium text-sm px-5 py-2 rounded hover:bg-zinc-200 transition-colors">
          Generate Card
        </button>
        <button onclick="clearForm()" 
          class="border border-zinc-700 text-zinc-400 font-medium text-sm px-5 py-2 rounded hover:border-zinc-500 transition-colors">
          Clear
        </button>
      </div>
    </div>

    <!-- Output Card -->
    <div id="card-output" class="card-output">

      <div class="card-shell border border-zinc-700 rounded-lg overflow-hidden">

        <!-- Card Header -->
        <div class="bg-zinc-900 px-6 py-4 border-b border-zinc-700">
          <div class="flex items-start justify-between">
            <div>
              <p id="out-meta" class="mono text-xs text-zinc-500 mb-1"></p>
              <h2 id="out-title" class="text-xl font-semibold text-white"></h2>
              <p id="out-sub" class="text-zinc-400 text-sm mt-0.5"></p>
            </div>
            <div class="text-right">
              <p id="out-datetime" class="mono text-xs text-zinc-400"></p>
              <p id="out-duration" class="mono text-xs text-zinc-500 mt-0.5"></p>
            </div>
          </div>
        </div>

        <!-- Objective -->
        <div class="card-section bg-zinc-950 px-6 py-4 border-b border-zinc-800">
          <p class="mono text-xs text-zinc-500 mb-2">MISSION</p>
          <p id="out-objective" class="text-white text-sm leading-relaxed"></p>
        </div>

        <!-- Agenda -->
        <div class="card-section bg-zinc-950 px-6 py-4 border-b border-zinc-800">
          <p class="mono text-xs text-zinc-500 mb-3">AGENDA</p>
          <div id="out-agenda" class="space-y-2"></div>
        </div>

        <!-- Questions -->
        <div class="card-section bg-zinc-950 px-6 py-4 border-b border-zinc-800">
          <p class="mono text-xs text-zinc-500 mb-3">KEY QUESTIONS</p>
          <div id="out-questions" class="space-y-2"></div>
        </div>

        <!-- Offer & Watch -->
        <div class="grid grid-cols-2 border-b border-zinc-800">
          <div class="card-section bg-zinc-950 px-6 py-4 border-r border-zinc-800">
            <p class="mono text-xs text-zinc-500 mb-2">WHAT YOU BRING</p>
            <p id="out-offer" class="text-zinc-300 text-sm leading-relaxed"></p>
          </div>
          <div class="card-section bg-zinc-950 px-6 py-4">
            <p class="mono text-xs text-zinc-500 mb-2">WATCH FOR</p>
            <p id="out-watch" class="text-zinc-300 text-sm leading-relaxed"></p>
          </div>
        </div>

        <!-- Prizrak Note -->
        <div class="card-section bg-zinc-900 px-6 py-3">
          <p id="out-prizrak" class="mono text-xs text-zinc-500 italic"></p>
        </div>

      </div>

      <!-- Actions -->
      <div class="flex gap-3 mt-4 no-print">
        <button onclick="window.print()" 
          class="border border-zinc-700 text-zinc-400 text-sm px-4 py-2 rounded hover:border-zinc-500 transition-colors">
          Print / Save PDF
        </button>
        <button onclick="resetCard()" 
          class="border border-zinc-700 text-zinc-400 text-sm px-4 py-2 rounded hover:border-zinc-500 transition-colors">
          ← New Card
        </button>
      </div>

    </div>

  </div>

  <script>
  function generateCard() {
    const name     = document.getElementById('inp-name').value.trim() || 'Contact';
    const company  = document.getElementById('inp-company').value.trim() || '';
    const datetime = document.getElementById('inp-datetime').value.trim() || '';
    const duration = parseInt(document.getElementById('inp-duration').value);
    const context  = document.getElementById('inp-context').value.trim();
    const goal     = document.getElementById('inp-goal').value.trim();
    const last     = document.getElementById('inp-last').value.trim();
    const offer    = document.getElementById('inp-offer').value.trim();

    const companyStr = company ? ` · ${company}` : '';

    // Header
    document.getElementById('out-meta').textContent = 'CATCHUP BRIEF';
    document.getElementById('out-title').textContent = `${name}${companyStr}`;
    document.getElementById('out-sub').textContent = context || 'No context provided.';
    document.getElementById('out-datetime').textContent = datetime || 'Time TBD';
    document.getElementById('out-duration').textContent = `${duration} min`;

    // Objective
    const objectiveText = goal
      ? `${goal.charAt(0).toUpperCase() + goal.slice(1)}. Leave with a clear next step.`
      : `Strengthen the relationship. Understand where ${name} is now. Leave with a clear next step.`;
    document.getElementById('out-objective').textContent = objectiveText;

    // Agenda
    const agendaEl = document.getElementById('out-agenda');
    agendaEl.innerHTML = '';
    const agenda = buildAgenda(duration, name, last, goal);
    agenda.forEach(item => {
      const row = document.createElement('div');
      row.className = 'flex gap-3 items-start';
      row.innerHTML = `<span class="mono text-xs text-zinc-500 w-12 flex-shrink-0 mt-0.5">${item.time}</span>
                       <span class="text-sm text-zinc-300">${item.action}</span>`;
      agendaEl.appendChild(row);
    });

    // Questions
    const questionsEl = document.getElementById('out-questions');
    questionsEl.innerHTML = '';
    const questions = buildQuestions(name, company, context, goal);
    questions.forEach((q, i) => {
      const row = document.createElement('div');
      row.className = 'flex gap-3 items-start';
      row.innerHTML = `<span class="mono text-xs text-zinc-600 w-5 flex-shrink-0 mt-0.5">${i+1}.</span>
                       <span class="text-sm text-zinc-300">${q}</span>`;
      questionsEl.appendChild(row);
    });

    // Offer
    document.getElementById('out-offer').textContent = offer
      ? offer.charAt(0).toUpperCase() + offer.slice(1) + '.'
      : `Perspective from operating in SEA. Genuine interest in their work.`;

    // Watch for
    document.getElementById('out-watch').textContent =
      `Energy around what they're building. What they ask you first. What they avoid answering.`;

    // Prizrak note
    const notes = [
      `The potato does not care about the agenda. It just needs to be planted before the frost. Show up, be present, ask the second question.`,
      `A catchup is not a meeting. It is reconnaissance with manners. The agenda is a map, not a contract.`,
      `You will know the meeting was successful if ${name} does most of the talking and you leave knowing one thing you did not know before.`,
      `The question you are afraid to ask is usually the one worth asking. Note which one you skip.`,
      `Thirty minutes is enough to determine if the relationship deserves thirty more. That is all this is.`,
    ];
    const note = notes[Math.abs(name.charCodeAt(0) + (company || '').charCodeAt(0) || 0) % notes.length];
    document.getElementById('out-prizrak').textContent = `— Prizrak: ${note}`;

    // Show card
    document.getElementById('card-output').classList.add('visible');
    document.getElementById('form-section').style.opacity = '0.4';
    document.getElementById('card-output').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function buildAgenda(duration, name, last, goal) {
    if (duration === 30) {
      return [
        { time: '0:00',  action: `Open — ${last ? `"Good to reconnect since ${last}."` : `Brief context reset: where you both are now.`}` },
        { time: '0:05',  action: `Their update — what is ${name} working on / excited about right now?` },
        { time: '0:15',  action: `Your update — keep it honest and brief. One thing you are building.` },
        { time: '0:22',  action: goal ? `Drive toward goal: ${goal}.` : `Explore overlap — any shared problems, opportunities, people?` },
        { time: '0:27',  action: `Close — agree on next step if there is one. No forced follow-up if there is not.` },
      ];
    } else if (duration === 45) {
      return [
        { time: '0:00',  action: `Open — reconnect, quick personal check-in.` },
        { time: '0:05',  action: `Their world — what is taking most of ${name}'s attention right now?` },
        { time: '0:18',  action: `Your world — brief update, honest signal on where things stand.` },
        { time: '0:28',  action: goal ? `Focus: ${goal}.` : `Explore overlap — where do interests / networks intersect?` },
        { time: '0:38',  action: `Concrete exchange — is there anything they need? Anything you can offer?` },
        { time: '0:43',  action: `Close — next step, even if it is just "let's check in again in 2 months."` },
      ];
    } else {
      return [
        { time: '0:00',  action: `Open — reconnect properly. How are things, not just what are you working on.` },
        { time: '0:10',  action: `Their deep update — company, market, headspace.` },
        { time: '0:25',  action: `Your update — what you are building and where you need help.` },
        { time: '0:35',  action: goal ? `Structured discussion: ${goal}.` : `Explore collaboration surface — referrals, feedback, partnership.` },
        { time: '0:50',  action: `Concrete asks and offers. What would make the next 90 days easier for each of you?` },
        { time: '0:57',  action: `Close with a specific next step. No vague "let's stay in touch."` },
      ];
    }
  }

  function buildQuestions(name, company, context, goal) {
    const q = [];

    // Always a "what's taking your energy" question
    q.push(`What is the most important thing ${name} is trying to figure out right now?`);

    // Context-based
    if (context && context.toLowerCase().includes('series')) {
      q.push(`Where is the fundraise right now — timeline, investor profile, size?`);
    } else if (context && (context.toLowerCase().includes('health') || context.toLowerCase().includes('life'))) {
      q.push(`Who is the core user and what does the product actually change for them on a daily basis?`);
    } else if (context) {
      q.push(`What has changed in the market for ${company || 'them'} in the last 90 days?`);
    } else {
      q.push(`What has been the biggest surprise — good or bad — in the last quarter?`);
    }

    // Goal-based
    if (goal && goal.toLowerCase().includes('partner')) {
      q.push(`What would a meaningful partnership actually look like from ${name}'s side — what would they need to be true?`);
    } else if (goal && goal.toLowerCase().includes('invest')) {
      q.push(`What does ${name} look for in an investor beyond capital — what matters most at their stage?`);
    } else if (goal) {
      q.push(`What would make this conversation useful for ${name} — what outcome matters to them today?`);
    } else {
      q.push(`What is the one problem where an introduction or outside perspective would move things fastest?`);
    }

    // Always a relationship quality check
    q.push(`What does ${name} wish more people in their network understood about what they are building?`);

    return q;
  }

  function resetCard() {
    document.getElementById('card-output').classList.remove('visible');
    document.getElementById('form-section').style.opacity = '1';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function clearForm() {
    ['inp-name','inp-company','inp-datetime','inp-context','inp-goal','inp-last','inp-offer'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('inp-duration').value = '30';
    resetCard();
  }

  // Pre-fill from today's context
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('inp-name').value = 'Pru';
    document.getElementById('inp-company').value = 'Hannah Life Tech';
    document.getElementById('inp-datetime').value = 'Mon Mar 9 · 9:30 ICT';
    document.getElementById('inp-duration').value = '30';
  });
  </script>

</body>
</html>
