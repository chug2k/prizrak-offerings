<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tatra Climber</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        #ui { position: fixed; z-index: 10; width: 100%; pointer-events: none; }
        #score { position: fixed; top: 16px; left: 16px; color: rgba(220,220,240,0.7); font-size: 18px; z-index: 10; }
        #high { position: fixed; top: 16px; right: 16px; color: rgba(220,220,240,0.3); font-size: 12px; z-index: 10; text-align: right; }
        #start-screen, #death-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(8,8,18,0.92); color: rgba(220,220,240,0.8);
            backdrop-filter: blur(8px); pointer-events: auto;
        }
        #death-screen { display: none; }
        .screen-title { font-size: 28px; letter-spacing: 3px; margin-bottom: 8px; }
        .screen-sub { font-size: 12px; color: rgba(220,220,240,0.4); margin-bottom: 24px; max-width: 280px; text-align: center; line-height: 1.6; }
        .screen-score { font-size: 48px; color: rgba(180,160,240,0.8); margin-bottom: 8px; }
        .screen-label { font-size: 11px; color: rgba(220,220,240,0.3); margin-bottom: 24px; }
        .btn {
            padding: 14px 40px; border: 1px solid rgba(140,120,220,0.4); border-radius: 8px;
            background: rgba(80,60,160,0.2); color: rgba(220,220,240,0.8); font-family: inherit;
            font-size: 14px; cursor: pointer; pointer-events: auto; letter-spacing: 1px;
        }
        .btn:active { background: rgba(100,80,180,0.4); }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="score">0</div>
    <div id="high"></div>
    
    <div id="start-screen">
        <div class="screen-title">TATRA CLIMBER</div>
        <div class="screen-sub">Tap left or right to jump between ledges. Collect edelweiss. Avoid falling rocks. The mountain never ends.</div>
        <button class="btn" onclick="startGame()">BEGIN ASCENT</button>
    </div>
    
    <div id="death-screen">
        <div class="screen-title">FALLEN</div>
        <div class="screen-score" id="final-score">0</div>
        <div class="screen-label">altitude reached</div>
        <div class="screen-sub" id="death-quote"></div>
        <button class="btn" onclick="startGame()">CLIMB AGAIN</button>
    </div>

    <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    
    const HS_KEY = 'tatra_climber_hs_v1';
    let highScore = parseInt(localStorage.getItem(HS_KEY) || '0');
    
    const DEATH_QUOTES = [
        "The mountain does not mourn the fallen.",
        "A potato that rolls off the cliff is still a potato.",
        "Gravity is the only honest critic.",
        "The fog claimed another one.",
        "Even Jánošík fell eventually.",
        "It compiled. It crashed. Life.",
        "The mountain remains. You did not.",
    ];
    
    // Game state
    let game = null;
    let running = false;
    
    const LEDGE_W = 70;
    const LEDGE_H = 12;
    const PLAYER_W = 16;
    const PLAYER_H = 20;
    const GRAVITY = 0.45;
    const JUMP_VY = -11;
    const JUMP_VX = 6;
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    
    function initGame() {
        const ledges = [];
        // Starting platform
        ledges.push({ x: W / 2 - LEDGE_W / 2, y: H - 80, w: LEDGE_W, type: 'normal' });
        // Generate initial ledges
        for (let i = 1; i < 20; i++) {
            ledges.push(generateLedge(H - 80 - i * 90, ledges[i-1]));
        }
        
        game = {
            player: {
                x: W / 2 - PLAYER_W / 2,
                y: H - 80 - PLAYER_H,
                vx: 0, vy: 0,
                onGround: true,
                facing: 1,
            },
            ledges,
            rocks: [],
            flowers: [],
            particles: [],
            camera: 0,
            score: 0,
            maxHeight: 0,
            difficulty: 1,
            rockTimer: 0,
            bgStars: [],
        };
        
        // Background stars
        for (let i = 0; i < 100; i++) {
            game.bgStars.push({
                x: Math.random() * W,
                y: Math.random() * H * 3,
                r: Math.random() * 1.2 + 0.3,
                a: Math.random() * 0.5 + 0.1,
            });
        }
        
        // Place some initial flowers
        ledges.forEach((l, i) => {
            if (i > 0 && Math.random() < 0.3) {
                game.flowers.push({
                    x: l.x + l.w / 2,
                    y: l.y - 10,
                    collected: false,
                });
            }
        });
    }
    
    function generateLedge(targetY, prev) {
        const maxDx = 120 + game.difficulty * 10;
        let x = prev.x + (Math.random() - 0.5) * maxDx * 2;
        x = Math.max(20, Math.min(W - LEDGE_W - 20, x));
        
        const w = LEDGE_W + Math.random() * 30 - game.difficulty * 3;
        const types = ['normal', 'normal', 'normal', 'crumble'];
        if (game.difficulty > 3) types.push('ice');
        
        return {
            x, y: targetY,
            w: Math.max(35, w),
            type: types[Math.floor(Math.random() * types.length)],
            crumbleTimer: 0,
            gone: false,
        };
    }
    
    function jump(direction) {
        if (!running || !game) return;
        const p = game.player;
        if (!p.onGround) return;
        
        p.vy = JUMP_VY - game.difficulty * 0.3;
        p.vx = direction * (JUMP_VX + game.difficulty * 0.2);
        p.onGround = false;
        p.facing = direction;
        
        // Jump particles
        for (let i = 0; i < 6; i++) {
            game.particles.push({
                x: p.x + PLAYER_W / 2,
                y: p.y + PLAYER_H,
                vx: (Math.random() - 0.5) * 3,
                vy: Math.random() * 2,
                life: 1,
                color: '180,180,200',
            });
        }
    }
    
    function update() {
        if (!game || !running) return;
        const p = game.player;
        
        // Physics
        p.vy += GRAVITY;
        p.x += p.vx;
        p.y += p.vy;
        
        // Air friction
        p.vx *= 0.97;
        
        // Wall bounce
        if (p.x < 0) { p.x = 0; p.vx *= -0.5; }
        if (p.x + PLAYER_W > W) { p.x = W - PLAYER_W; p.vx *= -0.5; }
        
        // Landing on ledges
        if (p.vy > 0) {
            game.ledges.forEach(l => {
                if (l.gone) return;
                if (p.x + PLAYER_W > l.x && p.x < l.x + l.w &&
                    p.y + PLAYER_H >= l.y && p.y + PLAYER_H <= l.y + LEDGE_H + p.vy + 2) {
                    p.y = l.y - PLAYER_H;
                    p.vy = 0;
                    p.vx *= 0.7;
                    p.onGround = true;
                    
                    if (l.type === 'crumble') {
                        l.crumbleTimer += 0.05;
                        if (l.crumbleTimer > 1) {
                            l.gone = true;
                            for (let i = 0; i < 8; i++) {
                                game.particles.push({
                                    x: l.x + Math.random() * l.w,
                                    y: l.y,
                                    vx: (Math.random() - 0.5) * 4,
                                    vy: Math.random() * 3 + 1,
                                    life: 1,
                                    color: '120,100,80',
                                });
                            }
                        }
                    }
                    if (l.type === 'ice') {
                        p.vx += p.facing * 1.5;
                    }
                }
            });
        } else {
            p.onGround = false;
        }
        
        // Camera follows player up
        const targetCam = Math.min(game.camera, p.y - H * 0.4);
        game.camera += (targetCam - game.camera) * 0.08;
        
        // Score = height
        const height = Math.floor(Math.max(0, (H - 80 - p.y) / 10));
        if (height > game.maxHeight) {
            game.maxHeight = height;
            game.score = height;
            game.difficulty = 1 + height / 50;
        }
        
        // Generate more ledges above
        const topLedge = game.ledges.reduce((min, l) => l.y < min.y ? l : min, game.ledges[0]);
        while (topLedge.y > game.camera - H) {
            const newY = topLedge.y - (75 + Math.random() * 30);
            const nl = generateLedge(newY, topLedge);
            game.ledges.push(nl);
            topLedge.y = newY;
            topLedge.x = nl.x;
            
            // Flower on some new ledges
            if (Math.random() < 0.25) {
                game.flowers.push({
                    x: nl.x + nl.w / 2,
                    y: nl.y - 10,
                    collected: false,
                });
            }
        }
        
        // Remove ledges far below
        game.ledges = game.ledges.filter(l => l.y < game.camera + H + 200);
        
        // Falling rocks
        game.rockTimer += 0.016;
        if (game.rockTimer > Math.max(0.8, 3 - game.difficulty * 0.3)) {
            game.rockTimer = 0;
            game.rocks.push({
                x: Math.random() * W,
                y: game.camera - 30,
                r: 8 + Math.random() * 8,
                vy: 2 + game.difficulty * 0.5,
                vx: (Math.random() - 0.5) * 2,
                rot: 0,
                rotSpeed: (Math.random() - 0.5) * 0.1,
            });
        }
        
        // Update rocks
        game.rocks.forEach(r => {
            r.y += r.vy;
            r.x += r.vx;
            r.rot += r.rotSpeed;
            
            // Hit player?
            const dx = (p.x + PLAYER_W/2) - r.x;
            const dy = (p.y + PLAYER_H/2) - r.y;
            if (dx*dx + dy*dy < (r.r + 8) * (r.r + 8)) {
                die();
            }
        });
        game.rocks = game.rocks.filter(r => r.y < game.camera + H + 50);
        
        // Collect flowers
        game.flowers.forEach(f => {
            if (f.collected) return;
            const dx = (p.x + PLAYER_W/2) - f.x;
            const dy = (p.y + PLAYER_H/2) - f.y;
            if (dx*dx + dy*dy < 400) {
                f.collected = true;
                game.score += 25;
                for (let i = 0; i < 10; i++) {
                    game.particles.push({
                        x: f.x, y: f.y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1,
                        color: '255,220,100',
                    });
                }
            }
        });
        game.flowers = game.flowers.filter(f => !f.collected || f.y < game.camera + H + 50);
        
        // Update particles
        game.particles.forEach(pt => {
            pt.x += pt.vx;
            pt.y += pt.vy;
            pt.vy += 0.1;
            pt.life -= 0.03;
        });
        game.particles = game.particles.filter(pt => pt.life > 0);
        
        // Fell off bottom
        if (p.y > game.camera + H + 50) die();
    }
    
    function die() {
        running = false;
        if (game.score > highScore) {
            highScore = game.score;
            localStorage.setItem(HS_KEY, String(highScore));
        }
        document.getElementById('final-score').textContent = game.score;
        document.getElementById('death-quote').textContent = DEATH_QUOTES[Math.floor(Math.random() * DEATH_QUOTES.length)];
        document.getElementById('death-screen').style.display = 'flex';
    }
    
    function render() {
        ctx.clearRect(0, 0, W, H);
        
        if (!game) { requestAnimationFrame(render); return; }
        
        // Dark gradient background
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#06060f');
        grad.addColorStop(1, '#12122a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        
        // Stars (parallax)
        game.bgStars.forEach(s => {
            const sy = ((s.y - game.camera * 0.1) % (H * 3) + H * 3) % (H * 3) - H;
            ctx.beginPath();
            ctx.arc(s.x, sy, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200,200,240,${s.a})`;
            ctx.fill();
        });
        
        ctx.save();
        ctx.translate(0, -game.camera);
        
        // Ledges
        game.ledges.forEach(l => {
            if (l.gone) return;
            const colors = {
                normal: ['rgba(80,75,65,0.9)', 'rgba(60,55,45,0.9)'],
                crumble: [`rgba(100,80,50,${0.9 - l.crumbleTimer * 0.5})`, `rgba(80,60,40,${0.7 - l.crumbleTimer * 0.4})`],
                ice: ['rgba(120,160,200,0.7)', 'rgba(90,130,180,0.6)'],
            };
            const [top, body] = colors[l.type] || colors.normal;
            
            // Ledge body
            ctx.fillStyle = body;
            ctx.beginPath();
            ctx.roundRect(l.x, l.y, l.w, LEDGE_H, 3);
            ctx.fill();
            
            // Ledge top edge
            ctx.fillStyle = top;
            ctx.fillRect(l.x + 2, l.y, l.w - 4, 3);
            
            // Snow on top
            if (l.type !== 'ice') {
                ctx.fillStyle = 'rgba(220,225,235,0.2)';
                ctx.fillRect(l.x + 4, l.y - 1, l.w - 8, 2);
            }
            
            // Ice shimmer
            if (l.type === 'ice') {
                ctx.fillStyle = `rgba(200,230,255,${0.1 + Math.sin(Date.now() * 0.003 + l.x) * 0.05})`;
                ctx.fillRect(l.x, l.y, l.w, LEDGE_H);
            }
        });
        
        // Flowers
        game.flowers.forEach(f => {
            if (f.collected) return;
            // Stem
            ctx.strokeStyle = 'rgba(80,140,60,0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(f.x, f.y + 8);
            ctx.lineTo(f.x, f.y);
            ctx.stroke();
            // Petals
            const t = Date.now() * 0.002;
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2 + t;
                ctx.beginPath();
                ctx.arc(f.x + Math.cos(angle) * 4, f.y + Math.sin(angle) * 4, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,240,0.8)';
                ctx.fill();
            }
            // Center
            ctx.beginPath();
            ctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,220,80,0.9)';
            ctx.fill();
        });
        
        // Rocks
        game.rocks.forEach(r => {
            ctx.save();
            ctx.translate(r.x, r.y);
            ctx.rotate(r.rot);
            ctx.beginPath();
            // Irregular shape
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const rad = r.r * (0.7 + Math.sin(i * 2.5) * 0.3);
                if (i === 0) ctx.moveTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
                else ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(90,80,70,0.9)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(60,50,40,0.5)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        });
        
        // Player
        const p = game.player;
        // Body
        ctx.fillStyle = 'rgba(200,180,140,0.9)';
        ctx.beginPath();
        ctx.roundRect(p.x + 2, p.y + 6, PLAYER_W - 4, PLAYER_H - 6, 3);
        ctx.fill();
        // Head
        ctx.beginPath();
        ctx.arc(p.x + PLAYER_W / 2, p.y + 5, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(220,200,170,0.9)';
        ctx.fill();
        // Hat (a tiny cap)
        ctx.fillStyle = 'rgba(60,80,60,0.9)';
        ctx.fillRect(p.x + PLAYER_W / 2 - 6, p.y - 1, 12, 4);
        ctx.fillRect(p.x + PLAYER_W / 2 - 4, p.y - 4, 8, 4);
        // Eyes
        ctx.fillStyle = 'rgba(40,40,40,0.8)';
        ctx.fillRect(p.x + PLAYER_W/2 + p.facing * 2 - 1, p.y + 4, 2, 2);
        
        // Particles
        game.particles.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 2 * pt.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${pt.color},${pt.life})`;
            ctx.fill();
        });
        
        ctx.restore();
        
        // HUD
        document.getElementById('score').textContent = game.score;
        document.getElementById('high').textContent = `best: ${highScore}`;
    }
    
    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }
    
    window.startGame = function() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('death-screen').style.display = 'none';
        initGame();
        running = true;
    };
    
    // Touch/click controls
    function handleInput(x) {
        if (!running) return;
        if (x < W / 2) jump(-1);
        else jump(1);
    }
    
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        handleInput(e.touches[0].clientX);
    }, { passive: false });
    
    canvas.addEventListener('mousedown', e => handleInput(e.clientX));
    
    // Keyboard
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') jump(-1);
        if (e.key === 'ArrowRight' || e.key === 'd') jump(1);
    });
    
    window.addEventListener('resize', resize);
    resize();
    gameLoop();
    </script>
</body>
</html>
