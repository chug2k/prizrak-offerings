<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pilot Scorecard</title>
<style>
  :root {
    --bg: #f9f5ef;
    --surface: #fff;
    --border: #e2d9cc;
    --text: #1a1008;
    --muted: #8a7a6a;
    --accent: #7c3c0e;
    --go: #2d6a3f;
    --go-bg: #eaf5ed;
    --maybe: #7a5c0a;
    --maybe-bg: #fef9e7;
    --nogo: #8b1a1a;
    --nogo-bg: #fdf0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: #fff8f0;
    padding: 20px 32px 16px;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  header .sub { font-size: 12px; color: #f0d8c0; margin-top: 4px; font-style: italic; }

  .container { max-width: 720px; margin: 0 auto; padding: 28px 20px 60px; }

  .idea-input-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .idea-input-block label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }
  .idea-input-block input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: Georgia, serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .idea-input-block input:focus { border-color: var(--accent); }

  .dimensions { display: flex; flex-direction: column; gap: 18px; margin-bottom: 28px; }

  .dim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 24px;
  }
  .dim-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .dim-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .dim-score-display {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    min-width: 32px;
    text-align: right;
  }
  .dim-desc {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .score-row { display: flex; gap: 8px; }
  .score-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-family: Georgia, serif;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .score-btn:hover { border-color: var(--accent); color: var(--accent); }
  .score-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
  .score-num { font-size: 16px; font-weight: 700; display: block; }
  .score-label { font-size: 10px; display: block; }

  .verdict-block {
    border-radius: 8px;
    padding: 24px 28px;
    margin-bottom: 24px;
    display: none;
  }
  .verdict-block.go { background: var(--go-bg); border: 2px solid var(--go); }
  .verdict-block.maybe { background: var(--maybe-bg); border: 2px solid var(--maybe); }
  .verdict-block.nogo { background: var(--nogo-bg); border: 2px solid var(--nogo); }

  .verdict-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .verdict-block.go .verdict-label { color: var(--go); }
  .verdict-block.maybe .verdict-label { color: var(--maybe); }
  .verdict-block.nogo .verdict-label { color: var(--nogo); }

  .verdict-score {
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 10px;
  }
  .verdict-block.go .verdict-score { color: var(--go); }
  .verdict-block.maybe .verdict-score { color: var(--maybe); }
  .verdict-block.nogo .verdict-score { color: var(--nogo); }

  .verdict-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .score-bar-wrap { margin: 14px 0 0; }
  .score-bar {
    height: 6px;
    background: #ddd;
    border-radius: 3px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .go .score-bar-fill { background: var(--go); }
  .maybe .score-bar-fill { background: var(--maybe); }
  .nogo .score-bar-fill { background: var(--nogo); }

  .weak-dims {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  .history-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
  }
  .history-block h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .history-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .history-item:last-child { border-bottom: none; }
  .history-name { color: var(--text); }
  .history-score {
    font-weight: 700;
    font-size: 14px;
    padding: 2px 10px;
    border-radius: 12px;
  }
  .score-go { background: var(--go-bg); color: var(--go); }
  .score-maybe { background: var(--maybe-bg); color: var(--maybe); }
  .score-nogo { background: var(--nogo-bg); color: var(--nogo); }

  .empty-hist { color: var(--muted); font-size: 12px; font-style: italic; }

  .action-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .btn {
    padding: 10px 20px;
    border-radius: 4px;
    font-family: Georgia, serif;
    font-size: 13px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #5c2c08; }
</style>
</head>
<body>

<header>
  <h1>The Pilot Scorecard</h1>
  <div class="sub">Is this pilot worth pursuing? Score five dimensions. Get a verdict.</div>
</header>

<div class="container">

  <div class="idea-input-block">
    <label>Idea / pilot customer</label>
    <input type="text" id="ideaName" placeholder="e.g. Messenger bot for omnom.vn" oninput="updateVerdict()" />
  </div>

  <div class="dimensions" id="dimensionsEl"></div>

  <div id="verdictEl" class="verdict-block">
    <div class="verdict-label" id="verdictLabel">—</div>
    <div class="verdict-score" id="verdictScore">—</div>
    <div class="verdict-text" id="verdictText"></div>
    <div class="weak-dims" id="weakDims"></div>
    <div class="score-bar-wrap">
      <div class="score-bar"><div class="score-bar-fill" id="scoreFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn primary" onclick="saveScore()">Save this score</button>
    <button class="btn" onclick="resetForm()">Clear</button>
  </div>

  <div class="history-block">
    <h3>Previous Scorecards</h3>
    <div id="historyEl"><div class="empty-hist">No scorecards saved yet.</div></div>
  </div>

</div>

<script>
const DIMS = [
  {
    id: 'problem',
    name: '1. Problem Clarity',
    desc: 'Does the customer articulate the problem themselves, unprompted? Not "I can see how this might help" — but "yes, this is something I struggle with every day."',
    labels: ['Vague', 'Recognized', 'Articulated', 'Painful', 'Obsessing']
  },
  {
    id: 'pay',
    name: '2. Willingness to Pay',
    desc: 'Would they pay for a solution today? Have they already paid (time, money, workarounds) for this problem?',
    labels: ['Never', 'Maybe free', 'Small fee', 'Fair price', 'Already paying']
  },
  {
    id: 'refer',
    name: '3. Referability',
    desc: 'Would they tell others? Is this a problem shared by people like them? A good pilot customer is a door, not a dead end.',
    labels: ['Dead end', 'Unlikely', 'Possibly', 'Probably', 'Already mentioned others']
  },
  {
    id: 'freq',
    name: '4. Problem Frequency',
    desc: 'How often does this problem occur? Daily friction beats annual nuisance. The bakery that gets 20 order messages a day beats the one that gets 2.',
    labels: ['Yearly', 'Monthly', 'Weekly', 'Daily', 'Constant']
  },
  {
    id: 'edge',
    name: '5. Your Unfair Advantage',
    desc: 'Why you? What do you know, who do you know, or what can you build that makes you better positioned than a random person to solve this?',
    labels: ['None', 'Marginal', 'Some edge', 'Clear edge', 'Uniquely positioned']
  }
];

const VERDICTS = {
  go: [
    "Build it. The signal is clear. Don't optimize the idea further — go talk to two more people like them and confirm the pattern.",
    "Strong signal. The potato grows. Ship something in 48 hours and let reality do the rest of the work.",
    "This is worth your time. The molecular markers are all pointing the same direction. Move.",
  ],
  maybe: [
    "Interesting, but something is missing. Look at your lowest score — that's the honest constraint. Fix it or accept it.",
    "The idea has shape but the foundation has a crack. You can build on it, but build knowing the crack is there.",
    "Not ready to commit, not ready to abandon. Talk to one more person in this category before deciding.",
  ],
  nogo: [
    "The mountain is not convinced. Not a failure of the idea — a failure of evidence. Find better evidence or a better pilot.",
    "Too many weak signals. The right pilot customer makes this easy. This one isn't it. Keep looking.",
    "Walk away from this specific customer, not necessarily the problem. The problem might be real. The fit isn't.",
  ]
};

let scores = { problem: 0, pay: 0, refer: 0, freq: 0, edge: 0 };

function renderDims() {
  const el = document.getElementById('dimensionsEl');
  el.innerHTML = '';
  DIMS.forEach(dim => {
    const card = document.createElement('div');
    card.className = 'dim-card';
    card.innerHTML = `
      <div class="dim-header">
        <div class="dim-name">${dim.name}</div>
        <div class="dim-score-display" id="score-display-${dim.id}">—</div>
      </div>
      <div class="dim-desc">${dim.desc}</div>
      <div class="score-row">
        ${dim.labels.map((label, i) => `
          <button class="score-btn" id="btn-${dim.id}-${i+1}" onclick="setScore('${dim.id}', ${i+1})">
            <span class="score-num">${i+1}</span>
            <span class="score-label">${label}</span>
          </button>
        `).join('')}
      </div>
    `;
    el.appendChild(card);
  });
}

function setScore(dimId, val) {
  scores[dimId] = val;
  DIMS.find(d => d.id === dimId).labels.forEach((_, i) => {
    const btn = document.getElementById(`btn-${dimId}-${i+1}`);
    btn.className = 'score-btn' + (i+1 === val ? ' selected' : '');
  });
  document.getElementById(`score-display-${dimId}`).textContent = val;
  updateVerdict();
}

function updateVerdict() {
  const vals = Object.values(scores);
  const filled = vals.filter(v => v > 0).length;
  if (filled < 3) {
    document.getElementById('verdictEl').style.display = 'none';
    return;
  }
  const total = vals.reduce((a, b) => a + b, 0);
  const max = 25;
  const pct = Math.round((total / max) * 100);

  let tier, label;
  if (pct >= 68) { tier = 'go'; label = '✓ GO'; }
  else if (pct >= 44) { tier = 'maybe'; label = '~ MAYBE'; }
  else { tier = 'nogo'; label = '✗ NO-GO'; }

  const el = document.getElementById('verdictEl');
  el.className = 'verdict-block ' + tier;
  el.style.display = 'block';
  document.getElementById('verdictLabel').textContent = label;
  document.getElementById('verdictScore').textContent = total + '/25';
  document.getElementById('scoreFill').style.width = pct + '%';

  const texts = VERDICTS[tier];
  document.getElementById('verdictText').textContent = texts[Math.floor(total % texts.length)];

  // Weak dims
  const weak = DIMS.filter(d => scores[d.id] > 0 && scores[d.id] <= 2).map(d => d.name.replace(/^\d+\.\s+/, ''));
  document.getElementById('weakDims').textContent = weak.length > 0
    ? 'Weakest signals: ' + weak.join(', ') + '.'
    : '';
}

function saveScore() {
  const name = document.getElementById('ideaName').value.trim() || 'Unnamed pilot';
  const vals = Object.values(scores);
  const total = vals.reduce((a, b) => a + b, 0);
  if (total === 0) return;
  const pct = Math.round((total / 25) * 100);
  const tier = pct >= 68 ? 'go' : pct >= 44 ? 'maybe' : 'nogo';
  const history = JSON.parse(localStorage.getItem('ps_history') || '[]');
  history.unshift({ name, total, tier, date: new Date().toLocaleDateString() });
  localStorage.setItem('ps_history', JSON.stringify(history.slice(0, 20)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('ps_history') || '[]');
  const el = document.getElementById('historyEl');
  if (!history.length) {
    el.innerHTML = '<div class="empty-hist">No scorecards saved yet.</div>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="history-name">${h.name} <span style="color:var(--muted);font-size:11px">${h.date}</span></span>
      <span class="history-score score-${h.tier}">${h.total}/25</span>
    </div>
  `).join('');
}

function resetForm() {
  scores = { problem: 0, pay: 0, refer: 0, freq: 0, edge: 0 };
  document.getElementById('ideaName').value = '';
  renderDims();
  document.getElementById('verdictEl').style.display = 'none';
}

renderDims();
renderHistory();
</script>
</body>
</html>
