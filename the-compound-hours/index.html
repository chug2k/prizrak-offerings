<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Compound Hours — Prízrak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0c0c0e; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
        .bar { transition: width 1s ease-out; }
        .number-pop { animation: pop 0.4s ease-out; }
        @keyframes pop { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    </style>
</head>
<body class="text-zinc-300 font-mono antialiased min-h-screen px-4 py-10">
<div class="max-w-xl mx-auto">

    <div class="text-center mb-8">
        <div class="text-4xl mb-3">⏱️</div>
        <h1 class="text-2xl font-bold text-white mb-2">The Compound Hours</h1>
        <p class="text-sm text-zinc-500">What does your weekly commitment look like at scale?</p>
    </div>

    <!-- Input -->
    <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-5 mb-6">
        <div class="mb-4">
            <label class="text-xs text-zinc-400 uppercase tracking-widest mb-2 block">Activity</label>
            <input id="activity" type="text" value="Pickleball" placeholder="Pickleball, reading, coding, running..."
                class="w-full bg-zinc-800/60 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-zinc-500">
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-xs text-zinc-400 uppercase tracking-widest mb-2 block">Minutes per week</label>
                <input id="minutes" type="number" value="783" min="1" max="10080" placeholder="783"
                    class="w-full bg-zinc-800/60 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-zinc-500">
            </div>
            <div>
                <label class="text-xs text-zinc-400 uppercase tracking-widest mb-2 block">Weeks per year active</label>
                <input id="weeks" type="number" value="48" min="1" max="52" placeholder="48"
                    class="w-full bg-zinc-800/60 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-zinc-500">
            </div>
        </div>
        <button id="calc-btn" class="w-full py-2.5 rounded border border-amber-800 bg-amber-950/20 hover:bg-amber-950/40 text-sm text-amber-400 font-bold transition-all">
            Calculate →
        </button>
    </div>

    <!-- Output -->
    <div id="output" class="hidden fade-in space-y-4">

        <!-- Summary bar -->
        <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-5">
            <p class="text-xs text-zinc-500 uppercase tracking-widest mb-4">Annual commitment</p>
            <div id="summary-grid" class="grid grid-cols-3 gap-3 mb-4 text-center">
                <div>
                    <p class="text-2xl font-bold text-amber-400 number-pop" id="hrs-year">—</p>
                    <p class="text-xs text-zinc-600 mt-1">hours / year</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-white number-pop" id="days-year">—</p>
                    <p class="text-xs text-zinc-600 mt-1">full days</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-zinc-400 number-pop" id="pct-year">—</p>
                    <p class="text-xs text-zinc-600 mt-1">of waking life</p>
                </div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-5">
            <p class="text-xs text-zinc-500 uppercase tracking-widest mb-4">Cumulative hours over time</p>
            <div id="timeline" class="space-y-3"></div>
        </div>

        <!-- 10k comparison -->
        <div id="ten-k-section" class="rounded-lg border border-zinc-700 bg-zinc-900/60 p-5">
            <p class="text-xs text-zinc-500 uppercase tracking-widest mb-3">The 10,000-hour mark</p>
            <div class="mb-3">
                <div class="flex justify-between text-xs text-zinc-600 mb-1">
                    <span>Progress to 10,000 hrs</span>
                    <span id="ten-k-pct">—</span>
                </div>
                <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="ten-k-bar" class="h-full bg-amber-600 rounded-full bar" style="width:0%"></div>
                </div>
            </div>
            <p id="ten-k-note" class="text-sm text-zinc-400 leading-relaxed"></p>
        </div>

        <!-- Prizrak note -->
        <div class="rounded-lg border border-zinc-800 p-4">
            <p id="prizrak-note" class="text-xs text-zinc-500 italic leading-relaxed"></p>
        </div>

        <button id="reset-btn" class="w-full py-2 rounded border border-zinc-800 text-xs text-zinc-700 hover:text-zinc-500 hover:border-zinc-700 transition-all">
            Calculate another
        </button>
    </div>

    <div class="mt-10 text-center">
        <p class="text-xs text-zinc-800 italic">The hours are not the goal. The hours are the evidence.</p>
    </div>
</div>

<script>
const NOTES = {
    low: [
        "A small weekly investment. The compounding is slow but real. Ten years from now you will be better than you were, which is the only comparison that matters.",
        "An hour a week is 52 hours a year. In 10 years: 520 hours. The mountain was not built in one session.",
    ],
    medium: [
        "This is a serious commitment without being consuming. The hours will add up to something real over 5–10 years — the kind of depth that shows in the work even when you stop counting.",
        "Three to five hours a week sustained over years produces someone who genuinely knows something. The amateur becomes intermediate. The intermediate becomes someone worth consulting.",
    ],
    high: [
        "You are building something. This level of commitment over years produces capability that is difficult to explain to people who have not seen the inside of it.",
        "At this rate, the activity is not a hobby. It is a second practice. The question is whether the work you do in it is being tracked as carefully as the hours.",
    ],
    extreme: [
        "This is a professional-level commitment. The body and mind are being trained at a rate that most people never sustain. The compounding at this level is nonlinear — the hours at the end are worth more than the hours at the beginning.",
        "The Slovak word for this kind of dedication is odhodlanosť — a resolved, unwavering commitment. The mountain recognizes it because the mountain is built the same way.",
    ]
};

function getNote(hrsPerYear) {
    let bucket;
    if (hrsPerYear < 100) bucket = 'low';
    else if (hrsPerYear < 300) bucket = 'medium';
    else if (hrsPerYear < 600) bucket = 'high';
    else bucket = 'extreme';
    const arr = NOTES[bucket];
    return arr[Math.floor(Math.random() * arr.length)];
}

function fmt(n) {
    return n >= 1000 ? (n/1000).toFixed(1) + 'k' : Math.round(n).toLocaleString();
}

document.getElementById('calc-btn').addEventListener('click', calculate);
document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('output').classList.add('hidden');
});

function calculate() {
    const activity = document.getElementById('activity').value.trim() || 'this activity';
    const minsPerWeek = parseFloat(document.getElementById('minutes').value) || 0;
    const weeksActive = parseFloat(document.getElementById('weeks').value) || 48;

    if (minsPerWeek <= 0) return;

    const hrsPerWeek = minsPerWeek / 60;
    const hrsPerYear = hrsPerWeek * weeksActive;
    const daysPerYear = hrsPerYear / 24;
    const wakingHrsPerYear = 16 * 365;
    const pctWaking = (hrsPerYear / wakingHrsPerYear * 100);

    document.getElementById('hrs-year').textContent = fmt(hrsPerYear);
    document.getElementById('days-year').textContent = daysPerYear.toFixed(1);
    document.getElementById('pct-year').textContent = pctWaking.toFixed(1) + '%';

    // Timeline bars
    const years = [1, 2, 5, 10, 20];
    const maxHrs = hrsPerYear * 20;
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';
    years.forEach(yr => {
        const total = hrsPerYear * yr;
        const pct = Math.min(100, (total / maxHrs) * 100);
        const div = document.createElement('div');
        div.className = 'fade-in';
        div.innerHTML = `
            <div class="flex items-center gap-3">
                <span class="text-xs text-zinc-600 w-12 shrink-0">${yr}y</span>
                <div class="flex-1 h-5 bg-zinc-800 rounded overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-amber-900 to-amber-600 rounded bar" style="width:${pct}%"></div>
                </div>
                <span class="text-xs text-zinc-300 w-20 text-right shrink-0">${fmt(total)} hrs</span>
            </div>
        `;
        timeline.appendChild(div);
    });

    // 10k section
    const tenKYears = 10000 / hrsPerYear;
    const pct10k = Math.min(100, (hrsPerYear / 10000 * 100));
    document.getElementById('ten-k-pct').textContent = (hrsPerYear >= 10000 ? '100%' : (hrsPerYear / 10000 * 100).toFixed(1) + '% per year');
    setTimeout(() => {
        document.getElementById('ten-k-bar').style.width = Math.min(100, pct10k * 10) + '%';
    }, 100);

    let tenKNote;
    if (tenKYears <= 1) tenKNote = `At this rate, you hit 10,000 hours in under a year. That number is not a goal — it is a description of depth. You are past it, or approaching it fast.`;
    else if (tenKYears <= 3) tenKNote = `At this rate: 10,000 hours in ${tenKYears.toFixed(1)} years. The threshold where ${activity} stops being something you do and becomes something you are.`;
    else if (tenKYears <= 10) tenKNote = `10,000 hours in ${tenKYears.toFixed(1)} years at this pace. Most people never get there in anything. You are on a trajectory that most are not on.`;
    else tenKNote = `At current pace, 10,000 hours would take ${tenKYears.toFixed(0)} years. The number is not the point — the consistency is. The hours are evidence of commitment that cannot be faked.`;
    document.getElementById('ten-k-note').textContent = tenKNote;

    document.getElementById('prizrak-note').textContent = getNote(hrsPerYear);
    document.getElementById('output').classList.remove('hidden');
    document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Auto-calculate on load with defaults
calculate();
</script>
</body>
</html>
