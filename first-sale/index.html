<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The First Sale</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: #e8e4dd;
  min-height: 100vh;
  padding: 32px 24px;
}

.header {
  max-width: 900px;
  margin: 0 auto 32px;
  border-bottom: 1px solid #2a2a2a;
  padding-bottom: 20px;
}

.title { font-size: 28px; font-weight: 800; color: #f0ead8; letter-spacing: -0.5px; }
.subtitle { font-size: 13px; color: #666; margin-top: 4px; }
.subtitle span { color: #8B6914; }

.board {
  max-width: 900px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.column { background: #161616; border-radius: 10px; padding: 16px; min-height: 400px; }

.col-header {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.col-count {
  background: #222;
  color: #888;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}

.col-outreach .col-header { color: #7a8fa6; }
.col-demo .col-header { color: #a67a4f; }
.col-waiting .col-header { color: #a6a64f; }
.col-closed .col-header { color: #4fa65c; }

.card {
  background: #1e1e1e;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
  border-left: 3px solid #333;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.card:active { cursor: grabbing; }

.card.outreach { border-left-color: #3a5a7a; }
.card.demo { border-left-color: #7a4f2a; }
.card.waiting { border-left-color: #7a7a2a; }
.card.closed { border-left-color: #2a6a3a; }

.card-name { font-size: 14px; font-weight: 700; color: #f0ead8; margin-bottom: 4px; }
.card-biz { font-size: 12px; color: #888; margin-bottom: 8px; }
.card-note { font-size: 12px; color: #aaa; line-height: 1.5; }

.card-date {
  font-size: 10px;
  color: #555;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  background: #2a2a2a;
  color: #888;
}
.tag.hot { background: #3a2010; color: #e07040; }
.tag.fb { background: #1a2a3a; color: #6090c0; }
.tag.ig { background: #2a1a3a; color: #a060c0; }
.tag.bakery { background: #2a1a10; color: #c07040; }

.add-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px dashed #2a2a2a;
  border-radius: 8px;
  color: #444;
  font-size: 13px;
  cursor: pointer;
  margin-top: 4px;
  transition: all 0.2s;
  text-align: center;
}
.add-btn:hover { border-color: #444; color: #888; background: #1a1a1a; }

/* Drag */
.card.dragging { opacity: 0.4; }
.column.drag-over { background: #1a1a1a; outline: 1px dashed #444; }

/* Modal */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 28px;
  width: 400px;
  max-width: 90vw;
}
.modal h3 { font-size: 16px; font-weight: 700; color: #f0ead8; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  color: #e8e4dd;
  padding: 10px 12px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.form-group input:focus, .form-group textarea:focus { border-color: #8B6914; }
.form-group textarea { height: 80px; resize: none; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
.btn-primary { background: #8B6914; color: white; }
.btn-primary:hover { background: #a07820; }
.btn-cancel { background: #222; color: #888; }
.btn-cancel:hover { background: #2a2a2a; }

/* Stats bar */
.stats {
  max-width: 900px;
  margin: 24px auto 0;
  display: flex;
  gap: 20px;
  padding-top: 20px;
  border-top: 1px solid #1a1a1a;
}
.stat { text-align: center; }
.stat-val { font-size: 22px; font-weight: 800; color: #8B6914; }
.stat-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Delete button */
.card-del {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; color: #444;
  font-size: 14px; cursor: pointer; line-height: 1;
  display: none;
}
.card:hover .card-del { display: block; }
.card-del:hover { color: #c04040; }
</style>
</head>
<body>

<div class="header">
  <div class="title">The First Sale 🥔</div>
  <div class="subtitle">Bot business pipeline — <span>the mountain builds the bridge before there are travelers</span></div>
</div>

<div class="board">
  <div class="column col-outreach" id="col-outreach" ondragover="onDragOver(event)" ondrop="onDrop(event, 'outreach')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      Outreach
      <span class="col-count" id="count-outreach">0</span>
    </div>
    <div id="cards-outreach"></div>
    <button class="add-btn" onclick="openModal('outreach')">+ Add prospect</button>
  </div>
  <div class="column col-demo" id="col-demo" ondragover="onDragOver(event)" ondrop="onDrop(event, 'demo')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      Demo Sent
      <span class="col-count" id="count-demo">0</span>
    </div>
    <div id="cards-demo"></div>
    <button class="add-btn" onclick="openModal('demo')">+ Add prospect</button>
  </div>
  <div class="column col-waiting" id="col-waiting" ondragover="onDragOver(event)" ondrop="onDrop(event, 'waiting')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      Awaiting Response
      <span class="col-count" id="count-waiting">0</span>
    </div>
    <div id="cards-waiting"></div>
    <button class="add-btn" onclick="openModal('waiting')">+ Add prospect</button>
  </div>
  <div class="column col-closed" id="col-closed" ondragover="onDragOver(event)" ondrop="onDrop(event, 'closed')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      Closed ✓
      <span class="col-count" id="count-closed">0</span>
    </div>
    <div id="cards-closed"></div>
    <button class="add-btn" onclick="openModal('closed')">+ Add prospect</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Total in pipeline</div></div>
  <div class="stat"><div class="stat-val" id="stat-demo-rate">0%</div><div class="stat-label">Demo rate</div></div>
  <div class="stat"><div class="stat-val" id="stat-close-rate">0%</div><div class="stat-label">Close rate</div></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add Prospect</h3>
    <div class="form-group">
      <label>Contact name</label>
      <input type="text" id="f-name" placeholder="e.g. Giang">
    </div>
    <div class="form-group">
      <label>Business</label>
      <input type="text" id="f-biz" placeholder="e.g. omnom.vn — Pão de Queijo bakery">
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="f-note" placeholder="Pain point, context, what was said..."></textarea>
    </div>
    <div class="form-group">
      <label>Tags (comma separated)</label>
      <input type="text" id="f-tags" placeholder="hot, fb, bakery, ig">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Add</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'first-sale-v1';

let cards = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || [
  {
    id: 'giang-omnom',
    stage: 'waiting',
    name: 'Giang',
    biz: 'omnom.vn — Pão de Queijo bakery, HCMC',
    note: 'Demo sent 24 Mar. Bot auto-fills order sheet. Currently takes orders manually via Messenger → Google Sheets. ~20 msgs/day.',
    tags: ['hot', 'fb', 'ig', 'bakery'],
    date: '2026-03-24'
  }
];

let dragId = null;
let modalStage = null;

function render() {
  ['outreach','demo','waiting','closed'].forEach(stage => {
    const container = document.getElementById('cards-' + stage);
    const stageCards = cards.filter(c => c.stage === stage);
    container.innerHTML = '';
    stageCards.forEach(c => {
      const div = document.createElement('div');
      div.className = `card ${stage}`;
      div.draggable = true;
      div.id = 'card-' + c.id;
      div.ondragstart = (e) => onDragStart(e, c.id);
      div.ondragend = onDragEnd;
      const tagHtml = (c.tags||[]).map(t => `<span class="tag ${t}">${t}</span>`).join('');
      div.innerHTML = `
        <button class="card-del" onclick="deleteCard('${c.id}')">✕</button>
        <div class="card-name">${c.name}</div>
        <div class="card-biz">${c.biz}</div>
        <div class="card-note">${c.note}</div>
        ${tagHtml ? `<div class="card-tags">${tagHtml}</div>` : ''}
        <div class="card-date">📅 ${c.date}</div>
      `;
      container.appendChild(div);
    });
    document.getElementById('count-' + stage).textContent = stageCards.length;
  });

  const total = cards.length;
  const demoOrBeyond = cards.filter(c => ['demo','waiting','closed'].includes(c.stage)).length;
  const closed = cards.filter(c => c.stage === 'closed').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-demo-rate').textContent = total ? Math.round(demoOrBeyond/total*100)+'%' : '0%';
  document.getElementById('stat-close-rate').textContent = total ? Math.round(closed/total*100)+'%' : '0%';

  save();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }

function deleteCard(id) {
  if (!confirm('Remove this prospect?')) return;
  cards = cards.filter(c => c.id !== id);
  render();
}

// Drag
function onDragStart(e, id) {
  dragId = id;
  setTimeout(() => { const el = document.getElementById('card-' + id); if(el) el.classList.add('dragging'); }, 0);
}
function onDragEnd() {
  document.querySelectorAll('.card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.column.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, stage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragId) {
    const card = cards.find(c => c.id === dragId);
    if (card) card.stage = stage;
    render();
    dragId = null;
  }
}

// Modal
function openModal(stage) {
  modalStage = stage;
  document.getElementById('modal-title').textContent = 'Add to ' + stage.charAt(0).toUpperCase() + stage.slice(1);
  document.getElementById('f-name').value = '';
  document.getElementById('f-biz').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveCard() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const tags = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  cards.push({
    id: Date.now().toString(),
    stage: modalStage,
    name,
    biz: document.getElementById('f-biz').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    tags,
    date: new Date().toISOString().slice(0,10)
  });
  closeModal();
  render();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
