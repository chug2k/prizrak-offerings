<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fog Walker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c12; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; pointer-events: none;
        }
        #hud-level { color: rgba(180,200,220,0.6); font-size: 14px; }
        #hud-moves { color: rgba(180,200,220,0.4); font-size: 12px; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(8,10,16,0.94); color: rgba(180,200,220,0.8);
            backdrop-filter: blur(10px);
        }
        .overlay.hidden { display: none; }
        .ov-title { font-size: 26px; letter-spacing: 3px; margin-bottom: 6px; }
        .ov-emoji { font-size: 56px; margin-bottom: 12px; }
        .ov-sub { font-size: 12px; color: rgba(180,200,220,0.4); margin-bottom: 24px; max-width: 300px; text-align: center; line-height: 1.6; }
        .ov-score { font-size: 42px; color: rgba(140,160,220,0.8); margin-bottom: 4px; }
        .ov-label { font-size: 11px; color: rgba(180,200,220,0.3); margin-bottom: 24px; }
        .btn {
            padding: 14px 40px; border: 1px solid rgba(120,140,200,0.3); border-radius: 8px;
            background: rgba(60,70,120,0.2); color: rgba(180,200,220,0.8); font-family: inherit;
            font-size: 14px; cursor: pointer; pointer-events: auto; letter-spacing: 1px;
        }
        .btn:active { background: rgba(80,90,150,0.4); }
        
        #d-pad {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 15; display: grid; grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px; gap: 4px; opacity: 0.5;
        }
        .d-btn {
            width: 60px; height: 60px; border: 1px solid rgba(120,140,200,0.2);
            border-radius: 10px; background: rgba(40,50,80,0.3); color: rgba(180,200,220,0.5);
            font-size: 22px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .d-btn:active { background: rgba(80,90,140,0.5); }
        .d-empty { border: none; background: none; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div id="hud">
        <div id="hud-level">LEVEL 1</div>
        <div id="hud-moves"></div>
    </div>
    
    <div id="d-pad" style="display:none;">
        <div class="d-btn d-empty"></div>
        <div class="d-btn" ontouchstart="move(0,-1)" onmousedown="move(0,-1)">↑</div>
        <div class="d-btn d-empty"></div>
        <div class="d-btn" ontouchstart="move(-1,0)" onmousedown="move(-1,0)">←</div>
        <div class="d-btn d-empty"></div>
        <div class="d-btn" ontouchstart="move(1,0)" onmousedown="move(1,0)">→</div>
        <div class="d-btn d-empty"></div>
        <div class="d-btn" ontouchstart="move(0,1)" onmousedown="move(0,1)">↓</div>
        <div class="d-btn d-empty"></div>
    </div>
    
    <div class="overlay" id="start-screen">
        <div class="ov-emoji">🌫️</div>
        <div class="ov-title">FOG WALKER</div>
        <div class="ov-sub">The path reveals itself briefly, then the fog rolls in. Navigate by memory from start to exit. Step off the path and the mountain claims you. Swipe or use the d-pad to move.</div>
        <button class="btn" onclick="startGame()">ENTER THE FOG</button>
    </div>
    
    <div class="overlay hidden" id="death-screen">
        <div class="ov-emoji">💀</div>
        <div class="ov-title">LOST IN FOG</div>
        <div class="ov-score" id="final-level">1</div>
        <div class="ov-label">levels survived</div>
        <div class="ov-sub" id="death-quote"></div>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
    
    <div class="overlay hidden" id="level-screen">
        <div class="ov-title" id="level-title">LEVEL 2</div>
        <div class="ov-sub">The path grows longer. The fog grows thicker.</div>
        <button class="btn" onclick="nextLevel()">CONTINUE</button>
    </div>

    <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    
    const DEATH_QUOTES = [
        "The fog does not forgive. It only forgets.",
        "You stepped where the mountain said not to step.",
        "Memory is the only lantern in the dark.",
        "The path was always there. You were not.",
        "Even the wind remembers the way. You did not.",
        "The mountain swallowed you. It was not personal.",
    ];
    
    // Game state
    let game = null;
    let running = false;
    let phase = 'idle'; // 'reveal', 'memorize', 'play', 'dead', 'won'
    
    const GRID = 9;
    let cellSize;
    let gridOffX, gridOffY;
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cellSize = Math.min(Math.floor((W - 40) / GRID), Math.floor((H - 200) / GRID));
        gridOffX = (W - GRID * cellSize) / 2;
        gridOffY = (H - GRID * cellSize) / 2 - 10;
    }
    
    function generatePath(level) {
        const gridMap = Array.from({ length: GRID }, () => Array(GRID).fill(0));
        // 0 = void, 1 = path, 2 = start, 3 = exit
        
        // Start at bottom-center
        let sx = Math.floor(GRID / 2);
        let sy = GRID - 1;
        
        // Random walk upward with bias
        const path = [{ x: sx, y: sy }];
        gridMap[sy][sx] = 2;
        
        let cx = sx, cy = sy;
        const pathLen = 8 + level * 3;
        
        for (let i = 0; i < pathLen; i++) {
            const dirs = [];
            // Prefer going up
            if (cy > 0) dirs.push({ dx: 0, dy: -1, w: 3 });
            if (cx > 0 && cy > 0) dirs.push({ dx: -1, dy: 0, w: 1 });
            if (cx < GRID - 1 && cy > 0) dirs.push({ dx: 1, dy: 0, w: 1 });
            if (cy > 1) dirs.push({ dx: 0, dy: -1, w: 2 }); // double weight up
            
            // Filter to unvisited
            const valid = dirs.filter(d => {
                const nx = cx + d.dx, ny = cy + d.dy;
                return nx >= 0 && nx < GRID && ny >= 0 && ny < GRID && gridMap[ny][nx] === 0;
            });
            
            if (valid.length === 0) break;
            
            // Weighted random pick
            const totalW = valid.reduce((s, d) => s + d.w, 0);
            let r = Math.random() * totalW;
            let chosen = valid[0];
            for (const d of valid) {
                r -= d.w;
                if (r <= 0) { chosen = d; break; }
            }
            
            cx += chosen.dx;
            cy += chosen.dy;
            gridMap[cy][cx] = 1;
            path.push({ x: cx, y: cy });
        }
        
        // Mark exit
        gridMap[cy][cx] = 3;
        
        // Add a few decoy safe-looking cells (traps)
        const traps = Math.min(level, 5);
        for (let i = 0; i < traps; i++) {
            const tx = Math.floor(Math.random() * GRID);
            const ty = Math.floor(Math.random() * GRID);
            if (gridMap[ty][tx] === 0) gridMap[ty][tx] = 4; // trap (looks like path briefly but isn't)
        }
        
        return { gridMap, path, start: { x: sx, y: sy }, exit: { x: cx, y: cy } };
    }
    
    function initLevel(level) {
        const { gridMap, path, start, exit } = generatePath(level);
        
        game = {
            level,
            gridMap,
            path,
            start,
            exit,
            player: { x: start.x, y: start.y },
            moves: 0,
            revealTime: Math.max(1.5, 4 - level * 0.3),
            fogAlpha: 0, // 0 = clear, 1 = full fog
            timer: 0,
            particles: [],
            dead: false,
            won: false,
            footprints: [{ x: start.x, y: start.y }],
        };
        
        phase = 'reveal';
    }
    
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('d-pad').style.display = 'grid';
        initLevel(1);
        running = true;
    }
    
    window.nextLevel = function() {
        document.getElementById('level-screen').classList.add('hidden');
        initLevel(game.level + 1);
    };
    
    window.move = function(dx, dy) {
        if (!running || !game || phase !== 'play' || game.dead || game.won) return;
        
        const nx = game.player.x + dx;
        const ny = game.player.y + dy;
        
        if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) return;
        
        game.player.x = nx;
        game.player.y = ny;
        game.moves++;
        game.footprints.push({ x: nx, y: ny });
        
        const cell = game.gridMap[ny][nx];
        
        if (cell === 0 || cell === 4) {
            // Fell off path!
            game.dead = true;
            phase = 'dead';
            // Death particles
            for (let i = 0; i < 20; i++) {
                game.particles.push({
                    x: gridOffX + nx * cellSize + cellSize / 2,
                    y: gridOffY + ny * cellSize + cellSize / 2,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    color: '180,60,60',
                });
            }
            setTimeout(() => {
                document.getElementById('final-level').textContent = game.level - 1;
                document.getElementById('death-quote').textContent = DEATH_QUOTES[Math.floor(Math.random() * DEATH_QUOTES.length)];
                document.getElementById('death-screen').classList.remove('hidden');
                document.getElementById('d-pad').style.display = 'none';
            }, 800);
        } else if (cell === 3) {
            // Reached exit!
            game.won = true;
            phase = 'won';
            for (let i = 0; i < 15; i++) {
                game.particles.push({
                    x: gridOffX + nx * cellSize + cellSize / 2,
                    y: gridOffY + ny * cellSize + cellSize / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 4 - 1,
                    life: 1,
                    color: '100,200,255',
                });
            }
            setTimeout(() => {
                document.getElementById('level-title').textContent = `LEVEL ${game.level + 1}`;
                document.getElementById('level-screen').classList.remove('hidden');
            }, 600);
        }
    };
    
    function update(dt) {
        if (!game || !running) return;
        
        game.timer += dt;
        
        if (phase === 'reveal') {
            game.fogAlpha = 0;
            if (game.timer > game.revealTime) {
                phase = 'memorize';
                game.timer = 0;
            }
        } else if (phase === 'memorize') {
            // Fog rolls in
            game.fogAlpha = Math.min(1, game.timer / 1.5);
            if (game.fogAlpha >= 1) {
                phase = 'play';
            }
        }
        
        // Particles
        game.particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= dt * 1.5;
        });
        game.particles = game.particles.filter(p => p.life > 0);
    }
    
    function render() {
        ctx.clearRect(0, 0, W, H);
        
        // Background
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, W, H);
        
        if (!game) { requestAnimationFrame(mainLoop); return; }
        
        // Draw grid
        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                const px = gridOffX + x * cellSize;
                const py = gridOffY + y * cellSize;
                const cell = game.gridMap[y][x];
                
                // Base tile (void)
                ctx.fillStyle = 'rgba(15,18,28,0.8)';
                ctx.beginPath();
                ctx.roundRect(px + 1, py + 1, cellSize - 2, cellSize - 2, 3);
                ctx.fill();
                
                // Path tiles (visible during reveal, hidden during play)
                const isPath = cell === 1 || cell === 2 || cell === 3;
                const isTrap = cell === 4;
                
                if (isPath || isTrap) {
                    let alpha;
                    if (phase === 'reveal') {
                        alpha = 1;
                    } else if (phase === 'memorize') {
                        alpha = 1 - game.fogAlpha;
                    } else {
                        alpha = 0;
                    }
                    
                    // During reveal, show traps as path to confuse
                    if (alpha > 0.01 && (isPath || (isTrap && alpha > 0.5))) {
                        let color;
                        if (cell === 2) color = `rgba(80,180,120,${alpha * 0.6})`; // start = green
                        else if (cell === 3) color = `rgba(80,140,220,${alpha * 0.6})`; // exit = blue
                        else color = `rgba(60,65,85,${alpha * 0.5})`; // path = subtle
                        
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.roundRect(px + 1, py + 1, cellSize - 2, cellSize - 2, 3);
                        ctx.fill();
                    }
                }
                
                // Always show start and exit markers
                if (cell === 2) {
                    ctx.fillStyle = 'rgba(80,180,120,0.4)';
                    ctx.beginPath();
                    ctx.roundRect(px + 1, py + 1, cellSize - 2, cellSize - 2, 3);
                    ctx.fill();
                    ctx.font = `${cellSize * 0.4}px "Courier New"`;
                    ctx.fillStyle = 'rgba(120,220,160,0.6)';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('S', px + cellSize/2, py + cellSize/2);
                }
                if (cell === 3) {
                    ctx.fillStyle = 'rgba(80,140,220,0.3)';
                    ctx.beginPath();
                    ctx.roundRect(px + 1, py + 1, cellSize - 2, cellSize - 2, 3);
                    ctx.fill();
                    ctx.font = `${cellSize * 0.4}px "Courier New"`;
                    ctx.fillStyle = 'rgba(100,160,240,0.6)';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('E', px + cellSize/2, py + cellSize/2);
                }
            }
        }
        
        // Footprints
        game.footprints.forEach((fp, i) => {
            if (i === game.footprints.length - 1) return; // current position
            const px = gridOffX + fp.x * cellSize + cellSize / 2;
            const py = gridOffY + fp.y * cellSize + cellSize / 2;
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180,200,220,${0.15})`;
            ctx.fill();
        });
        
        // Player
        if (!game.dead) {
            const ppx = gridOffX + game.player.x * cellSize + cellSize / 2;
            const ppy = gridOffY + game.player.y * cellSize + cellSize / 2;
            
            // Glow
            const glow = ctx.createRadialGradient(ppx, ppy, 0, ppx, ppy, cellSize * 0.8);
            glow.addColorStop(0, 'rgba(180,200,255,0.15)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(ppx, ppy, cellSize * 0.8, 0, Math.PI * 2);
            ctx.fill();
            
            // Body
            ctx.beginPath();
            ctx.arc(ppx, ppy, cellSize * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200,210,240,0.8)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(140,160,220,0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        
        // Fog overlay during play
        if (phase === 'play' || phase === 'memorize') {
            const fogA = game.fogAlpha * 0.65;
            // Patchy fog - multiple translucent circles
            const t = Date.now() * 0.0005;
            for (let i = 0; i < 8; i++) {
                const fx = W * 0.5 + Math.sin(t + i * 1.7) * W * 0.3;
                const fy = H * 0.4 + Math.cos(t * 0.7 + i * 2.1) * H * 0.2;
                const fr = 200 + Math.sin(t + i) * 60;
                const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
                grad.addColorStop(0, `rgba(20,25,40,${fogA * 0.4})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(fx, fy, fr, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Phase indicator
        if (phase === 'reveal') {
            ctx.font = '13px "Courier New", monospace';
            ctx.fillStyle = 'rgba(180,200,220,0.5)';
            ctx.textAlign = 'center';
            ctx.fillText('MEMORIZE THE PATH', W / 2, gridOffY - 15);
            
            // Timer bar
            const barW = 120;
            const progress = game.timer / game.revealTime;
            ctx.fillStyle = 'rgba(40,50,80,0.4)';
            ctx.fillRect(W/2 - barW/2, gridOffY - 8, barW, 4);
            ctx.fillStyle = 'rgba(120,160,220,0.6)';
            ctx.fillRect(W/2 - barW/2, gridOffY - 8, barW * (1 - progress), 4);
        }
        
        // Particles
        game.particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${p.color},${p.life})`;
            ctx.fill();
        });
        
        // HUD
        document.getElementById('hud-level').textContent = `LEVEL ${game.level}`;
        document.getElementById('hud-moves').textContent = phase === 'play' ? `moves: ${game.moves}` : '';
    }
    
    // Swipe detection
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: false });
    
    canvas.addEventListener('touchend', e => {
        if (!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        const adx = Math.abs(dx), ady = Math.abs(dy);
        
        if (Math.max(adx, ady) < 20) return; // too small
        
        if (adx > ady) {
            move(dx > 0 ? 1 : -1, 0);
        } else {
            move(0, dy > 0 ? 1 : -1);
        }
        touchStart = null;
    });
    
    // Keyboard
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp' || e.key === 'w') move(0, -1);
        if (e.key === 'ArrowDown' || e.key === 's') move(0, 1);
        if (e.key === 'ArrowLeft' || e.key === 'a') move(-1, 0);
        if (e.key === 'ArrowRight' || e.key === 'd') move(1, 0);
    });
    
    let lastTime = 0;
    function mainLoop(ts) {
        const dt = Math.min(0.1, (ts - lastTime) / 1000);
        lastTime = ts;
        update(dt);
        render();
        requestAnimationFrame(mainLoop);
    }
    
    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(mainLoop);
    </script>
</body>
</html>
