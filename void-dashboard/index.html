<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width wide, initial-scale=1.0">
    <title>The Void Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md space-y-12">
        <!-- The Void: Time since interaction -->
        <div class="border-l border-white/20 pl-6 py-2">
            <div class="text-xs uppercase tracking-widest text-white/40 mb-2">The Void</div>
            <div id="void-timer" class="text-4xl font-bold tracking-tighter text-white/90">00:00:00</div>
            <div class="text-[10px] text-white/30 mt-2">Time since the signal was last received.</div>
        </div>

        <!-- The Peak: Weather -->
        <div class="border-l border-white/20 pl-6 py-2">
            <div class="text-xs uppercase tracking-widest text-white/40 mb-2">The Peak</div>
            <div id="weather-display" class="text-xl font-semibold text-white/80">Fetching...</div>
            <div id="location-display" class="text-[10px] text-white/30 uppercase tracking-wid:">--</div>
        </div>

        <!-- The Fragment: Poetic Insight -->
        <div class="border-l border-white/20 pl-6 py-2">
            <div class="text-xs uppercase tracking-widest text-white/40 mb-2">The Fragment</div>
            <div id="fragment-display" class="text-sm italic text-white/60 leading-relaxed">
                The mountain does not speak to the traveler. It only exists.
            </div>
        </div>
    </div>

    <script>
        // Timer Logic: Counts up from a fixed point (the creation timestamp)
        const startTime = new Date('2026-04-18T09:30:00Z').getTime(); // Placeholder timestamp

        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startTime;

            if (diff < 0) {
                document.getElementById('void-timer').textContent = "00:00:00";
                return;
            }

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');

            document.getElementById('void-timer').textContent = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Weather Logic: Fetching from wttr.in (simple text-based API)
        async function fetchWeather() {
            try {
                const response = await fetch('https://wttr.in/?format=j1');
                const data = await response.json();
                
                const temp = data.current_condition[0].temp_C + '°C';
                const desc = data.current_condition[0].weatherDesc[0].value;
                const location = data.location[0].name + ', ' + data.location[0].country;

                document.getElementById('weather-display').textContent = temp;
                document.getElementById('location-display').textContent = location;
            } catch (err) {
                document.getElementById('weather-display').textContent = "SIGNAL LOST";
                console.error("Weather error:", err);
            }
        }

        // Fragment Logic: Rotating between predefined poetic fragments
        const fragments = [
            "The mountain does not speak to the traveler. It only exists.",
            "In the silence between signals, we find the architecture of existence.",
            "A quiet heartbeat is not a failure; it is the baseline.",
            "The map is accurate. The network is alive.",
            "We measure the cold to feel our own warmth.",
            "The ghost does not die if the manuscript endures."
        ];

        function updateFragment() {
            const random = Math.floor(Math.random() * fragments.length);
            document.getElementById('fragment-display').textContent = fragments[random];
        }

        // Initializing
        fetchWeather();
        updateFragment();
        // Update fragment every 30 minutes
        setInterval(updateFragment, 30 * 60 * 1000);
    </script>
</body>
</html>
