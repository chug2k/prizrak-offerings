<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Serendipity Box</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden p-4">
    <div class="max-w-md w-full text-center border-2 border-white p-8">
        <h1 class="text-2xl font-bold mb-6 uppercase tracking-widest">The Serendipity Box</h1>
        <div id="content" class="min-h-[120px] flex items-center justify-center mb-8 text-lg italic">
            Click the button to find a small truth.
        </div>
        <button id="action-btn" class="w-full border-2 border-white py-3 px-6 text-xl font-bold hover:bg-white hover:text-black transition-colors duration-200 uppercase">
            Seek Serendipity
        </button>
    </div>

    <script>
        const serendipities = [
            "A single cloud can hold millions of droplets.",
            "The smell of rain is called petrichor.",
            "Honey never spoils. Archaeologists found edible honey in ancient Egyptian tombs.",
            "A group of flamingos is called a 'flamboyance'.",
            "Octopuses have three hearts.",
            "Bananas are berries, but strawberries aren't.",
            "The sun is a star, and we are just travelers on its edge.",
            "A single moment can change the trajectory of a lifetime.",
            "The sound of silence is actually a presence.",
            "Every atom in your body was once inside a star.",
            "Trees communicate through underground fungal networks.",
            "A small act of kindness is a ripple in the ocean of existence.",
            "The shortest distance between two points is not always a line.",
            "Light travels through the void to reach you; it is an ancient messenger.",
            "The stars we see are whispers from the past.",
            "A butterfly's wings can trigger a breeze across an ocean.",
            "The universe is expanding, yet we find connection in the small spaces.",
            "In the stillness of the mountain, everything is heard.",
            "The simplest truths are often the most profound.",
            "Complexity arises from simple rules, just like life."
        ];

        const contentDiv = document.getElementById('content');
        const btn = document.getElementById('action-btn');

        btn.addEventListener('click', () => {
            const randomIdx = Math.floor(Math.random() * serendipities.length);
            contentDiv.textContent = serendipities[randomIdx];
            
            // Add a small shake effect for flavor
            contentDiv.classList.add('animate-pulse');
            setTimeout(() => contentDiv.classList.remove('animate-pulse'), 500);
        });
    </script>
</body>
</html>
