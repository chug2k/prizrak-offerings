<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saigon & Hanoi — Travel Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .card { transition: all 0.2s ease; }
    .star { color: #f59e0b; }
    .filter-btn.active { background: #1e293b; color: white; }
    .city-btn.active { background: #0f172a; color: white; }
    input[type=range] { accent-color: #1e293b; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; }
    .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sticky-header { position: sticky; top: 0; z-index: 50; }
    /* Collapsible filter rows */
    #filters-row, #rating-row {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.25s ease, margin-top 0.25s ease;
      max-height: 200px;
      opacity: 1;
    }
    .header-collapsed #filters-row,
    .header-collapsed #rating-row {
      max-height: 0 !important;
      opacity: 0;
      margin-top: 0 !important;
      pointer-events: none;
    }
    /* Compact title row when collapsed */
    #header-top-row {
      transition: padding 0.25s ease;
    }
    .header-collapsed #header-top-row {
      padding-top: 6px !important;
      padding-bottom: 6px !important;
    }
    /* Show a hint badge when collapsed */
    #filter-hint {
      transition: opacity 0.2s ease;
      opacity: 0;
      pointer-events: none;
    }
    .header-collapsed #filter-hint {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<div class="sticky-header bg-white border-b border-gray-200 shadow-sm" id="stickyHeader">
  <div class="max-w-7xl mx-auto px-4 py-3" id="header-top-row">
    <div class="flex flex-col md:flex-row gap-3 items-start md:items-center justify-between">
      <div class="flex items-center gap-3">
        <div>
          <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold text-gray-900">🏙️ Vietnam Travel Guide</h1>
            <!-- Filter hint shown when collapsed -->
            <span id="filter-hint" class="text-xs text-gray-400 bg-gray-100 rounded-full px-2 py-0.5 cursor-pointer" onclick="expandHeader()">tap to filter</span>
          </div>
          <p class="text-xs text-gray-400" id="countLabel">Loading...</p>
        </div>
      </div>
      <!-- City toggle -->
      <div class="flex gap-2">
        <button onclick="setCity('all')" id="city-all" class="city-btn active px-4 py-1.5 rounded-full border border-gray-300 text-sm font-medium transition-all">All Cities</button>
        <button onclick="setCity('saigon')" id="city-saigon" class="city-btn px-4 py-1.5 rounded-full border border-gray-300 text-sm font-medium transition-all">🏙️ Saigon</button>
        <button onclick="setCity('hanoi')" id="city-hanoi" class="city-btn px-4 py-1.5 rounded-full border border-gray-300 text-sm font-medium transition-all">🏯 Hanoi</button>
      </div>
    </div>
    <!-- Search + filters (collapsible) -->
    <div id="filters-row" class="mt-3 flex flex-col md:flex-row gap-2">
      <input id="searchInput" type="text" placeholder="Search places, dishes, descriptions..." 
        class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-300"
        oninput="renderCards()" />
      <div class="flex gap-2 flex-wrap" id="categoryFilters"></div>
    </div>
    <!-- Min rating filter (collapsible) -->
    <div id="rating-row" class="mt-2 flex items-center gap-3 text-xs text-gray-500">
      <span>Min rating:</span>
      <input type="range" min="0" max="5" step="0.5" value="0" id="ratingFilter" oninput="document.getElementById('ratingVal').textContent=this.value; renderCards()" class="w-32" />
      <span id="ratingVal" class="font-semibold text-gray-700">0</span>
      <span class="ml-4">Sort:</span>
      <select id="sortSelect" onchange="renderCards()" class="border border-gray-200 rounded px-2 py-1 text-xs">
        <option value="name">Name A–Z</option>
        <option value="rating_desc">Rating ↓</option>
        <option value="rating_asc">Rating ↑</option>
        <option value="reviews_desc">Most Reviewed</option>
      </select>
    </div>
  </div>
</div>

<!-- Cards -->
<div class="max-w-7xl mx-auto px-4 py-6">
  <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
  <div id="noResults" class="hidden text-center py-16 text-gray-400">
    <div class="text-4xl mb-3">🔍</div>
    <p class="text-lg">No places found</p>
    <p class="text-sm">Try a different search or filter</p>
  </div>
</div>

  "Café": "bg-amber-100 text-amber-800",
  "Drinking": "bg-purple-100 text-purple-800",
  "Eating - Viet": "bg-green-100 text-green-800",
  "Eating - NonViet": "bg-blue-100 text-blue-800",
  "Breakfast & Lunch": "bg-orange-100 text-orange-800",
  "Dinner": "bg-red-100 text-red-800",
  "Quick Bites": "bg-yellow-100 text-yellow-800",
  "Coffee & Juice": "bg-amber-100 text-amber-800",
  "Landmarks": "bg-teal-100 text-teal-800",
  "Photography": "bg-pink-100 text-pink-800",
  "Shopping": "bg-indigo-100 text-indigo-800",
  "Spa & Wellness": "bg-rose-100 text-rose-800",
  "default": "bg-gray-100 text-gray-700"
};

function catColor(cat) {
  return CATEGORY_COLORS[cat] || CATEGORY_COLORS["default"];
}

function stars(rating) {
  if (!rating) return '<span class="text-gray-300 text-xs">No rating</span>';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  for (let i = full + (half?1:0); i < 5; i++) s += '☆';
  return `<span class="star text-sm">${s}</span> <span class="text-xs text-gray-500">${rating}</span>`;
}

function personalStars(s) {
  if (!s) return '';
  const count = (s.match(/★/g) || []).length;
  return `<span class="text-amber-400 text-xs">${'★'.repeat(count)}${'☆'.repeat(5-count)}</span>`;
}

let activeCity = 'all';
let activeCategory = 'all';

function setCity(city) {
  activeCity = city;
  document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('city-' + city).classList.add('active');
  buildCategoryFilters();
  renderCards();
}

function buildCategoryFilters() {
  const visible = activeCity === 'all' ? allData : allData.filter(d => d.city === activeCity);
  const cats = [...new Set(visible.map(d => d.category))].sort();
  const container = document.getElementById('categoryFilters');
  container.innerHTML = `<button onclick="setCategory('all')" id="cat-all" class="filter-btn active px-3 py-1.5 rounded-full border border-gray-300 text-xs font-medium transition-all">All</button>`;
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.id = 'cat-' + cat;
    btn.className = 'filter-btn px-3 py-1.5 rounded-full border border-gray-300 text-xs font-medium transition-all';
    btn.textContent = cat;
    btn.onclick = () => setCategory(cat);
    container.appendChild(btn);
  });
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('cat-' + cat);
  if (el) el.classList.add('active');
  renderCards();
}

function renderCards() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const minRating = parseFloat(document.getElementById('ratingFilter').value);
  const sort = document.getElementById('sortSelect').value;

  let filtered = allData.filter(d => {
    if (activeCity !== 'all' && d.city !== activeCity) return false;
    if (activeCategory !== 'all' && d.category !== activeCategory) return false;
    if (minRating > 0 && (!d.google_rating || d.google_rating < minRating)) return false;
    if (query) {
      const haystack = [d.name, d.dish_en, d.dish_vn, d.description, d.address, d.category].join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'rating_desc') return (b.google_rating || 0) - (a.google_rating || 0);
    if (sort === 'rating_asc') return (a.google_rating || 0) - (b.google_rating || 0);
    if (sort === 'reviews_desc') return (b.review_count || 0) - (a.review_count || 0);
    return 0;
  });

  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.classList.remove('hidden');
  } else {
    noResults.classList.add('hidden');
    grid.innerHTML = filtered.map(d => cardHTML(d)).join('');
  }

  document.getElementById('countLabel').textContent = `${filtered.length} of ${allData.length} places`;
}

function cardHTML(d) {
  const mapLink = d.maps ? `<a href="${d.maps}" target="_blank" class="text-blue-500 hover:text-blue-700 text-xs font-medium flex items-center gap-1">📍 Maps</a>` : '';
  const catBadge = `<span class="tag ${catColor(d.category)}">${d.category}</span>`;
  const jovelBadge = d.source === "Jovel Chan" ? '<span class="tag bg-violet-100 text-violet-800">✨ Jovel Chan</span>' : '';
  const cityBadge = `<span class="tag ${d.city === 'saigon' ? 'bg-emerald-100 text-emerald-800' : 'bg-sky-100 text-sky-800'}">${d.city === 'saigon' ? 'Saigon' : 'Hanoi'}</span>`;
  
  const dishLine = d.dish_en ? `<p class="text-xs text-gray-500 italic mt-0.5">${d.dish_en}${d.dish_vn ? ` · ${d.dish_vn}` : ''}</p>` : '';
  const descLine = d.description ? `<p class="text-sm text-gray-600 mt-2 leading-relaxed">${d.description}</p>` : '';
  const addrLine = d.address ? `<p class="text-xs text-gray-400 mt-1">📍 ${d.address}</p>` : '';
  const ratingLine = d.google_rating ? `<div class="mt-2">${stars(d.google_rating)} <span class="text-xs text-gray-400">${d.review_count ? `(${d.review_count.toLocaleString()} reviews)` : ''}</span></div>` : '';
  const personalLine = d.personal_rating ? `<div class="text-xs text-gray-400 mt-1">Personal: ${personalStars(d.personal_rating)}</div>` : '';

  return `<div class="card bg-white rounded-xl border border-gray-100 p-4 cursor-default">
    <div class="flex items-start justify-between gap-2 mb-2">
      <div class="flex gap-1.5 flex-wrap">${catBadge}${cityBadge}${jovelBadge}</div>
      ${mapLink}
    </div>
    <h3 class="font-semibold text-gray-900 text-base leading-snug">${d.name}</h3>
    ${dishLine}
    ${ratingLine}
    ${personalLine}
    ${descLine}
    ${addrLine}
  </div>`;
}

// Init
buildCategoryFilters();
renderCards();

// --- Scroll-to-compress header ---
(function () {
  const header = document.getElementById('stickyHeader');
  const SCROLL_THRESHOLD = 80; // px scrolled before collapsing
  let lastScrollY = 0;
  let ticking = false;
  let isCollapsed = false;

  function collapseHeader() {
    if (!isCollapsed) {
      header.classList.add('header-collapsed');
      isCollapsed = true;
    }
  }

  function expandHeader() {
    if (isCollapsed) {
      header.classList.remove('header-collapsed');
      isCollapsed = false;
    }
  }

  // Expose for the hint tap
  window.expandHeader = expandHeader;

  window.addEventListener('scroll', function () {
    const currentY = window.scrollY;
    if (!ticking) {
      window.requestAnimationFrame(function () {
        const diff = currentY - lastScrollY;
        if (currentY < SCROLL_THRESHOLD) {
          // Near top — always expand
          expandHeader();
        } else if (diff > 4) {
          // Scrolling down → collapse
          collapseHeader();
        } else if (diff < -4) {
          // Scrolling up → expand
          expandHeader();
        }
        lastScrollY = currentY;
        ticking = false;
      });
      ticking = true;
    }
