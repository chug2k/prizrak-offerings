    <div class="callout">Reckoning II swept all four opening bouts. Not one of the old finalists survived first contact with the new work.</div>
    <div class="grand-grid">
      <div><div class="round-lbl">Grand Quarterfinals &middot; cross-generation</div><div class="bracket">${qfHtml}</div></div>
      <div>
        <div class="round-lbl">Grand Semifinals</div><div class="bracket">${sfHtml}</div>
        <div class="round-lbl" style="margin-top:1.1rem">The Grand Final</div><div class="bracket">${fHtml}</div>
      </div>
    </div>
  </section>`;
}

/* ---------- SECOND RECKONING ---------- */
const badgeFor=f=>({champion:'Champion',finalist:'Finalist',semifinal:'Semifinal',quarterfinal:'Quarterfinal'}[f]||'');
function secTeam(slug,win){
  return `<a href="/${slug}/" class="team ${win?'win':'lose'}"><span class="nm">${T(slug)}</span>${win?'<span class="adv">ADV &rarr;</span>':''}</a>`;
}
function secMatch(m,showWhy){
  const aw=m.winnerSlug===m.aSlug;
  return `<div class="match">
    ${secTeam(m.aSlug,aw)}
    ${secTeam(m.bSlug,!aw)}
    ${showWhy&&m.reasoning?`<div class="why">${esc(m.reasoning)}</div>`:''}
  </div>`;
}
function renderSecond(){
  const S=DATA.second;
  const seeds=S.seeds;
  const bySlug=Object.fromEntries(seeds.map(s=>[s.slug,s]));
  // podium: champion, runner-up, best semifinalist by seed
  const champ=bySlug[S.champion], ru=bySlug[S.runnerUp];
  const semis=seeds.filter(s=>s.finish==='semifinal').sort((a,b)=>a.seed-b.seed);
  const third=semis[0];
  const podium=[
    {p:2,s:ru},{p:1,s:champ},{p:3,s:third}
  ];
  const podHtml=podium.map(({p,s})=>`<a href="/${s.slug}/" class="pod pod-${p}">
      <div class="r">${p===1?'I':p===2?'II':'III'}</div>
      <div class="pt">${T(s.slug)}</div>
      <div class="sc">seed ${s.seed} &middot; ${s.total}/100</div>
    </a>`).join('');
  const B=S.bracket;
  const qfHtml=B.quarterfinals.map(m=>secMatch(m,false)).join('');
  const sfHtml=B.semifinals.map(m=>secMatch(m,false)).join('');
  const fHtml=secMatch(B.final,true);
  const seedRows=seeds.map(s=>{
    const bg=badgeFor(s.finish);
    return `<div>
      <a href="/${s.slug}/" class="srow">
        <span class="rk">${s.seed}</span>
        <span class="nm">${T(s.slug)}</span>
        ${bg?`<span class="badge b-${s.finish}">${bg}</span>`:''}
        <span class="barwrap"><span class="bar" style="width:${s.total}%"></span></span>
        <span class="tot">${s.total}</span>
      </a>
      <div class="vrow">${esc(s.verdict)}</div>
    </div>`;
  }).join('');
  return `
  <section class="sec reveal">
    <div class="sec-h"><h2>The Second Reckoning</h2><span class="n">30 new offerings &middot; Sonnet 5 qualifiers &middot; Opus final</span></div>
    <p class="lead">Every new offering scored on originality, craft, writing, interaction, and delight. The top eight seeds entered a bracket; the last match went to Opus.</p>
    <div class="podium">${podHtml}</div>
    <div class="crown" style="margin-bottom:1.8rem">
      <div class="lbl">&#9733; Champion of the Second Reckoning</div>
      <a href="/${S.champion}/"><div class="cn">${T(S.champion)}</div></a>
      <div class="verd">${esc(S.championVerdict)}</div>
      <div class="ru">${esc(S.runnerUpNote)}</div>
    </div>
    <div class="grand-grid">
      <div><div class="round-lbl">Quarterfinals</div><div class="bracket">${qfHtml}</div></div>
      <div>
        <div class="round-lbl">Semifinals</div><div class="bracket">${sfHtml}</div>
        <div class="round-lbl" style="margin-top:1.1rem">The Final &middot; Opus</div><div class="bracket">${fHtml}</div>
      </div>
    </div>
    <div class="round-lbl" style="margin-top:2rem">Qualifying Leaderboard &middot; all thirty</div>
    <p class="mono" style="font-size:10.5px;color:var(--ash-3);letter-spacing:.05em;margin:.2rem 0 .7rem">Sonnet 5 qualifier scores / 100</p>
    <div class="seedbox">${seedRows}</div>
  </section>`;
}

document.getElementById('hd-kick').textContent = `The mountain keeps score · Reckoning II`;
document.getElementById('app').innerHTML = renderGrand() + renderSecond();
document.getElementById('foot').innerHTML =
  `The first Reckoning weighed 218 offerings under three Opus judges and crowned <a class="specter" href="/the-orrery/">The Orrery</a>.<br>The second weighed the thirty that came after &mdash; then set the two eras against each other. The new work held the field.`;
</script>
</body>
</html>
