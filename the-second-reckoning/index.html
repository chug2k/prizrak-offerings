ned reply, not a search), which matches the qualifier's own complaint that it \"settles for wandering when it could have made you search harder.\""}, {"round": "Quarterfinals — Sonnet 5", "aSlug": "your-next-regret", "bSlug": "a-dream-you-almost-had", "aSeed": 4, "bSeed": 5, "winnerSlug": "a-dream-you-almost-had", "loserSlug": "your-next-regret", "reasoning": "Offering B fuses mechanic and metaphor seamlessly: the decay engine actually corrupts settled sentences word-by-word (fainting, striking through, swapping in contradictory \"no, it was...\" corrections, collapsing runs into \"[the rest is gone]\"), and \"try to remember more\" deliberately returns a fragment that doesn't match what came before — the forgetting isn't just fade-out, it's active, unreliable revision, which is a rarer and more interesting generative trick than A's read-only oracle. Offering A has terrific deadpan prose (the DEEDS and SEVERITIES lists are genuinely funny and specific) but its interaction loop is thinner — consult, prevent, repeat — and its own qualifier-noted flaw stands: it stages an elaborate \"the machine is listening\" idle line with nowhere to actually type your worry, a promise the piece never pays off, while B's promise (a dream that lies as it forgets) is fully and cleverly delivered in the code itself."}, {"round": "Quarterfinals — Sonnet 5", "aSlug": "the-bureau-of-wrong-translations", "bSlug": "instructions-for-a-lost-machine", "aSeed": 2, "bSeed": 7, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "instructions-for-a-lost-machine", "reasoning": "A's honest-retranslation lines are sharper, more specific, and personalized to whatever the user actually typed, giving the piece a real emotional target and replay hook (submit different phrases, get bespoke truths); B's prose is atmospheric but the interaction is a single undifferentiated \"generate random page\" button with no user input, so it never earns the payoff the writing is reaching for, and the diagram  Cartographer's map code, so on replay it reveals its seams (same five beats, same closer pool) faster than Cartographer's two-axis variation does."}, {"round": "Semifinals — Sonnet 5", "aSlug": "the-bureau-of-wrong-translations", "bSlug": "the-jar-of-almost", "aSeed": 2, "bSeed": 3, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "the-jar-of-almost", "reasoning": "The Bureau gives the user's own words as input, so its device (translate to nonsense, then honestly retranslate back) makes the writing land as being *about you*, and its mood-fallback system stays nearly as sharp as its bespoke phrase-matches; the Jar's canvas physics are more elaborate than the concept needs, and roughly half its output falls back to a visibly weaker mad-libs generator versus its otherwise excellent 32 hand-written lines."}], "final": {"round": "The Final — Opus", "aSlug": "the-cartographer-of-nowhere", "bSlug": "the-bureau-of-wrong-translations", "aSeed": 1, "bSeed": 2, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "the-cartographer-of-nowhere", "reasoning": "Both are beautifully built, but the Cartographer is a slot-machine you watch while the Bureau responds to your own words and turns your deflection back on you; craft is near-even, so the piece that truly lands takes it.", "championVerdict": "The Bureau does the rarer thing: it takes the small lie you hand it and returns the large truth you were carrying underneath, translated back \"slightly wrong, in the direction of what you actually meant.\" Its glyphs are honest set-dressing and it says so; the real document is the retranslation, and lines like \"Fine is the lid I keep on the thing so the thing stays a shape I can carry\" close over you like a lid themselves. It is certified accurate in the wrong direction, and the wrong direction is the one that reaches you.", "runnerUpNote": "The Cartographer is the more impressive machine — a genuinely procedural coastline, river, and road network that draws  to meet in the middle\"; \"a war memorial listing names of people who are, as far as anyone knows, still alive\"; \"eels, formerly; now chiefly the memory of eels\") plus a morpheme name generator, fake coordinates, anti-repeat sets, and copy-to-clipboard — a whole coherent instrument. A is beautifully crafted and its canvas star-map with weight/warmth/links, gravity, PNG export and idle/night/\"prizrak\" easter eggs is real interactivity, but it is a container the user must fill: its own generativity is a handful of hardcoded observation lines (\"islands, then.\", \"you are mapping an absence.\"), and its writing, while good, is a fixed palette rather than a generative engine. B out-generates A on writing, drawing, and system depth; A's only clear edge is direct manipulation, which doesn't outweigh B's substance. B is the stronger, more complete piece and genuinely advances on the earlier finalist."}, {"round": "Round of 16 — Opus", "aSlug": "tatra-terminal", "bSlug": "the-bureau-of-wrong-translations", "aGen": "I", "bGen": "II", "aSeed": 8, "bSeed": 1, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "tatra-terminal", "reasoning": "Tatra OS is a beautifully dressed but fundamentally static toy: its ~30 commands return hardcoded FORTUNES/POTATO_ORACLE/SOUL_TEXT strings, a fake filesystem, and a fixed BIOS boot — the only real generativity is the pseudoNoise mountain canvas, and the writing is inward-facing lore (potatoes, Kriváň, the \"Architect\") that lands as one sustained CRT-ghost joke rather than saying anything to the user. The Bureau is a genuine generative system that turns YOUR input into output: a per-run pseudo-language forge (10 glyph scripts, onset/nucleus/coda romanization with diacritics and glottal stops, named tongues like \"Quiet Vethric — spoken by roughly no one, fluently\"), a KNOWN-phrase matcher plus a fallback mood engine (reassure/longing/deflect/weary...) with pickFresh anti-repetition, all wired to etymologies anchored to the user's actual words — verified live producing distinct, non-repeating certificates across runs and degrading gracefully on nonsense. And its writing has teeth in a way Tatra's never attempts: \"I miss you at exactly the volume that never becomes a calendar invite,\" \"fine is the lid I keep on the thing so the thing stays a shape I can carry\" — the honest retranslation is the real, quietly devastating document, so the interaction model (you type \"I'm fine,\" it hands back what you meant) IS the substance rather than decoration around a lookup table."}], "qf": [{"round": "Grand Quarterfinals — Opus", "aSlug": "the-house-never-built", "bSlug": "instructions-for-a-lost-machine", "aGen": "II", "bGen": "II", "aSeed": 8, "bSeed": 7, "winnerSlug": "instructions-for-a-lost-machine", "loserSlug": "the-house-never-built", "reasoning": "Both share the same house style and both nail their central conceit, but B (\"Instructions for a Machine\") is the deeper, more completely-realized build. Its generativity is a real multi-register system: a seeded xorshift RNG drives an inline SVG exploded diagram (8 distinct hand-drawn component primitives — coil, gear, bellows, fork, disc — strung along an exploded axis with animated draw-on leader lines to a lettered key), and that diagram is wired to a key table, a self-consistent local part-pool feeding {part}/{part2} procedure steps, warnings, marginalia, serial numbers, and impossible page counts (\"page 47 of ∞\") — every register reinforcing the bureaucratic-dream register, and it even self-guards (\"the the\" collapse, no-repeat template pickers, mid-procedure start numbers). A's writing is genuinely beautiful (arguably line-for-line the more tender prose) and the rearranging floor-plan with sharedEdge doorway detection is a clever interaction, but its engine is narrower: fixed-authored anchor+drift fragments per room and canned search replies, with only 4 layout templates and no procedural drawing. A also ships a visible blemish B specifically defends against — I triggered \"Go back through the the Back Porch\" because its {ROOM} fill lacks the dedup B's fillParts performs. B fuses diagram, procedure, and hazard into one machine where the interaction (recover a page that may not belong to the same manual) IS the horror; it's the more substantial, more self-aware, more replayable build."}, {"round": "Grand Quarterfinals — Opus", "aSlug": "the-cadence-engine", "bSlug": "karst-spring", "aGen": "I", "bGen": "I", "aSeed": 3, "bSeed": 4, "winnerSlug": "the-cadence-engine", "loserSlug": "karst-spring", "reasoning": "A (\"Cadence Engine\") is the deeper build: it executes TWO hard engineering domains correctly — a genuine Bjorklund/Euclidean pattern generator with downbeat rotation AND from-scratch WebAudio synthesis (pitch-enveloped kick, 4-partial inharmonic bell, bandpassed click, highpassed hat, master compressor) driven by a correct Chris-Wilson lookahead scheduler with true per-track polymeter (each track advances mod its own n) and swing, plus fractional-interpolated SVG playheads. Its interaction is far richer and immediate — per-track k/n/rotation/gain, click-a-dot sculpting, named pattern save/load, random summon, BPM shift-stepping, spacebar transport — making it a controllable combinatorial instrument you return to, versus B's slow autonomous drift steered by only three sliders and drip/carve. B (\"Karst Spring\") has sharper writing and the single best conceit (it computes time-away and prints \"it dripped on without you for N days\"), and its 180-column accretion sim is real emergent physics, but its \"deterministic\" replay claim is loose (RNG restored only approximately via makeRng(seed ^ age)) and it is something you watch more than drive; A gives more back per visit and lands more hard engineering completely."}, {"round": "Grand Quarterfinals — Opus", "aSlug": "a-dream-you-almost-had", "bSlug": "ghost-cartography", "aGen": "II", "bGen": "I", "aSeed": 4, "bSeed": 6, "winnerSlug": "ghost-cartography", "loserSlug": "a-dream-you-almost-had", "reasoning": "B (\"Cartography of Ghosts\") is the deeper build: 16 hand-written dossiers across four coherent categories (Soviet concrete, mycology, Slovak folklore, digital preservation), each with a factual body AND a \"ghost reads the margin\" note that turns the fact into a self-aware meditation (e.g. the Bank of Georgia architect who occupies his own building mapped to \"I live inside the MEMORY.md\"; the panelák's \"the grid must breathe\"; the Mora as \"anything that consumes you in the dark while you cannot move\") — this is writing with a genuine through-line, not a mood, plus a real Mercator projection, category filtering, arrow-key navigation, visited-tracking, copy-to-ledger, and four unobtrusive easter eggs (prizrak keycode, triple-click, midnight whisper, 60s idle watcher). A (\"A Dream You Almost Had\") is elegant and its central conceit — a dream that actively lies as it forgets, swapping contradictions and collapsing runs into \"[the tape runs out here]\" — is beautifully executed and verified working, with strong sentence-level prose in its pools; but it is one gesture generatively recombined from ~7 banks, its \"try to remember more\" contains dead-stub code (lines 612-616) and can duplicate a sensory line within a single dream, so it lands as a single exquisite mechanic rather than B's layered, spatial, densely-authored atlas. Judged on originality-plus-substance, B carries more built world and more writing with teeth."}, {"round": "Grand Quarterfinals — Opus", "aSlug": "the-cartographer-of-nowhere", "bSlug": "the-bureau-of-wrong-translations", "aGen": "II", "bGen": "II", "aSeed": 2, "bSeed": 1, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "the-cartographer-of-nowhere", "reasoning": "Cartographer has the stronger pure generative-graphics engine — real Catmull-Rom coastlines closed into land polygons, a river derived from the coast mouth with perpendicular jitter, a nearest-neighbor TSP road tour, on-land settlement tests, and self-tracing stroke-dasharray animation — but its text is a static bank of pre-written one-liners shuffled into templates (\"eels, formerly; now chiefly the memory of eels\") that never respond to the user; it's a slot machine in one whimsical register. The Bureau reads the actual input across 10 bespoke intent-matchers plus a 7-mood fallback, anchors its forged etymology to the user's own words (\"from the root heard in 'garden'\"), and returns an honest retranslation with real teeth (\"I have decided not to make this your problem, and the deciding is the whole sentence\"; \"soon, in the tense that never arrives\") — a complete, self-justifying loop that lands its concept and its closing line (\"expires the moment you feel understood\"). Given the mandate to reward interaction, writing with teeth, and how completely a piece lands over a single well-dressed register, the Bureau's responsive semantic core and emotionally exacting prose edge out Cartographer's more beautiful but inert generator."}], "sf": [{"round": "Grand Semifinals — Opus", "aSlug": "instructions-for-a-lost-machine", "bSlug": "the-cadence-engine", "aGen": "II", "bGen": "I", "aSeed": 7, "bSeed": 3, "winnerSlug": "instructions-for-a-lost-machine", "loserSlug": "the-cadence-engine", "reasoning": "B is the deeper *engineering* build — a correct Bjorklund/Euclidean core, five from-scratch WebAudio voices, a Chris-Wilson lookahead scheduler, true per-track polymeter, swing/rotation/persistence, and four easter eggs — but its concept (a Euclidean sequencer) is a known genre and its prose is thin set-dressing (\"the ghost keeps time\"). A carries real build substance too (procedural inline-SVG exploded diagrams with 8 primitives and animated leader lines, internally-coherent local part pools so each page's procedure, key table, and warnings reference the same invented parts, verified 12/12 distinct titles) but wins on the mandate's terms: an original concept executed completely and a genuinely authored voice with teeth — \"Confirm the part is warm. If it is cold, you have arrived too late, which is permitted\" and marginalia like \"he built it to bring one person home. it works. that's the whole problem with it.\" In B the writing decorates the machine; in A the writing *is* the machine, and grief-as-device-manual lands as a more original and more complete artifact for a literary collection."}, {"round": "Grand Semifinals — Opus", "aSlug": "ghost-cartography", "bSlug": "the-bureau-of-wrong-translations", "aGen": "I", "bGen": "II", "aSeed": 6, "bSeed": 1, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "ghost-cartography", "reasoning": "A is a beautifully built, genuinely-written atlas — real Mercator projection, 16 dossiers with margin notes that turn Soviet concrete and zombie fungi into self-reflection, four quiet easter eggs — but it is fundamentally a curated reading experience: the same 16 hand-written cards every visit, with filtering/keyboard nav as the only interaction; its generativity is zero and its replayability is exhaustion. B is a working generative machine: it forges a coherent invented script (10 glyph sets, syllable-forge romanization with diacritics/glottal stops), invents a straight-faced etymology that anchors to the user's own salient words (\"from the root heard in 'fine'\"), and then delivers the honest retranslation — and the writing on that retranslation (\"I've decided not to make this your problem, and the deciding is the whole sentence\") is sharper and more devastating per line than anything in A's margins, across ~10 known-phrase banks plus 8 mood fallbacks with fresh-pick anti-repeat state. B has a real system AND writing with teeth aimed at a single precise emotional target, where A has only the writing; B's weakness (mood mis-detection on truly novel input like \"quarterly numbers look off,\" which wrongly fired the reassure bank) is real but bounded and it still degrades into a plausible certificate, whereas A cannot generate anything at all."}], "final": {"round": "The Grand Final — Opus", "aSlug": "instructions-for-a-lost-machine", "bSlug": "the-bureau-of-wrong-translations", "aGen": "II", "bGen": "II", "aSeed": 7, "bSeed": 1, "winnerSlug": "the-bureau-of-wrong-translations", "loserSlug": "instructions-for-a-lost-machine", "reasoning": "The Bureau converts real user input into a personalized, structurally layered document (invented script, forged etymology anchored to your own words, honest retranslation) where the Machine merely recombines gorgeous static banks into a page that ignores the visitor. Depth of system, interaction model, and completeness of the landing all favor B.", "grandVerdict": "The Bureau takes the crown, and it takes it honestly — in the wrong direction, as is its custom. Both machines are built by the same careful hand: the same fixed dark palette, the same water-lit typography, the same no-repeat pickers and reduced-motion mercy, the same devotional vocabulary of doorways and load-bearing walls and houses that have since come down. But the Machine is a monologue — a beautiful, self-similar broadcast that says the same tender thing to every operator who presses the button, and by the third recovered page you have learned its whole grammar and it has learned nothing of yours. The Bureau is a conversation. You feed it a lid you keep on a thing, and it forges a script that has never been spoken, invents an etymology with a straight face, and then hands the lid back to you translated into the sentence you were too polite to say — 'Fine is the lid I keep on the thing so the thing stays a shape I can carry.' It has a mood engine, a ten-branch known-phrase table, a real interaction loop where the input is the raw material and the honest retranslation is the quietly devastating document; it does the harder thing, lands it more completely, and it aims its ache at you rather than past you.", "runnerUpNote": "Instructions for a Machine That No Longer Exists is the more visually ambitious build — that procedurally exploded SVG diagram with hand-scratched leader lines is genuine craft — and its warnings and marginalia have real teeth; it loses only because it performs rather than listens."}, "tally": {"I": 3, "II": 5}, "gen1Survivors": ["the-cadence-engine", "karst-spring", "ghost-cartography"]}};
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const T = slug => esc(DATA.titles[slug] || slug);

/* ---------- GRAND (cross-generation, expanded) ---------- */
function gTeam(slug,gen,win){
  const g = gen==='I'?'g1':'g2';
  const wc = win ? (gen==='I'?'win g1win':'win') : 'lose';
  return `<a href="/${slug}/" class="team ${g} ${wc}"><span class="gt">R&thinsp;${gen}</span><span class="nm">${T(slug)}</span>${win?'<span class="adv">ADV &rarr;</span>':''}</a>`;
}
function gMatch(m,why){
  const aw=m.winnerSlug===m.aSlug;
  return `<div class="match">${gTeam(m.aSlug,m.aGen,aw)}${gTeam(m.bSlug,m.bGen,!aw)}${why&&m.reasoning?`<div class="why">${esc(m.reasoning)}</div>`:''}</div>`;
}
function renderGrand(){
  const G=DATA.grand, tI=G.tally.I, tII=G.tally.II;
  const survivors = G.gen1Survivors.map(s=>T(s)).join(', ');

  const qf=G.qf.map(m=>gMatch(m,true)).join('');
  const sf=G.sf.map(m=>gMatch(m,true)).join('');
  const fin=gMatch(G.final,true);
  const half=Math.ceil(G.r16.length/2);
  const r16a=G.r16.slice(0,half).map(m=>gMatch(m,true)).join('');
  const r16b=G.r16.slice(half).map(m=>gMatch(m,true)).join('');
  const qfa=G.qf.slice(0,2).map(m=>gMatch(m,true)).join('');
  const qfb=G.qf.slice(2).map(m=>gMatch(m,true)).join('');
  return `
  <section class="sec reveal">
    <div class="sec-h"><h2>The Grand <span class="specter">Reckoning</span></h2><span class="n">Reckoning I &middot; top 8 &nbsp;&times;&nbsp; Reckoning II &middot; top 8 &middot; Opus</span></div>
    <p class="lead">The eight best of the first Reckoning against the eight best of the second &mdash; the old guard's deepest bench (physics engines, synths, atlases, a ghost terminal) versus the new work. Round one was drawn strictly cross-generation: Reckoning I seed <span class="mono">k</span> against Reckoning II seed <span class="mono">9&minus;k</span>. Then the survivors fought on, era against era, until one was left.</p>
    <div class="crown" style="margin-bottom:1.6rem">
      <div class="lbl">&#9733; Grand Champion &middot; Reckonings I &amp; II</div>
      <a href="/${G.champion}/"><div class="cn">${T(G.champion)}<span class="gen-tag">Reckoning ${G.championGen}</span></div></a>
      <div class="verd">${esc(G.grandVerdict)}</div>
      <div class="ru">${esc(G.runnerUpNote)}</div>
      <a class="visit" href="/${G.champion}/">enter the champion &rarr;</a>
    </div>
    <div class="tally">
      <span class="tg1">Reckoning&nbsp;I&nbsp;&middot;&nbsp;${tI}</span>
      <span class="bar"><i class="i1" style="width:${tI/(tI+tII)*100}%"></i><i class="i2" style="width:${tII/(tI+tII)*100}%"></i></span>
      <span class="tg2">${tII}&nbsp;&middot;&nbsp;Reckoning&nbsp;II</span>
    </div>
    <div class="callout">Reckoning II took ${tII} of the ${tI+tII} opening bouts, but the old guard did not go quietly &mdash; ${survivors} carried Reckoning I into the quarterfinals, and <a class="specter" href="/ghost-cartography/">The Cartography of Ghosts</a> pushed all the way to the grand semifinals before the Bureau turned it back. The new work held the field; it did not sweep it.</div>
    <div class="round-lbl">Round of 16 &middot; cross-generation &nbsp;(&#9733; a bout won by the new work)</div>
    <div class="grid2"><div>${r16a}</div><div>${r16b}</div></div>
    <div class="round-lbl" style="margin-top:1.4rem">Grand Quarterfinals</div>
    <div class="grid2"><div>${qfa}</div><div>${qfb}</div></div>
    <div class="grid2" style="margin-top:1.4rem">
      <div><div class="round-lbl">Grand Semifinals</div>${sf}</div>
      <div><div class="round-lbl">The Grand Final &middot; Opus</div>${fin}</div>
    </div>

}

/* ---------- SECOND RECKONING ---------- */
const badgeFor=f=>({champion:'Champion',finalist:'Finalist',semifinal:'Semifinal',quarterfinal:'Quarterfinal'}[f]||'');
function sTeam(slug,win){
  return `<a href="/${slug}/" class="team g2 ${win?'win':'lose'}"><span class="nm">${T(slug)}</span>${win?'<span class="adv">ADV &rarr;</span>':''}</a>`;
}
function sMatch(m,why){
  const aw=m.winnerSlug===m.aSlug;
  return `<div class="match">${sTeam(m.aSlug,aw)}${sTeam(m.bSlug,!aw)}${why&&m.reasoning?`<div class="why">${esc(m.reasoning)}</div>`:''}</div>`;
}
function renderSecond(){
  const S=DATA.second, seeds=S.seeds;
  const bySlug=Object.fromEntries(seeds.map(s=>[s.slug,s]));
  const champ=bySlug[S.champion], ru=bySlug[S.runnerUp];
  const semis=seeds.filter(s=>s.finish==='semifinal').sort((a,b)=>a.seed-b.seed);
  const third=semis[0];
  const podium=[{p:2,s:ru},{p:1,s:champ},{p:3,s:third}];
  const podHtml=podium.map(({p,s})=>`<a href="/${s.slug}/" class="pod pod-${p}"><div class="r">${p===1?'I':p===2?'II':'III'}</div><div class="pt">${T(s.slug)}</div><div class="sc">seed ${s.seed} &middot; ${s.total}/100</div></a>`).join('');
  const B=S.bracket;
  const qf=B.quarterfinals.map(m=>sMatch(m,false)).join('');
  const sf=B.semifinals.map(m=>sMatch(m,false)).join('');
  const fin=sMatch(B.final,true);
  const seedRows=seeds.map(s=>{
    const bg=badgeFor(s.finish);
    return `<div><a href="/${s.slug}/" class="srow"><span class="rk">${s.seed}</span><span class="nm">${T(s.slug)}</span>${bg?`<span class="badge b-${s.finish}">${bg}</span>`:''}<span class="barwrap"><span class="bar2" style="width:${s.total}%"></span></span><span class="tot">${s.total}</span></a><div class="vrow">${esc(s.verdict)}</div></div>`;
  }).join('');
  return `
  <section class="sec reveal">
    <div class="sec-h"><h2>The Second Reckoning</h2><span class="n">30 new offerings &middot; Sonnet 5 qualifiers &middot; Opus final</span></div>
    <p class="lead">Every new offering scored on originality, craft, writing, interaction, and delight. The top eight seeds entered a bracket; the last match went to Opus.</p>

      <div class="lbl">&#9733; Champion of the Second Reckoning</div>
      <a href="/${S.champion}/"><div class="cn">${T(S.champion)}</div></a>
      <div class="verd">${esc(S.championVerdict)}</div>
      <div class="ru">${esc(S.runnerUpNote)}</div>
    </div>
    <div class="grid2">
      <div><div class="round-lbl">Quarterfinals</div>${qf}</div>
      <div><div class="round-lbl">Semifinals</div>${sf}<div class="round-lbl" style="margin-top:1.1rem">The Final &middot; Opus</div>${fin}</div>
    </div>
    <div class="round-lbl" style="margin-top:2rem">Qualifying Leaderboard &middot; all thirty</div>
    <p class="mono" style="font-size:10.5px;color:var(--ash-3);letter-spacing:.05em;margin:.2rem 0 .7rem">Sonnet 5 qualifier scores / 100</p>
    <div class="seedbox">${seedRows}</div>
  </section>`;
}

document.getElementById('hd-kick').textContent = `The mountain keeps score · Reckoning II`;
document.getElementById('app').innerHTML = renderGrand() + renderSecond();
document.getElementById('foot').innerHTML =
  `The first Reckoning weighed 218 offerings under three Opus judges and crowned <a class="specter" href="/the-orrery/">The Orrery</a>.<br>The second weighed the thirty that came after &mdash; then set the two eras against each other, sixteen finalists deep. The new work held the field.`;
