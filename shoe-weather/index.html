<html lang="en">
<head>

  <style>
    :root {
      --ink:#0a0a0c; --ink-1:#0d0d11; --ink-2:#121218; --ink-3:#16161d;
      --bone:#e9e4d6; --ash:#9a948a; --ash-2:#6f6a61; --ash-3:#4a463f;
      --rule:rgba(233,228,214,.09); --rule-2:rgba(233,228,214,.17);
      --fox:#86e0c0; --fox-dim:#3f6b5f; --amber:#e3b341; --wet:#6ba3d6; --hot:#e08a8a;

      --mono:ui-monospace,'SF Mono','JetBrains Mono','Cascadia Mono',Menlo,Consolas,monospace;
    }
    * { box-sizing:border-box; }
    html { -webkit-text-size-adjust:100%; }
    body {
      margin:0; background:var(--ink); color:var(--bone); font-family:var(--serif);
      min-height:100vh; position:relative; overflow-x:hidden; line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }
    body::before {
      content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
      background:
        radial-gradient(125% 80% at 50% -12%, rgba(134,224,192,.06), transparent 55%),
        radial-gradient(100% 60% at 50% 120%, rgba(70,58,92,.10), transparent 60%),
        var(--ink);
    }
    body::after {
      content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.045; mix-blend-mode:screen;

    .wrap { max-width:680px; margin:0 auto; padding:40px 20px 56px; }
    @media (min-width:640px) { .wrap { padding:56px 32px; } }

    .mono { font-family:var(--mono); }
    .kicker { font-family:var(--mono); text-transform:uppercase; letter-spacing:.22em; font-size:10px; color:var(--ash-2); }
    .specter { color:var(--fox); font-style:italic; font-weight:500; }
    a { color:inherit; text-decoration:none; }
    ::selection { background:rgba(134,224,192,.22); color:#fff; }

    header { text-align:center; margin-bottom:36px; }
    h1 {
      font-family:var(--serif); font-size:clamp(2.2rem,8vw,3.6rem); font-weight:800;
      line-height:.95; letter-spacing:-.02em; margin:12px 0 0;
    }
    .sub {
      margin:14px auto 0; font-style:italic; font-size:14px; color:var(--ash);
      max-width:30rem; line-height:1.55;
    }

    .section { margin-bottom:28px; }
    .section .kicker { margin-bottom:14px; }
    .grid-btns { display:flex; flex-wrap:wrap; gap:10px; }

    .chip {

      display:inline-flex; align-items:center; gap:7px; line-height:1; user-select:none;

    .chip:hover { border-color:var(--fox); color:var(--bone); background:var(--ink-2); }
    .chip:active { transform:translateY(1px); }
    .chip .ic { font-size:18px; line-height:1; }
    .chip.shoe.active { border-color:var(--fox); color:var(--fox); background:rgba(134,224,192,.08); box-shadow:0 0 12px -4px rgba(134,224,192,.4); }
    .chip.weather:hover { border-color:var(--amber); }
    .chip.weather.active { border-color:var(--amber); color:var(--amber); background:rgba(227,179,65,.08); box-shadow:0 0 12px -4px rgba(227,179,65,.4); }

    .gen-row { text-align:center; margin-bottom:8px; }
    .gen-btn {
      font-family:var(--mono); text-transform:uppercase; letter-spacing:.15em; font-size:12px;
      padding:14px 30px; background:linear-gradient(135deg,var(--fox-dim),var(--fox));
      border:none; border-radius:5px; color:var(--ink); cursor:pointer; font-weight:600;
      transition:transform .15s, box-shadow .2s, opacity .2s;
    }
    .gen-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px -8px rgba(134,224,192,.55); }
    .gen-btn:active:not(:disabled) { transform:translateY(0); }
    .gen-btn:disabled { opacity:.4; cursor:not-allowed; filter:grayscale(.4); }
    .hint { font-family:var(--mono); font-size:10px; color:var(--ash-3); margin-top:10px; letter-spacing:.08em; }

    /* report */
    .card {
      border:1px solid var(--rule-2); border-radius:8px;
      background:linear-gradient(180deg,var(--ink-1),var(--ink));
      padding:24px; margin-top:26px; position:relative; overflow:hidden;
      box-shadow:0 24px 60px -32px rgba(0,0,0,.8);
    }
    .card::before {
      content:""; position:absolute; inset:0 0 auto 0; height:1px;
      background:linear-gradient(90deg,transparent,var(--rule-2),transparent);
    }
    .station {
      font-family:var(--mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase;
      color:var(--ash-3); display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
      border-bottom:1px solid var(--rule); padding-bottom:12px; margin-bottom:18px;
    }
    .station .live { color:var(--fox); display:inline-flex; align-items:center; gap:5px; }
    .blip { width:6px; height:6px; border-radius:50%; background:var(--fox); box-shadow:0 0 8px var(--fox); animation:pulse 1.6s ease-in-out infinite; }

    .head-row { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .shoe-emoji { font-size:40px; line-height:1; filter:drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
    .shoe-name { font-family:var(--serif); font-weight:800; font-size:21px; margin:0; letter-spacing:-.01em; }
    .cond-line { font-family:var(--mono); font-size:10px; color:var(--ash-2); letter-spacing:.08em; text-transform:uppercase; margin-top:3px; }

    .climate {
      font-family:var(--serif); font-weight:800; font-size:clamp(22px,6vw,30px); color:var(--fox);
      text-shadow:0 0 22px rgba(134,224,192,.35); font-style:italic; line-height:1.05; margin:6px 0 2px;
    }
    .climate-tag { font-family:var(--mono); font-size:10px; color:var(--ash); letter-spacing:.06em; margin-bottom:18px; }

    .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:16px 14px; margin-bottom:22px; }
    @media (min-width:560px) { .stats { grid-template-columns:repeat(4,1fr); } }
    .stat-label { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.14em; color:var(--ash-2); margin-bottom:4px; }
    .stat-value { font-family:var(--serif); font-weight:800; font-size:22px; color:var(--bone); line-height:1; }
    .stat-value.hot { color:var(--hot); } .stat-value.cold { color:var(--fox); } .stat-value.wet { color:var(--wet); }
    .stat-sub { font-family:var(--mono); font-size:9px; color:var(--ash-3); letter-spacing:.1em; margin-top:4px; }
    .stat-value.sm { font-size:15px; font-style:italic; font-weight:600; }

    .block { margin-bottom:22px; }
    .block > .stat-label { margin-bottom:8px; }

    .bar { height:9px; border-radius:5px; background:var(--ink-2); overflow:hidden; border:1px solid var(--rule); }
    .fill { height:100%; border-radius:5px; width:0; transition:width 1s cubic-bezier(.2,.7,.2,1); }
    .fill.good { background:linear-gradient(90deg,var(--fox-dim),var(--fox)); }
    .fill.okay { background:linear-gradient(90deg,#7a6a2a,var(--amber)); }
    .fill.bad  { background:linear-gradient(90deg,#6b3f3f,var(--hot)); }
    .bar-cap { font-family:var(--mono); font-size:11px; margin-top:6px; }

    .radar {
      font-family:var(--mono); font-size:11px; line-height:1.18; color:var(--ash);
      background:radial-gradient(120% 120% at 50% 0,rgba(134,224,192,.05),transparent 70%),var(--ink-2);
      border:1px solid var(--rule); border-radius:6px; padding:14px 16px; white-space:pre; overflow-x:auto;
      letter-spacing:1px;
    }
    .radar-legend { font-family:var(--mono); font-size:9px; color:var(--ash-3); margin-top:8px; letter-spacing:.05em; }

    .tag {
      display:inline-block; font-family:var(--mono); font-size:10.5px; padding:6px 11px; border-radius:4px;
      line-height:1.3; letter-spacing:.02em;
    }
    .tag.common  { background:rgba(134,224,192,.10); color:var(--fox);  border:1px solid rgba(134,224,192,.25); }
    .tag.rare    { background:rgba(227,179,65,.13);  color:var(--amber);border:1px solid rgba(227,179,65,.32); }
    .tag.extreme { background:rgba(224,138,138,.12); color:var(--hot);  border:1px solid rgba(224,138,138,.3); animation:flash 2.2s ease-in-out infinite; }
    @keyframes flash { 0%,100%{box-shadow:0 0 0 0 rgba(224,138,138,0)} 50%{box-shadow:0 0 14px -2px rgba(224,138,138,.5)} }
    .sev { font-size:9px; text-transform:uppercase; letter-spacing:.14em; opacity:.7; display:block; margin-bottom:2px; }

    /* 5-day split forecast */
    .feet-head { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:10px; }
    .foot-col { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ash-2); }
    .foot-col b { color:var(--bone); font-weight:600; }
    .days { display:flex; flex-direction:column; gap:6px; }
    .day {
      display:grid; grid-template-columns:42px 1fr 1fr; gap:10px; align-items:center;
      font-family:var(--mono); font-size:11px; padding:7px 10px; border:1px solid var(--rule);
      border-radius:5px; background:var(--ink-2);
    }
    .day .dname { color:var(--ash-2); letter-spacing:.08em; }
    .fcell { display:flex; align-items:center; gap:7px; color:var(--ash); }
    .fcell .fi { font-size:15px; line-height:1; }
    .fcell .ft { color:var(--bone); font-weight:500; }
    .fcell.warn .ft { color:var(--amber); }
    .fcell.bad .ft { color:var(--hot); }

    .quote { font-family:var(--serif); font-style:italic; color:var(--ash); font-size:13.5px; line-height:1.55; }
    .note { border-top:1px solid var(--rule); padding-top:14px; margin-top:4px; }
    .note .quote { color:var(--ash-2); }
    .sig { font-family:var(--mono); font-size:10px; color:var(--ash-3); letter-spacing:.05em; margin-top:8px; }

    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .mini {
      font-family:var(--mono); font-size:11px; padding:9px 15px; background:var(--ink-1);
      border:1px solid var(--rule-2); border-radius:5px; color:var(--ash); cursor:pointer;
      transition:border-color .2s,color .2s,background .2s; display:inline-flex; align-items:center; gap:7px;
    }
    .mini:hover { border-color:var(--fox); color:var(--bone); background:var(--ink-2); }
    .mini:active { transform:translateY(1px); }

    .toast {
      position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
      background:var(--ink-3); border:1px solid var(--rule-2); color:var(--bone);
      font-family:var(--mono); font-size:11px; padding:10px 16px; border-radius:6px;
      opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:50;
      box-shadow:0 10px 30px -10px rgba(0,0,0,.8); letter-spacing:.04em;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .footer { text-align:center; margin-top:48px; padding-top:24px; border-top:1px solid var(--rule); }
    .footer a { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ash-3); }
    .footer a:hover { color:var(--ash); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .animate-in { animation:fadeUp .55s cubic-bezier(.2,.7,.2,1) both; }
    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after { animation:none !important; transition:none !important; }
      body::after { display:none; }
      .fill { transition:none; }
    }
  </style>
</head>
<body>

let lastZone = null, lastEvent = null, lastNote = null, lastForecast = null;
let lastReport = null;

/* ---------- RNG ---------- */
function makeRng(seed) {
  let s = (seed >>> 0) || 1;
  return function() {
    s ^= s << 13; s >>>= 0;
    s ^= s >> 17;
    s ^= s << 5;  s >>>= 0;
    return (s >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function pickFresh(arr, rng, last) {
  if (arr.length < 2) return arr[0];
  let v, guard = 0;
  do { v = pick(arr, rng); } while (v === last && ++guard < 12);
  return v;
}
function rint(rng, lo, hi) { return lo + Math.floor(rng() * (hi - lo + 1)); }

/* ---------- BUILD UI ---------- */
function init() {
  const sg = document.getElementById('shoe-grid');
  SHOES.forEach((shoe, i) => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'chip shoe';
    b.innerHTML = '<span class="ic">' + shoe.icon + '</span>' + shoe.name;
    b.addEventListener('click', () => selectShoe(i));
    sg.appendChild(b);
  });
  const wg = document.getElementById('weather-grid');
  WEATHER.forEach((w, i) => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'chip weather';
    b.innerHTML = '<span class="ic">' + w.icon + '</span>' + w.name;
    b.addEventListener('click', () => selectWeather(i));
    wg.appendChild(b);
  });
  document.getElementById('gen-btn').addEventListener('click', generateReport);
}

function selectShoe(i) {
  selectedShoe = i;
  document.querySelectorAll('.chip.shoe').forEach((b, j) => b.classList.toggle('active', j === i));
  updateButton();
}
function selectWeather(i) {
  selectedWeather = i;
  document.querySelectorAll('.chip.weather').forEach((b, j) => b.classList.toggle('active', j === i));
  updateButton();
}
function updateButton() {
  const ready = selectedShoe !== null && selectedWeather !== null;
  const btn = document.getElementById('gen-btn');
  btn.disabled = !ready;
  const hint = document.getElementById('hint');
  if (!ready) {
    hint.textContent = selectedShoe === null && selectedWeather === null
      ? 'Pick a shoe and the weather to begin.'
      : selectedShoe === null ? 'Now pick a shoe.' : 'Now pick the weather outside.';
  } else {
    hint.textContent = 'Ready. Re-issue as many times as you like — conditions drift.';
  }
}

/* ---------- GENERATION ---------- */
function buildForecast(rng, base) {
  const cells = [];
  for (let d = 0; d < 5; d++) {
    const idx = Math.min(FC_KINDS.length - 1, Math.max(0,
      Math.round(base + rng() * 6 - 3)));
    const k = FC_KINDS[idx];
    const hi = rint(rng, 30, 52);
    cells.push('<div class="fcell ' + k.cls + '">' +
      '<span class="fi">' + k.icon + '</span>' +
      '<span class="ft">' + k.word + '</span>' +
      '<span style="color:var(--ash-3);margin-left:auto">' + hi + '°</span></div>');
  }
  return cells;
}

function generateReport() {
  const shoe = SHOES[selectedShoe];
  const weather = WEATHER[selectedWeather];
  const seed = (Date.now() ^ (selectedShoe * 2654435761) ^ (selectedWeather * 40503) ^ (Math.random() * 1e9 | 0));
  const rng = makeRng(seed);

  // temperature: base + weather shift + shoe character
  let baseTemp = 37 + (weather.temp) + rint(rng, -2, 4);
  if (/Slipper|Ski|Combat|Boot|Loafer/.test(shoe.name)) baseTemp += 3;
  if (/Flip|Crocs|Flat|Sandal/.test(shoe.name)) baseTemp -= 3;
  baseTemp = Math.max(28, Math.min(58, baseTemp));

  let humidity = 40 + weather.hum + rint(rng, -8, 12);
  if (/Rain|Combat|Ski|Loafer|Wedding/.test(shoe.name)) humidity += 14;
  if (/Flip|Crocs|Flat/.test(shoe.name)) humidity -= 18;
  humidity = Math.max(8, Math.min(99, humidity));

  const pressure = rint(rng, 978, 1034);
  const dewpoint = Math.max(6, Math.min(baseTemp - 1, Math.round(baseTemp - (100 - humidity) / 5)));
  const airFlow = pick(['Still','Gentle','Brisk','Gusting','Chaotic','Nonexistent','Erratic','Suspiciously good','Theoretical','Mournful'], rng);

  // comfort
  let comfort = 52;
  if (/Flip|Crocs|Flat|Slipper/.test(shoe.name)) comfort += 18;
  if (/Ski|Combat|Wedding|Heel/.test(shoe.name)) comfort -= 16;
  if (/Loafer|Cowboy/.test(shoe.name)) comfort -= 6;
  comfort -= (weather.drama * 9);
  if (weather.name === 'Heatwave') comfort -= 12;
  if (weather.name === 'Snowy' || weather.name === 'Cold Snap') comfort += 6;
  if (humidity > 75) comfort -= 12;
  if (humidity < 25) comfort += 6;
  comfort = Math.max(4, Math.min(97, comfort + rint(rng, -9, 9)));

  // event severity scales with outside drama
  const roll = rng() + weather.drama * 0.12;
  let cat, evt;
  if (roll > 0.86) { cat = 'extreme'; evt = pickFresh(EVENTS.extreme, rng, lastEvent); }
  else if (roll > 0.52) { cat = 'rare'; evt = pickFresh(EVENTS.rare, rng, lastEvent); }
  else { cat = 'common'; evt = pickFresh(EVENTS.common, rng, lastEvent); }
  lastEvent = evt;

  const zone = pickFresh(CLIMATE_ZONES, rng, lastZone); lastZone = zone;
  const wildlife = pick(WILDLIFE, rng);
  const forecast = pickFresh(FORECASTS, rng, lastForecast); lastForecast = forecast;
  const note = pickFresh(NOTES, rng, lastNote); lastNote = note;

  const front = pick(FRONTS, rng).replace('{a}', pick(FRONT_PLACES, rng));
  const station = pick(CITY_PREFIX, rng) + ' ' + pick(CITY_ROOT, rng) + pick(CITY_SUFFIX, rng);
  const stationId = 'NFS-' + rint(rng, 100, 999);

  // radar grid (seeded ASCII)
  const W = 26, H = 7;
  let radar = '';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const n = rng();
      if (n < 0.015) radar += '⚡';
      else if (n < 0.04) radar += '❄';
      else if (n < 0.07) radar += '↑';
      else if (n < 0.11) radar += '☁';
      else if (n < 0.20) radar += pick(['░','▒','▓'], rng);
      else if (n < 0.34) radar += pick(['·',':','='], rng);
      else if (n < 0.50) radar += pick(['-','~','^'], rng);
      else radar += ' ';
    }
    radar += '\n';
  }

  const leftBase = Math.floor((baseTemp - 28) / 5);
  const rightBase = leftBase + rint(rng, -1, 1);
  const leftCol = buildForecast(rng, leftBase);
  const rightCol = buildForecast(rng, rightBase);

  const comfortClass = comfort >= 65 ? 'good' : comfort >= 35 ? 'okay' : 'bad';
  const comfortColor = comfort >= 65 ? 'var(--fox)' : comfort >= 35 ? 'var(--amber)' : 'var(--hot)';
  const tempClass = baseTemp >= 46 ? 'hot' : baseTemp <= 34 ? 'cold' : '';
  const dateStr = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  const timeStr = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  const deg = '°';

  lastReport = {
    shoe: shoe.name, weather: weather.name, zone, baseTemp, humidity, comfort, evt
  };

  const html =
  '<div class="card animate-in">' +
    '<div class="station">' +
      '<span>' + station + ' Station &middot; ' + stationId + '</span>' +
      '<span class="live"><span class="blip"></span>LIVE &middot; ' + dateStr + ' ' + timeStr + '</span>' +
    '</div>' +

    '<div class="head-row">' +
      '<span class="shoe-emoji">' + shoe.icon + '</span>' +
      '<div><h3 class="shoe-name">' + shoe.name + '</h3>' +
      '<div class="cond-line">' + weather.icon + ' ' + weather.name + ' outside &middot; report no. ' + rint(rng,1000,9999) + '</div></div>' +
    '</div>' +

    '<div class="climate">' + zone + '</div>' +
    '<div class="climate-tag">Currently tracking ' + front + '.</div>' +

    '<div class="stats">' +
      '<div><div class="stat-label">Interior Temp</div><div class="stat-value ' + tempClass + '">' + baseTemp + deg + 'C</div></div>' +
      '<div><div class="stat-label">Humidity</div><div class="stat-value wet">' + humidity + '%</div><div class="stat-sub">dewpt ' + dewpoint + deg + '</div></div>' +
      '<div><div class="stat-label">Pressure</div><div class="stat-value">' + pressure + '</div><div class="stat-sub">hPa</div></div>' +
      '<div><div class="stat-label">Sock Wind</div><div class="stat-value sm">' + airFlow + '</div></div>' +
    '</div>' +

    '<div class="block"><div class="stat-label">Comfort Index</div>' +
      '<div class="bar"><div class="fill ' + comfortClass + '" id="comfort-fill"></div></div>' +
      '<div class="bar-cap" style="color:' + comfortColor + '">' + comfort + ' / 100</div></div>' +

    '<div class="block"><div class="stat-label">Doppler Radar &middot; interior</div>' +
      '<div class="radar">' + radar + '</div>' +
      '<div class="radar-legend">⚡ lightning &nbsp; ❄ frost &nbsp; ↑ updraft &nbsp; ☁ cloud &nbsp; ▒ moisture</div></div>' +

    '<div class="block"><div class="stat-label">Active Advisory</div>' +
      '<span class="tag ' + cat + '"><span class="sev">' + cat + ' event</span>' + evt + '</span></div>' +

    '<div class="block"><div class="stat-label">5-Day Outlook &middot; per foot</div>' +
      '<div class="feet-head"><div class="foot-col">◀ <b>Left</b> shoe</div><div class="foot-col" style="text-align:right"><b>Right</b> shoe ▶</div></div>' +
      '<div class="days">' + buildDays(leftCol, rightCol) + '</div></div>' +

    '<div class="block"><div class="stat-label">Reported Wildlife</div>' +
      '<div class="quote">&ldquo;' + wildlife + '&rdquo;</div></div>' +

    '<div class="block"><div class="stat-label">Forecast</div>' +
      '<div class="quote">&ldquo;' + forecast + '&rdquo;</div></div>' +

    '<div class="note"><div class="stat-label" style="margin-bottom:6px">Analyst Note</div>' +
      '<div class="quote">' + note + '</div>' +
      '<div class="sig">— issued by the National Footwear Service, ' + station + ' bureau</div></div>' +

    '<div class="actions">' +
      '<button class="mini" id="reroll-btn">↻ Re-issue report</button>' +
      '<button class="mini" id="copy-btn">⎘ Copy forecast</button>' +
    '</div>' +
  '</div>';

  const area = document.getElementById('report-area');
  area.innerHTML = html;

  // animate comfort bar after paint
  const fill = document.getElementById('comfort-fill');
  if (fill) requestAnimationFrame(() => requestAnimationFrame(() => { fill.style.width = comfort + '%'; }));

  document.getElementById('reroll-btn').addEventListener('click', generateReport);
  document.getElementById('copy-btn').addEventListener('click', copyForecast);
}

function buildDays(L, R) {
  const names = ['MON','TUE','WED','THU','FRI'];
  let out = '';
  for (let i = 0; i < 5; i++) {
    out += '<div class="day"><span class="dname">' + names[i] + '</span>' + L[i] + R[i] + '</div>';
  }
  return out;
}

/* ---------- ACTIONS ---------- */
function copyForecast() {
  if (!lastReport) return;
  const r = lastReport;
  const txt =
    'SHOE WEATHER — ' + r.shoe + ' (' + r.weather + ' outside)\n' +
    r.zone + '\n' +
    'Interior: ' + r.baseTemp + '°C · Humidity ' + r.humidity + '% · Comfort ' + r.comfort + '/100\n' +
    'Advisory: ' + r.evt + '\n' +
    '— issued by the National Footwear Service';
  const done = () => showToast('Forecast copied — forward to your podiatrist');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done, () => fallbackCopy(txt, done));
  } else {
    fallbackCopy(txt, done);
  }
}
function fallbackCopy(txt, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  } catch (e) {
    showToast('Copy unavailable — read it aloud instead');
  }
}
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

init();
</script>
</body>
</html>
