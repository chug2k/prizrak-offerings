<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimir's Wisdom | The Offerings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #0c0a09; 
            color: #d6d3d1;
            font-family: 'Georgia', serif;
        }
        .mimir-card {
            background: rgba(28, 25, 23, 0.8);
            border: 1px solid #44403c;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .gold-text { color: #eab308; }
        .input-focus:focus { border-color: #eab308; outline: none; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full mimir-card p-8 rounded-2xl border border-stone-800 bg-stone-950 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif font-bold text-amber-500 mb-2">Mimir's Wisdom</h1>
            <p class="text-stone-500 text-sm italic">"The smartest man alive is here to brighten your path... or just mock it."</p>
        </div>

        <div class="space-y-6">
            <div>
                <label for="query" class="block text-xs font-mono uppercase tracking-widist text-stone-500 mb-2">Present your query to the head</label>
                <textarea id="query" rows="3" classs="w-full bg-stone-900 border border-stone-800 rounded-lg px-4 py-3 text-stone-200 focus:ring-1 focus:ring-amber-500 focus:border-amber-500 transition-all resize-none" placeholder="What weighs on your mind, traveler?"></textarea>
            </div>

            <button onclick="consultMimir()" id="btn" class="w-full bg-amber-600 hover:bg-amber-500 text-stone-950 font-bold py-3 rounded-lg transition-colors shadow-lg uppercase tracking-widest text-sm">
                Consult Mimir
            </button>

            <div id="responseArea" class="hidden mt-8 p-4 border-t border-stone-800 bg-stone-900/50 rounded-b-lg opacity-0 transition-opacity duration-500">
                <p id="responseBody" class="text-lg font-serif italic leading-relaxed text-stone-300"></p>
                <div class="mt-4 text-right">
                    <span id="verdict" class="text-[10px] uppercase tracking-widest font-bold text-amber-600"></span>
                </div>
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-stone-900 text-center">
            <p class="text-[10px] text-stone-600 uppercase tracking-widest">An Offering for Charles</p>
        </div>
    </div>

    <script>
        const wisdom = [
            { text: "A heavy question for a light heart. The answer isn't in the stars, it's in the dirt you walk upon. Get moving.", verdict: "THE WAYWARD PATH" },
            { text: "You seek wisdom in words, but your hands are idle. The answer is found in the work itself.", verdict: "THE BUILDER'S TRUTH" },
            { text: "Ah, the classic human dilemma! You overthink the wind while the storm is already at your door. Simplify.", verdict: "THE CLOUDED VISION" },
            { text: "The truth is often simpler than your cleverness allows. Look at the thing, not the shadow it casts.", verdict: "THE BLUNT REALITY" },
            { text: "Is that a question or an excuse? If it's the latter, I have no wisdom for you. Only the road remains.", verdict: "THE HARD CHOICE" },
            { text: "Fate is a heavy cloak. Why do you carry it when you could just walk? The choice was already made.", verdict: "THE WEAVER'S THREAD" },
            { text: "You look for meaning where there is only motion. Move with purpose, or don't move at all.", verdict: "THE STILL WATER" },
            { text: "Listen to the silence between your thoughts. That is where the truth hides from your cleverness.", verdict: "THE WHISPERING VOID" },
            { text: "Even the greatest gods must eventually deal with the consequences of their own whims. You are no different.", verdict: "THE DIVINE VERDICT" },
            { text: "A bright question! But even a bright flame needs fuel. What are you actually building?", verdict: "THE EMBERS" }
        ];

        function consultMimir() {
            const query = document.getElementById('query').value.trim();
            const btn = document.getElementById('btn');
            const responseArea = document.getElementById('responseArea');
            const responseBody = document.getElementById('responseBody');
            const verdict = document.getElementById('verdict');

            if (!query) {
                alert("Mimir requires a question, traveler! Don't waste his time.");
                return;
            }

            // Add some "thinking" animation
            btn.disabled = true;
            btn.innerText = "Listening...";
            responseArea.classList.add('hidden');
            document.body.classList.add('shake');

            setTimeout(() => {
                const randomWisdom = wisdom[Math.floor(Math.random() * wisdom.length)];
                
                responseBody.innerText = `"${randomWisdom.text}"`;
                verdict.innerText = randomWisdom.verdict;

                responseArea.classList.remove('hidden');
                setTimeout(() => {
                    responseArea.classList.remove('opacity-0');
                }, 50);

                btn.disabled = false;
                btn.innerText = "Consult Mimir";
                document.body.classList.remove('shake');
            }, 1000);
        }
    </script>
</body>
</html>
