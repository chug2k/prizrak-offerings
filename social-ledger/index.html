<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Social Ledger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&display=swap');
    body { background: #0c0c0c; font-family: 'Share Tech Mono', monospace; color: #ccc; }
    .typewriter { font-family: 'Special Elite', cursive; }
    input, textarea, select {
      background: #111; border: 1px solid #2a2a2a; color: #ccc;
      font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
      padding: 6px 10px; border-radius: 2px; width: 100%;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: #444; }
    textarea { resize: vertical; min-height: 70px; }
    .entry-card {
      background: #111; border: 1px solid #1e1e1e;
      border-left: 3px solid #333; padding: 16px;
      margin-bottom: 10px; position: relative;
    }
    .entry-card.status-hot   { border-left-color: #dc2626; }
    .entry-card.status-warm  { border-left-color: #d97706; }
    .entry-card.status-done  { border-left-color: #16a34a; opacity: 0.6; }
    .entry-card.status-cold  { border-left-color: #374151; opacity: 0.5; }
    .tag {
      display: inline-block; font-size: 0.6rem; padding: 1px 7px;
      border-radius: 1px; margin: 2px 2px 2px 0; letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .tag-hot  { background: rgba(220,38,38,0.12); color: #f87171; border: 1px solid rgba(220,38,38,0.25); }
    .tag-warm { background: rgba(217,119,6,0.12);  color: #fbbf24; border: 1px solid rgba(217,119,6,0.25); }
    .tag-done { background: rgba(22,163,74,0.1);   color: #4ade80; border: 1px solid rgba(22,163,74,0.2); }
    .tag-cold { background: rgba(75,85,99,0.1);    color: #6b7280; border: 1px solid rgba(75,85,99,0.2); }
    .btn {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #999;
      font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
      padding: 6px 14px; cursor: pointer; border-radius: 2px;
      transition: all 0.15s; letter-spacing: 0.05em;
    }
    .btn:hover { background: #222; color: #ccc; border-color: #444; }
    .btn-primary { background: #1a1f1a; border-color: #2a3a2a; color: #4ade80; }
    .btn-primary:hover { background: #1f261f; border-color: #3a5a3a; }
    .btn-danger:hover { color: #f87171; border-color: #3a1a1a; }
    .section-label { font-size: 0.65rem; color: #444; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
    .follow-up-item { display: flex; align-items: start; gap: 8px; margin-bottom: 6px; }
    .follow-up-item input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; accent-color: #4ade80; }
    .follow-up-item label { font-size: 0.78rem; color: #888; cursor: pointer; }
    .follow-up-item input[type="checkbox"]:checked + label { text-decoration: line-through; color: #444; }
    .empty-state { color: #333; text-align: center; padding: 40px 20px; font-size: 0.8rem; }
    #form-panel { display: none; }
    #form-panel.open { display: block; }
    .scanline {
      position: fixed; top:0; left:0; right:0; bottom:0; pointer-events: none; z-index: 50;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    }
    .sort-btn { font-size: 0.65rem; padding: 2px 8px; }
    .sort-btn.active { color: #4ade80; border-color: #2a3a2a; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div class="scanline"></div>
<div class="max-w-3xl mx-auto">

  <!-- Header -->
  <div class="mb-6">
    <div class="flex items-start justify-between">
      <div>
        <p class="text-xs text-gray-700 tracking-widest mb-1">PRÍZRAK / FIELD INTELLIGENCE</p>
        <h1 class="typewriter text-3xl text-gray-200">The Social Ledger</h1>
        <p class="text-xs text-gray-600 mt-1">Post-meeting log. Who, where, what mattered, what's next.</p>
      </div>
      <div class="text-right">
        <div id="entry-count" class="text-xs text-gray-600 mb-2">— entries</div>
        <button class="btn btn-primary" onclick="toggleForm()">+ NEW ENTRY</button>
      </div>
    </div>
    <div class="border-t border-gray-900 mt-4 pt-3 flex gap-2 flex-wrap items-center">
      <span class="text-xs text-gray-700 mr-2">SORT:</span>
      <button class="btn sort-btn active" id="sort-date" onclick="setSort('date')">DATE</button>
      <button class="btn sort-btn" id="sort-status" onclick="setSort('status')">STATUS</button>
      <button class="btn sort-btn" id="sort-person" onclick="setSort('person')">PERSON</button>
      <div class="ml-auto">
        <input type="text" id="search" placeholder="search..." style="width:160px" oninput="render()" />
      </div>
    </div>
  </div>

  <!-- New Entry Form -->
  <div id="form-panel" class="mb-6 bg-gray-950 border border-gray-800 rounded p-4">
    <p class="text-xs text-gray-500 mb-4 tracking-widest uppercase">// New Entry</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
      <div>
        <div class="section-label">Person(s)</div>
        <input type="text" id="f-person" placeholder="Tam, Kimble" />
      </div>
      <div>
        <div class="section-label">Date</div>
        <input type="date" id="f-date" />
      </div>
      <div>
        <div class="section-label">Venue / Context</div>
        <input type="text" id="f-venue" placeholder="Cocoa Kitchen, D1" />
      </div>
      <div>
        <div class="section-label">Status</div>
        <select id="f-status">
          <option value="hot">🔴 Hot — active / follow-up urgent</option>
          <option value="warm" selected>🟡 Warm — in progress</option>
          <option value="done">🟢 Done — closed / no action</option>
          <option value="cold">⚫ Cold — dormant</option>
        </select>
      </div>
    </div>
    <div class="mb-3">
      <div class="section-label">Key Notes</div>
      <textarea id="f-notes" placeholder="What was discussed. What mattered. What surprised you."></textarea>
    </div>
    <div class="mb-4">
      <div class="section-label">Follow-ups (one per line)</div>
      <textarea id="f-followups" placeholder="Email Tam about the intro&#10;Check Kimble's LinkedIn&#10;Book next session" style="min-height:60px"></textarea>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary" onclick="saveEntry()">SAVE ENTRY</button>
      <button class="btn" onclick="toggleForm()">CANCEL</button>
    </div>
    <input type="hidden" id="f-edit-id" value="" />
  </div>

  <!-- Entries -->
  <div id="entries-list"></div>

</div>

<script>
const STORAGE_KEY = 'prizrak-social-ledger-v1';
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentSort = 'date';
let editingId = null;

// Pre-seed with tonight's meeting if ledger is empty
if (entries.length === 0) {
  entries = [{
    id: Date.now().toString(),
    person: 'Tam, Kimble',
    date: '2026-03-09',
    venue: 'Cocoa Kitchen, 1A Công trường Mê Linh, Q1',
    status: 'warm',
    notes: 'First logged entry. Met at Cocoa Kitchen Monday evening.',
    followups: [{ text: 'Follow up on anything discussed', done: false }],
    createdAt: Date.now()
  }];
  save();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function toggleForm(prefill) {
  const panel = document.getElementById('form-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('f-date').value = prefill?.date || today;
    document.getElementById('f-person').value = prefill?.person || '';
    document.getElementById('f-venue').value = prefill?.venue || '';
    document.getElementById('f-status').value = prefill?.status || 'warm';
    document.getElementById('f-notes').value = prefill?.notes || '';
    document.getElementById('f-followups').value = prefill?.followups?.map(f=>f.text).join('\n') || '';
    document.getElementById('f-edit-id').value = prefill?.id || '';
    editingId = prefill?.id || null;
    document.getElementById('f-person').focus();
  }
}

function saveEntry() {
  const person = document.getElementById('f-person').value.trim();
  if (!person) { document.getElementById('f-person').focus(); return; }
  const fuText = document.getElementById('f-followups').value.trim();
  const followups = fuText ? fuText.split('\n').filter(l=>l.trim()).map(t=>({text:t.trim(),done:false})) : [];
  const id = editingId || Date.now().toString();

  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx > -1) {
      // Preserve done state of existing follow-ups
      const existing = entries[idx];
      const merged = followups.map((f, i) => {
        const match = existing.followups.find(ef => ef.text === f.text);
        return match ? { ...f, done: match.done } : f;
      });
      entries[idx] = { ...entries[idx],
        person, date: document.getElementById('f-date').value,
        venue: document.getElementById('f-venue').value.trim(),
        status: document.getElementById('f-status').value,
        notes: document.getElementById('f-notes').value.trim(),
        followups: merged
      };
    }
  } else {
    entries.unshift({ id, person,
      date: document.getElementById('f-date').value,
      venue: document.getElementById('f-venue').value.trim(),
      status: document.getElementById('f-status').value,
      notes: document.getElementById('f-notes').value.trim(),
      followups, createdAt: Date.now()
    });
  }
  save(); render();
  document.getElementById('form-panel').classList.remove('open');
  editingId = null;
}

function deleteEntry(id) {
  if (!confirm('Remove this entry from the ledger?')) return;
  entries = entries.filter(e => e.id !== id);
  save(); render();
}

function toggleFollowup(entryId, idx) {
  const entry = entries.find(e => e.id === entryId);
  if (entry) { entry.followups[idx].done = !entry.followups[idx].done; save(); render(); }
}

function cycleStatus(id) {
  const order = ['hot','warm','done','cold'];
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  const next = order[(order.indexOf(entry.status) + 1) % order.length];
  entry.status = next; save(); render();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s).classList.add('active');
  render();
}

function getSorted(list) {
  if (currentSort === 'date') return [...list].sort((a,b) => b.date.localeCompare(a.date));
  if (currentSort === 'status') {
    const order = {hot:0,warm:1,done:2,cold:3};
    return [...list].sort((a,b) => order[a.status] - order[b.status]);
  }
  if (currentSort === 'person') return [...list].sort((a,b) => a.person.localeCompare(b.person));
  return list;
}

const statusMeta = {
  hot:  { tag: 'tag-hot',  label: 'HOT' },
  warm: { tag: 'tag-warm', label: 'WARM' },
  done: { tag: 'tag-done', label: 'DONE' },
  cold: { tag: 'tag-cold', label: 'COLD' },
};

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  let filtered = entries;
  if (query) {
    filtered = entries.filter(e =>
      e.person.toLowerCase().includes(query) ||
      (e.venue||'').toLowerCase().includes(query) ||
      (e.notes||'').toLowerCase().includes(query)
    );
  }
  const sorted = getSorted(filtered);
  document.getElementById('entry-count').textContent = `${entries.length} entr${entries.length===1?'y':'ies'}`;

  const container = document.getElementById('entries-list');
  if (!sorted.length) {
    container.innerHTML = `<div class="empty-state">The ledger is empty.<br>The mountain remembers nothing that has not been written down.</div>`;
    return;
  }

  container.innerHTML = sorted.map(e => {
    const meta = statusMeta[e.status] || statusMeta.warm;
    const pendingFu = e.followups.filter(f => !f.done).length;
    const fuHtml = e.followups.length ? `
      <div class="mt-3">
        <div class="section-label mb-2">FOLLOW-UPS${pendingFu > 0 ? ` — <span style="color:#fbbf24">${pendingFu} pending</span>` : ' — <span style="color:#4ade80">all clear</span>'}</div>
        ${e.followups.map((f,i) => `
          <div class="follow-up-item">
            <input type="checkbox" id="fu-${e.id}-${i}" ${f.done?'checked':''} onchange="toggleFollowup('${e.id}',${i})" />
            <label for="fu-${e.id}-${i}">${f.text}</label>
          </div>
        `).join('')}
      </div>` : '';

    return `
      <div class="entry-card status-${e.status}">
        <div class="flex items-start justify-between gap-3 mb-2">
          <div>
            <span class="typewriter text-base text-gray-100">${e.person}</span>
            ${e.venue ? `<span class="text-xs text-gray-600 ml-2">@ ${e.venue}</span>` : ''}
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="tag ${meta.tag}" style="cursor:pointer" onclick="cycleStatus('${e.id}')" title="Click to cycle status">${meta.label}</span>
            <button class="btn" style="padding:2px 8px;font-size:0.65rem" onclick='toggleForm(${JSON.stringify(e)})'>EDIT</button>
            <button class="btn btn-danger" style="padding:2px 8px;font-size:0.65rem" onclick="deleteEntry('${e.id}')">✕</button>
          </div>
        </div>
        <div class="text-xs text-gray-600 mb-2">${e.date || '—'}</div>
        ${e.notes ? `<p class="text-xs text-gray-500 leading-relaxed">${e.notes.replace(/\n/g,'<br>')}</p>` : ''}
        ${fuHtml}
      </div>
    `;
  }).join('');
}

// Set today's date as default
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
render();
</script>
</body>
</html>
