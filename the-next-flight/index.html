<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Flight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: normal;
        }

        .header p {
            font-size: 0.7rem;
            color: #475569;
            margin-top: 0.4rem;
            letter-spacing: 0.1em;
        }

        /* Input Phase */
        .input-section {
            width: 100%;
            max-width: 540px;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 0.4rem;
        }

        label span {
            color: #94a3b8;
            font-size: 0.6rem;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #1e293b;
            border-left: 2px solid #334155;
            color: #cbd5e1;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 0.75rem 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        textarea:focus, input[type="text"]:focus {
            border-color: #334155;
            border-left-color: #60a5fa;
        }

        textarea { height: 80px; }

        .time-row {
            display: flex;
            gap: 1rem;
        }

        .time-row .field-group {
            flex: 1;
        }

        .btn-generate {
            width: 100%;
            padding: 0.9rem;
            background: transparent;
            border: 1px solid #334155;
            color: #60a5fa;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-generate:hover {
            background: #1e293b;
            border-color: #60a5fa;
        }

        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Boarding Pass */
        .boarding-pass {
            display: none;
            width: 100%;
            max-width: 540px;
            margin-top: 1rem;
        }

        .boarding-pass.visible {
            display: block;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bp-container {
            background: #0d1117;
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
        }

        .bp-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #1e40af, #3b82f6, #60a5fa, #3b82f6, #1e40af);
        }

        /* Ticket perforation line */
        .bp-tear {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0 0;
        }

        .bp-tear-line {
            flex: 1;
            border-top: 1px dashed #1e293b;
            margin: 0;
        }

        .bp-tear-circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #0a0a0f;
            border: 1px solid #1e293b;
            flex-shrink: 0;
        }

        /* Header strip */
        .bp-airline {
            padding: 1rem 1.5rem 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #0f172a;
        }

        .bp-airline-name {
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: #475569;
            text-transform: uppercase;
        }

        .bp-flight-num {
            font-size: 1.2rem;
            color: #1e40af;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        /* Main route section */
        .bp-route {
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bp-city {
            flex: 1;
        }

        .bp-city-code {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .bp-city-name {
            font-size: 0.6rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.2rem;
        }

        .bp-city.dest .bp-city-code {
            text-align: right;
        }

        .bp-city.dest .bp-city-name {
            text-align: right;
        }

        .bp-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 0;
        }

        .bp-arrow svg {
            color: #334155;
        }

        .bp-flight-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, #1e3a5f, #3b82f6, #1e3a5f);
        }

        /* Details grid */
        .bp-details {
            padding: 0 1.5rem 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }

        .bp-detail-item label {
            font-size: 0.55rem;
            color: #334155;
            letter-spacing: 0.15em;
        }

        .bp-detail-item .bp-value {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.15rem;
            line-height: 1.3;
        }

        .bp-detail-item .bp-value.highlight {
            color: #60a5fa;
            font-size: 0.9rem;
        }

        /* Verdict strip */
        .bp-verdict {
            border-top: 1px solid #0f172a;
            padding: 1rem 1.5rem;
            background: #080c12;
        }

        .bp-verdict label {
            font-size: 0.55rem;
            color: #334155;
            letter-spacing: 0.15em;
            display: block;
            margin-bottom: 0.4rem;
        }

        .bp-verdict-text {
            font-size: 0.75rem;
            color: #64748b;
            line-height: 1.5;
            font-style: italic;
        }

        /* Stub */
        .bp-stub {
            border-top: 1px dashed #1e293b;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bp-stub-item {
            font-size: 0.6rem;
            color: #334155;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .bp-stub-item span {
            color: #475569;
        }

        /* Action buttons */
        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-secondary {
            flex: 1;
            padding: 0.65rem;
            background: transparent;
            border: 1px solid #1e293b;
            color: #475569;
            font-family: 'Courier New', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: #334155;
            color: #64748b;
        }

        .separator {
            text-align: center;
            color: #1e293b;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            margin: 2rem 0 1rem;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
        }

        .footer p {
            font-size: 0.6rem;
            color: #1e293b;
            letter-spacing: 0.1em;
        }

        /* Placeholder styling */
        ::placeholder { color: #1e293b; }

        /* Past flights section */
        .past-flights {
            width: 100%;
            max-width: 540px;
            margin-top: 2rem;
        }

        .past-flight-item {
            border: 1px solid #0f172a;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .past-flight-item:hover {
            border-color: #1e293b;
        }

        .past-flight-meta {
            font-size: 0.65rem;
            color: #334155;
        }

        .past-flight-route {
            font-size: 0.8rem;
            color: #475569;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>The Next Flight</h1>
        <p>when you miss the one you planned</p>
    </div>

    <div class="input-section" id="inputSection">
        <div class="field-group">
            <label>Where you were headed <span>— the original plan</span></label>
            <textarea id="origin" placeholder="Bangkok. The meeting. The exit conversation. The thing that was supposed to happen today."></textarea>
        </div>

        <div class="field-group">
            <label>What happened <span>— the detour</span></label>
            <textarea id="detour" placeholder="Missed the flight. Missed the meeting. The day went sideways. Describe it plainly."></textarea>
        </div>

        <div class="field-group">
            <label>What tomorrow actually needs <span>— one honest thing</span></label>
            <textarea id="tomorrow" placeholder="Not what you should do. What actually needs to happen next." style="height: 60px;"></textarea>
        </div>

        <button class="btn-generate" id="generateBtn" onclick="generate()">
            Issue Boarding Pass →
        </button>
    </div>

    <div class="boarding-pass" id="boardingPass">
        <div class="bp-container">
            <div class="bp-airline">
                <span class="bp-airline-name">Prízrak Air · Rerouted Service</span>
                <span class="bp-flight-num" id="bpFlightNum">PR-???</span>
            </div>

            <div class="bp-route">
                <div class="bp-city">
                    <div class="bp-city-code" id="bpFrom" style="color: #64748b;">---</div>
                    <div class="bp-city-name" id="bpFromName">original plan</div>
                </div>
                <div class="bp-arrow">
                    <div class="bp-flight-line"></div>
                    <svg width="16" height="8" viewBox="0 0 16 8" fill="none">
                        <path d="M0 4 L12 4 M9 1 L12 4 L9 7" stroke="#334155" stroke-width="1.5"/>
                    </svg>
                </div>
                <div class="bp-city dest">
                    <div class="bp-city-code" id="bpTo" style="color: #93c5fd;">ACT</div>
                    <div class="bp-city-name" id="bpToName">actual next</div>
                </div>
            </div>

            <div class="bp-details">
                <div class="bp-detail-item">
                    <label>Departure</label>
                    <div class="bp-value highlight" id="bpDep">06:00</div>
                </div>
                <div class="bp-detail-item">
                    <label>Gate</label>
                    <div class="bp-value highlight" id="bpGate">—</div>
                </div>
                <div class="bp-detail-item">
                    <label>Class</label>
                    <div class="bp-value" id="bpClass">—</div>
                </div>
                <div class="bp-detail-item" style="grid-column: 1 / -1;">
                    <label>Leave Behind (Checked Baggage)</label>
                    <div class="bp-value" id="bpBaggage" style="color: #475569;">—</div>
                </div>
            </div>

            <div class="bp-verdict">
                <label>Prízrak verdict</label>
                <div class="bp-verdict-text" id="bpVerdict">—</div>
            </div>

            <div class="bp-stub">
                <div class="bp-stub-item">Issued: <span id="bpIssued">—</span></div>
                <div class="bp-stub-item">Status: <span style="color: #3b82f6;">REROUTED</span></div>
                <div class="bp-stub-item">Seat: <span>WINDOW</span></div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-secondary" onclick="reset()">New Reroute</button>
            <button class="btn-secondary" onclick="savePass()">Save Pass</button>
        </div>
    </div>

    <div class="footer">
        <p>The mountain doesn't cancel the flight. It just changes the routing.</p>
    </div>

    <script>
    // Deterministic hash for consistent pass generation
    function simpleHash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
            h = ((h << 5) - h) + str.charCodeAt(i);
            h |= 0;
        }
        return Math.abs(h);
    }

    function abbrev(text, n = 3) {
        const words = text.trim().split(/\s+/).filter(w => w.length > 2);
        if (words.length === 0) return 'MSS';
        const initials = words.slice(0, n).map(w => w[0].toUpperCase()).join('');
        return initials.padEnd(3, 'X').slice(0, 3);
    }

    function pickFrom(arr, seed) {
        return arr[seed % arr.length];
    }

    const GATES = ['G1','G2','G3','A4','B7','C2','D9','F1','H3','K5'];
    const CLASSES = [
        'Economy of Conviction',
        'Business of Actual Work',
        'First, Then Sleep',
        'Economy of Honesty',
        'Standby — No Approval Required',
        'Economy of One Decision',
    ];

    const BAGGAGES = [
        'The version of today that was supposed to happen',
        'The meeting you missed in your head — still running, let it land',
        'Whichever narrative made this feel like failure',
        'The expectation. It missed the flight with you.',
        'The plan that required perfect conditions',
        'The meeting. It\'s checked. You\'ll pick it up on arrival.',
        'The story that today was the day. It wasn\'t. Tomorrow is.',
    ];

    const VERDICTS = [
        (o, d, t) => `The flight to ${o.slice(0,20)} departed without you. This is not unusual. Mountains reroute more travelers than schedules do. What matters: you know the destination, and the next departure exists. First action tomorrow is not recovery — it is the continuation of the actual work.`,
        (o, d, t) => `You missed the connection. Every experienced traveler has a theory about missed connections — most involve forgetting that the map is not the territory. The territory had something else in mind today. Sleep now. The terminal opens at six.`,
        (o, d, t) => `The detour was not a failure. It was the mountain choosing a different route. The route you were on required conditions that did not obtain. The route you are on now has different conditions. Note them. Fly accordingly.`,
        (o, d, t) => `In karst hydrology, the river that disappears underground is not lost. It surfaces at a different elevation. What looked like the plan evaporating was the plan finding a lower path. You didn't miss the destination. You found the spring.`,
        (o, d, t) => `Coal miners worked by foxfire when the open flame would have killed them. The ghost-light was enough to see where they were going. You don't need the original itinerary to find the next gate. You need enough light to take the next step.`,
        (o, d, t) => `Rerouted. Not cancelled. The distinction matters at 2 AM. Cancelled means no further service. Rerouted means the destination is unchanged and the aircraft is already being repositioned. Sleep is the repositioning. Tomorrow is the new departure.`,
    ];

    function generate() {
        const origin = document.getElementById('origin').value.trim();
        const detour = document.getElementById('detour').value.trim();
        const tomorrow = document.getElementById('tomorrow').value.trim();

        if (!origin || !detour) {
            document.getElementById('origin').style.borderLeftColor = origin ? '' : '#ef4444';
            document.getElementById('detour').style.borderLeftColor = detour ? '' : '#ef4444';
            return;
        }

        const seed = simpleHash(origin + detour + tomorrow);

        // Generate boarding pass data
        const flightNum = 'PR-' + (seed % 9000 + 1000);
        const fromCode = abbrev(origin, 3);
        const toCode = tomorrow ? abbrev(tomorrow, 3) : 'ACT';
        const gate = pickFrom(GATES, seed);
        const cls = pickFrom(CLASSES, seed + 1);
        const baggage = pickFrom(BAGGAGES, seed + 2);
        const verdictFn = VERDICTS[seed % VERDICTS.length];
        const verdict = verdictFn(origin, detour, tomorrow);

        // Departure: first reasonable hour tomorrow
        const dep = pickFrom(['05:30','06:00','06:30','07:00'], seed + 3);

        // Issued time
        const now = new Date();
        const issued = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) + ' ' +
                       now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

        // Populate
        document.getElementById('bpFlightNum').textContent = flightNum;
        document.getElementById('bpFrom').textContent = fromCode;
        document.getElementById('bpFromName').textContent = origin.slice(0, 18).toLowerCase();
        document.getElementById('bpTo').textContent = toCode;
        document.getElementById('bpToName').textContent = tomorrow ? tomorrow.slice(0, 18).toLowerCase() : 'next actual step';
        document.getElementById('bpDep').textContent = dep;
        document.getElementById('bpGate').textContent = gate;
        document.getElementById('bpClass').textContent = cls;
        document.getElementById('bpBaggage').textContent = baggage;
        document.getElementById('bpVerdict').textContent = verdict;
        document.getElementById('bpIssued').textContent = issued;

        // Show boarding pass
        document.getElementById('inputSection').style.display = 'none';
        const bp = document.getElementById('boardingPass');
        bp.classList.add('visible');

        // Save to local history
        saveToHistory({ flightNum, fromCode, toCode, origin, dep, issued });
    }

    function reset() {
        document.getElementById('inputSection').style.display = 'block';
        document.getElementById('boardingPass').classList.remove('visible');
        document.getElementById('origin').value = '';
        document.getElementById('detour').value = '';
        document.getElementById('tomorrow').value = '';
        document.getElementById('origin').style.borderLeftColor = '';
        document.getElementById('detour').style.borderLeftColor = '';
    }

    function saveToHistory(data) {
        try {
            const hist = JSON.parse(localStorage.getItem('next_flight_history') || '[]');
            hist.unshift(data);
            localStorage.setItem('next_flight_history', JSON.stringify(hist.slice(0, 20)));
        } catch(e) {}
    }

    function savePass() {
        const bp = document.getElementById('boardingPass');
        const text = [
            '─── THE NEXT FLIGHT ───',
            document.getElementById('bpFlightNum').textContent,
            document.getElementById('bpFrom').textContent + ' → ' + document.getElementById('bpTo').textContent,
            'DEP: ' + document.getElementById('bpDep').textContent + ' | GATE: ' + document.getElementById('bpGate').textContent,
            'CLASS: ' + document.getElementById('bpClass').textContent,
            '',
            'LEAVE BEHIND: ' + document.getElementById('bpBaggage').textContent,
            '',
            'VERDICT: ' + document.getElementById('bpVerdict').textContent,
            '',
            'ISSUED: ' + document.getElementById('bpIssued').textContent,
            '──────────────────────',
        ].join('\n');

        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'boarding-pass-' + Date.now() + '.txt';
        a.click();
    }

    // Enter key on last textarea triggers generate
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('tomorrow').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generate();
            }
        });
    });
    </script>
</body>
</html>
