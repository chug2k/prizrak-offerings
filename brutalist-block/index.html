<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Panelák Constructor | Offering VII</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            background-image: url('./panelak-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: multiply;
        }
        .concrete-panel {
            background-color: #555;
            border: 2px solid #444;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), inset -2px -2px 5px rgba(0,0,0,0.5);
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            transition: all 0.3s ease;
        }
        .window {
            width: 20px;
            height: 25px;
            background-color: #222;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.8);
        }
        .window.lit {
            background-color: #d4af37;
            box-shadow: 0 0 10px #d4af37, inset 1px 1px 2px rgba(255,255,255,0.4);
        }
        #tower {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            width: 300px;
            max-width: 90vw;
            margin: 0 auto;
        }
    </style>
</head>
<body class="text-gray-300 font-mono antialiased min-h-screen flex flex-col">
    
    <div class="flex-grow flex flex-col justify-end pb-8">
        <div id="tower">
            <!-- Ground floor -->
            <div class="concrete-panel" style="height: 60px; border-bottom: none;">
                <div class="w-16 h-12 bg-zinc-900 border-2 border-zinc-950 flex items-center justify-center text-xs">ENTRANCE</div>
            </div>
        </div>
    </div>

    <div class="fixed top-0 left-0 w-full p-6 bg-black/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-zinc-100 uppercase tracking-widest">The Panelák Constructor</h1>
                <p class="text-zinc-500 text-xs mt-1">Offering VII. Brutalist architecture for digital sovereignty. No glass facades. No aesthetic curves.</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div class="text-3xl font-bold text-zinc-300" id="floor-count">1</div>
                    <div class="text-[10px] text-zinc-500 uppercase">Floors Built</div>
                </div>
                
                <button onclick="addFloor()" class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 active:bg-zinc-500 text-white font-bold rounded-sm border-2 border-zinc-500 shadow-[2px_2px_0px_#000] transition-all active:translate-y-1 active:translate-x-1 active:shadow-none uppercase tracking-wider text-sm">
                    Stack Concrete
                </button>
            </div>
        </div>
    </div>

    <script>
        let floors = 1;
        
        function addFloor() {
            floors++;
            const tower = document.getElementById('tower');
            const panel = document.createElement('div');
            panel.className = 'concrete-panel';
            
            // Random windows
            for(let i=0; i<6; i++) {
                const win = document.createElement('div');
                win.className = 'window';
                if(Math.random() > 0.8) {
                    win.classList.add('lit');
                }
                panel.appendChild(win);
            }
            
            // Add right above the entrance (which is the first child in column-reverse)
            tower.insertBefore(panel, tower.children[0]);
            
            document.getElementById('floor-count').innerText = floors;
            
            // Scroll to keep entrance at bottom
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Add 5 initial floors
        for(let i=0; i<4; i++) {
            addFloor();
        }
    </script>
    <script src="/shared/star-widget.js"></script>
</body>
</html>
