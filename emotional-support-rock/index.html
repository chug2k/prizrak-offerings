/* ============================ RNG (seeded) ============================ */
function makeRng(seed){
  let s = (seed>>>0) || 1;
  return function(){
    s ^= s<<13; s>>>=0;
    s ^= s>>17;
    s ^= s<<5;  s>>>=0;
    return (s>>>0)/4294967296;
  };
}
function pick(arr, rng){ return arr[Math.floor(rng()*arr.length)]; }
function pickFresh(arr, rng, last){
  if(arr.length<2) return arr[0];
  let v, guard=0;
  do { v = pick(arr, rng); } while (v===last && ++guard<16);
  return v;
}
function rint(rng, lo, hi){ return lo + Math.floor(rng()*(hi-lo+1)); }
function rrange(rng, lo, hi){ return lo + rng()*(hi-lo); }

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============================ ROCK SVG ============================ */
/* build an organic blobby polygon path from a seeded rng */
function rockPath(rng, cx, cy, rBase){
  const pts = 12 + Math.floor(rng()*6);
  const coords = [];
  for(let i=0;i<pts;i++){
    const ang = (i/pts)*Math.PI*2;
    // squash a little vertically so it "sits"
    let r = rBase * (0.78 + rng()*0.34);
    const x = cx + Math.cos(ang)*r;
    const y = cy + Math.sin(ang)*r*0.82 + (Math.sin(ang)>0 ? rng()*6 : 0);
    coords.push([x,y]);
  }
  // catmull-rom -> smooth closed path
  let d = "";
  const n = coords.length;
  for(let i=0;i<n;i++){
    const p0 = coords[(i-1+n)%n];
    const p1 = coords[i];
    const p2 = coords[(i+1)%n];
    const p3 = coords[(i+2)%n];
    if(i===0) d += "M"+p1[0].toFixed(1)+","+p1[1].toFixed(1)+" ";
    const c1x = p1[0] + (p2[0]-p0[0])/6;
    const c1y = p1[1] + (p2[1]-p0[1])/6;
    const c2x = p2[0] - (p3[0]-p1[0])/6;
    const c2y = p2[1] - (p3[1]-p1[1])/6;
    d += "C"+c1x.toFixed(1)+","+c1y.toFixed(1)+" "+c2x.toFixed(1)+","+c2y.toFixed(1)+" "+p2[0].toFixed(1)+","+p2[1].toFixed(1)+" ";
  }
  return d + "Z";
}

function buildFace(rng, mood, cx, cy, scale, palette){

  const eyeY = cy - 4*scale + rng()*4*scale;
  const eyeR = 5.2*scale + rng()*1.6*scale;
  const lx = cx - eyeGap, rx = cx + eyeGap;
  const ink = "#1a1712";
  let s = "";

  // rosy cheeks
  const cheekR = 6*scale;
  s += `<ellipse cx="${(lx-2).toFixed(1)}" cy="${(eyeY+11*scale).toFixed(1)}" rx="${cheekR.toFixed(1)}" ry="${(cheekR*0.7).toFixed(1)}" fill="${palette.hi}" opacity="0.5"/>`;
  s += `<ellipse cx="${(rx+2).toFixed(1)}" cy="${(eyeY+11*scale).toFixed(1)}" rx="${cheekR.toFixed(1)}" ry="${(cheekR*0.7).toFixed(1)}" fill="${palette.hi}" opacity="0.5"/>`;

  function eye(x, closed){
    if(closed || mood==="sleepy"){
      return `<path d="M${(x-eyeR).toFixed(1)},${eyeY.toFixed(1)} Q${x.toFixed(1)},${(eyeY+eyeR*0.9).toFixed(1)} ${(x+eyeR).toFixed(1)},${eyeY.toFixed(1)}" stroke="${ink}" stroke-width="${(1.8*scale).toFixed(1)}" fill="none" stroke-linecap="round"/>`;
    }
    let e = `<circle cx="${x.toFixed(1)}" cy="${eyeY.toFixed(1)}" r="${eyeR.toFixed(1)}" fill="#f4efe6"/>`;
    // pupil position by mood
    let px=0, py=0;
    if(mood==="dreamy"){ px=-eyeR*0.35; py=-eyeR*0.3; }
    else if(mood==="skeptical"){ px=eyeR*0.3; py=-eyeR*0.2; }
    else if(mood==="surprised"){ py=0; }
    const pr = mood==="surprised" ? eyeR*0.42 : eyeR*0.55;
    e += `<circle cx="${(x+px).toFixed(1)}" cy="${(eyeY+py).toFixed(1)}" r="${pr.toFixed(1)}" fill="${ink}"/>`;
    e += `<circle cx="${(x+px-pr*0.35).toFixed(1)}" cy="${(eyeY+py-pr*0.35).toFixed(1)}" r="${(pr*0.32).toFixed(1)}" fill="#fff"/>`;
    return e;
  }
  s += eye(lx, false);
  s += eye(rx, false);

  // eyebrows for certain moods
  const browY = eyeY - eyeR - 3*scale;
  if(mood==="skeptical"){
    s += `<line x1="${(lx-eyeR).toFixed(1)}" y1="${(browY+2*scale).toFixed(1)}" x2="${(lx+eyeR).toFixed(1)}" y2="${(browY-1*scale).toFixed(1)}" stroke="${ink}" stroke-width="${(1.6*scale).toFixed(1)}" stroke-linecap="round"/>`;
    s += `<line x1="${(rx-eyeR).toFixed(1)}" y1="${(browY-1*scale).toFixed(1)}" x2="${(rx+eyeR).toFixed(1)}" y2="${(browY+2*scale).toFixed(1)}" stroke="${ink}" stroke-width="${(1.6*scale).toFixed(1)}" stroke-linecap="round"/>`;
  } else if(mood==="earnest" || mood==="dreamy"){
    s += `<line x1="${(lx-eyeR).toFixed(1)}" y1="${(browY+2*scale).toFixed(1)}" x2="${(lx+eyeR*0.6).toFixed(1)}" y2="${browY.toFixed(1)}" stroke="${ink}" stroke-width="${(1.4*scale).toFixed(1)}" stroke-linecap="round" opacity="0.85"/>`;
    s += `<line x1="${(rx-eyeR*0.6).toFixed(1)}" y1="${browY.toFixed(1)}" x2="${(rx+eyeR).toFixed(1)}" y2="${(browY+2*scale).toFixed(1)}" stroke="${ink}" stroke-width="${(1.4*scale).toFixed(1)}" stroke-linecap="round" opacity="0.85"/>`;
  }

  // mouth by mood
  const my = eyeY + 15*scale;
  const mw = 9*scale;
  let mouth;
  if(mood==="content" || mood==="serene"){
    mouth = `<path d="M${(cx-mw).toFixed(1)},${my.toFixed(1)} Q${cx.toFixed(1)},${(my+6*scale).toFixed(1)} ${(cx+mw).toFixed(1)},${my.toFixed(1)}" stroke="${ink}" stroke-width="${(1.9*scale).toFixed(1)}" fill="none" stroke-linecap="round"/>`;
  } else if(mood==="surprised"){
    mouth = `<ellipse cx="${cx.toFixed(1)}" cy="${(my+2*scale).toFixed(1)}" rx="${(4*scale).toFixed(1)}" ry="${(5*scale).toFixed(1)}" fill="${ink}"/>`;
  } else if(mood==="stoic" || mood==="skeptical"){
    mouth = `<line x1="${(cx-mw*0.8).toFixed(1)}" y1="${my.toFixed(1)}" x2="${(cx+mw*0.8).toFixed(1)}" y2="${my.toFixed(1)}" stroke="${ink}" stroke-width="${(1.9*scale).toFixed(1)}" stroke-linecap="round"/>`;
  } else if(mood==="sleepy"){
    mouth = `<path d="M${(cx-mw*0.6).toFixed(1)},${my.toFixed(1)} Q${cx.toFixed(1)},${(my+3*scale).toFixed(1)} ${(cx+mw*0.6).toFixed(1)},${my.toFixed(1)}" stroke="${ink}" stroke-width="${(1.6*scale).toFixed(1)}" fill="none" stroke-linecap="round"/>`;
  } else if(mood==="dreamy"){
    mouth = `<path d="M${(cx-mw*0.7).toFixed(1)},${my.toFixed(1)} Q${(cx+mw*0.3).toFixed(1)},${(my+5*scale).toFixed(1)} ${(cx+mw).toFixed(1)},${(my-1*scale).toFixed(1)}" stroke="${ink}" stroke-width="${(1.8*scale).toFixed(1)}" fill="none" stroke-linecap="round"/>`;
  } else { // earnest
    mouth = `<path d="M${(cx-mw).toFixed(1)},${(my+1*scale).toFixed(1)} Q${cx.toFixed(1)},${(my+8*scale).toFixed(1)} ${(cx+mw).toFixed(1)},${(my+1*scale).toFixed(1)}" stroke="${ink}" stroke-width="${(2*scale).toFixed(1)}" fill="none" stroke-linecap="round"/>`;
  }
  s += mouth;
  return s;
}

function buildRockSVG(rng){
  const W=200, H=170;
  const cx=W/2, cy=H*0.56;
  const palette = pick(ROCK_PALETTES, rng);
  const rBase = 62 + rng()*10;
  const path = rockPath(rng, cx, cy, rBase);
  const mood = pick(MOODS, rng);

  const gradId = "g"+Math.floor(rng()*1e6);
  let s = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="a small drawn pet rock">`;
  s += `<defs><radialGradient id="${gradId}" cx="40%" cy="32%" r="75%">`;
  s += `<stop offset="0%" stop-color="${palette.hi}"/>`;
  s += `<stop offset="55%" stop-color="${palette.base}"/>`;
  s += `<stop offset="100%" stop-color="${palette.lo}"/>`;
  s += `</radialGradient>`;
  // clip for speckles inside body
  s += `<clipPath id="clip${gradId}"><path d="${path}"/></clipPath></defs>`;

  // body
  s += `<path d="${path}" fill="url(#${gradId})" stroke="${palette.lo}" stroke-width="1.4"/>`;

  // strata / veins + speckles clipped to body
  s += `<g clip-path="url(#clip${gradId})">`;
  // a couple of soft strata lines
  const nStrata = 1 + Math.floor(rng()*2);
  for(let i=0;i<nStrata;i++){
    const yy = cy - rBase*0.4 + rng()*rBase*1.1;
    const sway = rrange(rng,-10,10);
    s += `<path d="M${(cx-rBase).toFixed(1)},${yy.toFixed(1)} Q${cx.toFixed(1)},${(yy+sway).toFixed(1)} ${(cx+rBase).toFixed(1)},${(yy-sway*0.5).toFixed(1)}" stroke="${palette.lo}" stroke-width="${(1.2+rng()*1.4).toFixed(1)}" fill="none" opacity="${(0.12+rng()*0.14).toFixed(2)}"/>`;
  }
  // speckles
  const nSpeck = 26 + Math.floor(rng()*30);
  for(let i=0;i<nSpeck;i++){
    const a = rng()*Math.PI*2;
    const rr = rng()*rBase*0.92;
    const sx = cx + Math.cos(a)*rr;
    const sy = cy + Math.sin(a)*rr*0.82;
    const sr = 0.5 + rng()*1.7;
    const col = rng()<0.5 ? palette.speck : palette.lo;
    s += `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${sr.toFixed(1)}" fill="${col}" opacity="${(0.25+rng()*0.4).toFixed(2)}"/>`;
  }
  // top-left glossy highlight
  s += `<ellipse cx="${(cx-rBase*0.35).toFixed(1)}" cy="${(cy-rBase*0.4).toFixed(1)}" rx="${(rBase*0.5).toFixed(1)}" ry="${(rBase*0.3).toFixed(1)}" fill="#ffffff" opacity="0.07"/>`;
  s += `</g>`;

  // face on top (not clipped)
  s += buildFace(rng, mood, cx, cy, 1, palette);

  s += `</svg>`;
  return { svg:s, mood, palette, W, H, cx, cy };
}

/* ============================ ROCK GENERATION ============================ */
let lastName=null, lastSign=null, lastNeed=null, lastCare=null, lastOrigin=null, lastHobby=null;
let currentRock = null;
let petCount = 0;
let lastReaction = null;
let reducedMotion = false;
try { reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch(e){}

function makeName(rng){
  let first, guard=0;
  do { first = pick(FIRST_NAMES, rng); } while (first===lastName && ++guard<16);
  lastName = first;
  const useSur = rng() < 0.72;
  const sur = useSur ? " "+pick(SURNAMES, rng) : "";
  return { first, full: first+sur };
}

function buildRock(seed){
  const rng = makeRng(seed);
  const nm = makeName(rng);
  const rockArt = buildRockSVG(rng);

  const sign = pickFresh(SIGNS, rng, lastSign); lastSign = sign;
  const adj = pick(TRAITS_ADJ, rng);
  const nounTrait = pick(TRAITS_NOUN, rng);
  const hobby = pickFresh(HOBBIES, rng, lastHobby); lastHobby = hobby;
  const need = pickFresh(NEEDS, rng, lastNeed); lastNeed = need;
  const care = pickFresh(CARE, rng, lastCare); lastCare = care;
  const origin = pickFresh(ORIGINS, rng, lastOrigin); lastOrigin = origin;

  const ageYears = rint(rng, 4, 900) * (rng()<0.4 ? 1000000 : 1000);
  const weight = (rrange(rng, 0.08, 2.4)).toFixed(2);
  const hardness = rint(rng, 3, 7);
  const loyalty = rint(rng, 96, 100);

  return {
    name: nm, art: rockArt, sign, adj, nounTrait, hobby, need, care, origin,
    ageYears, weight, hardness, loyalty,
    seed
  };
}

/* ============================ RENDER ============================ */
function fmtAge(y){
  if(y >= 1000000){
    const m = (y/1000000);
    return (m >= 100 ? Math.round(m) : m.toFixed(0)) + " million yrs";
  }
  return (y/1000).toFixed(0) + " thousand yrs";
}

function renderRock(r){
  const dateStr = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const certNo = "PZK-" + (10000 + (r.seed % 89999));

  const html =
  '<div class="card animate-in">' +
    '<div class="cert-row">' +
      '<span>Certificate of Adoption &middot; ' + certNo + '</span>' +
      '<span class="live"><span class="blip"></span>Bonded &middot; ' + dateStr + '</span>' +
    '</div>' +

    '<div class="stage">' +
      '<div class="rock-holder" id="rock-holder" role="button" tabindex="0" aria-label="Pet ' + esc(r.name.first) + '">' +
        r.art.svg +
      '</div>' +
      '<div class="shadow"></div>' +
      '<div class="pet-hint" id="pet-hint">click &amp; hold to pet</div>' +
    '</div>' +

    '<div class="status" id="status"></div>' +

    '<div class="name-row">' +
      '<h2 class="rock-name">' + esc(r.name.full) + '</h2>' +
      '<div class="rock-epithet">' + esc(r.adj) + ' &middot; ' + esc(r.nounTrait) + '</div>' +
    '</div>' +

    '<div class="facts">' +
      '<div><div class="fact-label">Star Sign</div><div class="fact-value">' + esc(r.sign.s) + '</div><div class="fact-sub">' + esc(r.sign.d) + '</div></div>' +
      '<div><div class="fact-label">Age</div><div class="fact-value">' + fmtAge(r.ageYears) + '</div><div class="fact-sub">give or take an era</div></div>' +
      '<div><div class="fact-label">Heft</div><div class="fact-value">' + r.weight + ' kg</div><div class="fact-sub">hardness ' + r.hardness + '/10 (Mohs-ish)</div></div>' +
      '<div><div class="fact-label">Loyalty</div><div class="fact-value">' + r.loyalty + '%</div><div class="fact-sub">the rest is just shyness</div></div>' +
    '</div>' +

    '<div class="block">' +
      '<div class="block-label">On the record</div>' +
      '<div class="body-text">Was <em>' + esc(r.origin) + '</em>. Passes the time by ' + esc(r.hobby) + '. A ' + esc(r.sign.s.toLowerCase()) + ' soul, ' + esc(r.sign.d) + '.</div>' +
    '</div>' +

    '<div class="block">' +
      '<div class="block-label">Its one very small need</div>' +
      '<div class="need"><span class="need-tag">' + esc(r.name.first) + ' needs</span>' + esc(r.need) + '</div>' +
    '</div>' +

    '<div class="block">' +
      '<div class="block-label">Care instructions</div>' +
      '<div class="care">' + esc(r.care) + '</div>' +
      '<div class="sig">— issued upon adoption by the Prízrak Lithic Rehoming Bureau</div>' +
    '</div>' +

    '<div class="actions">' +
      '<button class="mini primary" id="new-btn">↻ Adopt a different rock</button>' +
      '<button class="mini" id="copy-btn">⎘ Copy adoption papers</button>' +
    '</div>' +
  '</div>';

  const area = document.getElementById('rock-area');
  area.innerHTML = html;

  wireRock(r);
}

/* ============================ PET INTERACTION ============================ */
let petHold = null, holdActive = false, releaseTimer = null;

function wireRock(r){
  petCount = 0;
  lastReaction = null;
  const holder = document.getElementById('rock-holder');
  const status = document.getElementById('status');
  const hint = document.getElementById('pet-hint');

  // first-meet line
  status.textContent = pick(FIRST_MEET, makeRng(r.seed ^ 0x9e3779b9)).replace(/\{name\}/g, r.name.first);

  function doPet(clientX, clientY){
    holder.classList.remove('wobble');
    // reflow to restart animation
    void holder.offsetWidth;
    if(!reducedMotion) holder.classList.add('wobble');

    petCount++;
    hint.classList.add('lit');
    hint.textContent = "♡ petted " + petCount + (petCount===1?" time":" times");

    // choose reaction, no immediate repeat
    let reaction;
    if(petCount > 6 && Math.random() < 0.55){
      reaction = { line: OVERPET[Math.floor(Math.random()*OVERPET.length)], em:["·","·","·"] };
    } else {
      let guard=0, cand;
      do { cand = REACTIONS[Math.floor(Math.random()*REACTIONS.length)]; }
      while (cand === lastReaction && ++guard < 10);
      lastReaction = cand;
      reaction = cand;
    }
    const line = (typeof reaction.line === "string" ? reaction.line : String(reaction.line)).replace(/\{name\}/g, r.name.first);
    status.style.opacity = "0";
    requestAnimationFrame(() => {
      status.textContent = line;
      status.style.opacity = "1";
    });

    spawnParticles(holder, reaction.em || ["♡","·","✨"]);
  }

  function onDown(e){
    e.preventDefault();
    doPet();
    holdActive = true;
    if(petHold) clearInterval(petHold);
    // gentle repeat while held
    petHold = setInterval(() => { if(holdActive) doPet(); }, 620);
  }
  function onUp(){
    holdActive = false;
    if(petHold){ clearInterval(petHold); petHold = null; }
    if(releaseTimer) clearTimeout(releaseTimer);
    releaseTimer = setTimeout(() => {
      hint.classList.remove('lit');
      hint.textContent = "click & hold to pet";
    }, 1400);
  }

  holder.addEventListener('mousedown', onDown);
  holder.addEventListener('touchstart', onDown, { passive:false });
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);
  holder.addEventListener('keydown', (e) => {
    if(e.key === "Enter" || e.key === " "){ e.preventDefault(); doPet(); onUp(); }
  });

  document.getElementById('new-btn').addEventListener('click', adoptNew);
  document.getElementById('copy-btn').addEventListener('click', () => copyPapers(r));
}

function spawnParticles(holder, emojis){
  if(reducedMotion) return;
  const rect = holder.getBoundingClientRect();
  const n = 4 + Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const startX = rect.width*0.25 + Math.random()*rect.width*0.5;
    const startY = rect.height*0.3 + Math.random()*rect.height*0.3;
    p.style.left = startX + 'px';
    p.style.top = startY + 'px';
    const dx = (Math.random()-0.5)*70;
    const dy = -50 - Math.random()*60;
    p.style.setProperty('--dx', 'calc(-50% + ' + dx.toFixed(0) + 'px)');
    p.style.setProperty('--dy', 'calc(-50% + ' + dy.toFixed(0) + 'px)');
    p.style.color = Math.random()<0.5 ? 'var(--rose)' : 'var(--moss)';
    p.style.animation = 'floatUp ' + (0.9+Math.random()*0.7).toFixed(2) + 's ease-out forwards';
    holder.appendChild(p);
    setTimeout(() => p.remove(), 1700);
  }
}

/* ============================ ACTIONS ============================ */
function adoptNew(){
  const seed = (Date.now() ^ (Math.random()*1e9|0)) >>> 0;
  currentRock = buildRock(seed);
  renderRock(currentRock);
  const area = document.getElementById('rock-area');
  area.scrollIntoView({ behavior: reducedMotion ? 'auto':'smooth', block:'start' });
}

function copyPapers(r){
  const txt =
    "CERTIFICATE OF ADOPTION — Prízrak Lithic Rehoming Bureau\n" +
    "==========================================\n" +
    r.name.full + "\n" +
    r.adj + " · " + r.nounTrait + "\n\n" +
    "Star Sign: " + r.sign.s + " (" + r.sign.d + ")\n" +
    "Age: " + fmtAge(r.ageYears) + " · Heft: " + r.weight + " kg · Hardness " + r.hardness + "/10\n" +
    "Loyalty: " + r.loyalty + "%\n\n" +
    "On the record: Was " + r.origin + ". Passes the time by " + r.hobby + ".\n\n" +
    "Its one very small need — " + r.need + "\n\n" +
    "Care: " + r.care + "\n\n" +
    "Adopted " + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + ". Be good to it.";
  const done = () => showToast(r.name.first + " is officially yours now.");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done, () => fallbackCopy(txt, done));
  } else {
    fallbackCopy(txt, done);
  }
}
function fallbackCopy(txt, done){
  try {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  } catch(e){ showToast('Copy unavailable — commit it to memory instead.'); }
}
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============================ BOOT ============================ */
adoptNew();
</script>
